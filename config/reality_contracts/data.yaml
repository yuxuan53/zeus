# --- Consistency and time-scale contracts ---

- contract_id: GAMMA_CLOB_PRICE_CONSISTENCY
  assumption: >
    Gamma API prices for weather market tokens should match CLOB best-ask/bid
    prices within a 0.005 tolerance. Larger discrepancies indicate latency
    or data-source divergence. Zeus uses CLOB as authoritative.
  current_value: {tolerance: 0.005, authority: "CLOB"}
  verification_method: "Compare Gamma API token price with GET https://clob.polymarket.com/book?token_id={token_id} best ask; flag if |delta| > 0.005"
  last_verified: "2026-04-03T00:00:00+00:00"
  ttl_seconds: 3600   # 1 hour — advisory, checked frequently
  criticality: advisory
  on_change_handlers: [log_gamma_clob_divergence]

- contract_id: NOAA_TIME_SCALE
  assumption: >
    Open-Meteo ensemble forecast timestamps are in UTC.
    Zeus converts UTC ensemble times to city local time before computing
    probability distributions. If the API changes to local-time output,
    all DST-sensitive cities will drift by 1 hour during DST transitions.
    p10-adversarial (2026-04-06): forecast update frequency is variable /
    lifecycle-driven (NOT a fixed interval). Observations may be delayed
    up to 20 minutes due to MADIS QC. Hourly forecasts available for 7 days.
    Rate limits: undocumented but described as "generous."
  current_value:
    time_scale: "UTC"
    update_frequency: "variable_lifecycle_driven"
    observation_delay_minutes_max: 20
    hourly_forecast_days: 7
    rate_limits: "undocumented_generous"
  verification_method: >
    Inspect Open-Meteo API response: check that 'timezone' field is 'UTC' or 'GMT'
    and that 'time' array values end in 'Z' or '+00:00'.
    Do NOT assume fixed update frequency — check forecast run timestamps.
    If observation data seems stale (> 20 min), treat as expected MADIS QC delay.
  last_verified: "2026-04-06T00:00:00+00:00"
  ttl_seconds: 2592000  # 30 days
  criticality: blocking
  on_change_handlers:
    - update_noaa_time_scale
    - audit_dst_conversion_logic
