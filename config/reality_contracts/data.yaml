# Data reality contracts — §P10.4 / §P10.7
#
# SETTLEMENT_SOURCE_{CITY}: Settlement data comes from Weather Underground (WU)
#   for all 16 cities. Contract IDs use the city code from config/cities.json.
#   If WU changes its data source or rounding behaviour for a city, Zeus
#   miscalculates settlement probability.
#
# GAMMA_CLOB_PRICE_CONSISTENCY: Gamma API prices should match CLOB prices.
#   Discrepancies indicate latency or data-source divergence.
#   Advisory only — Zeus uses CLOB as authoritative.
#
# NOAA_TIME_SCALE: NOAA ensemble forecasts are indexed in UTC.
#   Zeus converts to local time before probability calculations.
#   If the time-scale assumption is wrong, all DST-sensitive cities drift.

# --- Settlement source per city ---
# Fahrenheit cities

- contract_id: SETTLEMENT_SOURCE_NYC
  assumption: Settlement temperature for NYC markets comes from Weather Underground (WU), integer Fahrenheit, round_half_to_even.
  current_value: {source: "WU", unit: "F", rounding: "round_half_to_even"}
  verification_method: "Check Polymarket market resolution details for a settled NYC weather market; confirm WU is cited as settlement source"
  last_verified: "2026-04-03T00:00:00+00:00"
  ttl_seconds: 2592000  # 30 days — settlement source changes are infrequent
  criticality: blocking
  on_change_handlers: [update_settlement_source_NYC]

