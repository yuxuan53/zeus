    declared_target: risk_cap
    data_basis: "Forward edge floor for buy_yes exits: -1%. Yes-side is less noisy, tighter floor. Heuristic."
    validated_at: "2026-04-05"
    replacement_criteria: "500+ buy_yes exit events; measure false-hold rate at various floor values"
    cascade_bound: null

  - constant_name: exit.buy_yes_ceiling
    file_location: "config/settings.json::exit.buy_yes_ceiling=-0.10"
    declared_target: risk_cap
    data_basis: "Panic exit ceiling for buy_yes: edge below -10% triggers immediate exit. Heuristic."
    validated_at: "2026-04-05"
    replacement_criteria: "200+ deep buy_yes reversals; measure false-hold rate at ceiling"
