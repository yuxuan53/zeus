      - "src/types/**"
    required_law:
      - "K0 frozen kernel requires a governance packet before modification."
      - "SettlementSemantics.assert_settlement_value() gates every DB write of settlement values."
      - "Lifecycle grammar is finite and authoritative (INV-07). No code may invent phase strings outside the enum."
      - "Canonical authority is append-first and projection-backed (INV-03)."
    allowed_files:
      - "src/contracts/settlement_semantics.py"
      - "src/contracts/provenance_registry.py"
      - "src/types/observation_atom.py"
      - "src/types/metric_identity.py"
      - "tests/test_instrument_invariants.py"
      - "tests/test_observation_atom.py"
      - "tests/test_metric_identity_spine.py"
      - "tests/test_provenance_enforcement.py"
      - "tests/test_architecture_contracts.py"
    forbidden_files:
      - "state/*.db"
      - ".claude/worktrees/**"
      - ".omx/**"
    gates:
      - "pytest -q tests/test_instrument_invariants.py tests/test_architecture_contracts.py"
      - "pytest -q tests/test_observation_atom.py tests/test_metric_identity_spine.py tests/test_provenance_enforcement.py"
      - "pytest -q tests/test_cross_module_invariants.py"
      - "python3 scripts/topology_doctor.py --planning-lock --changed-files <files>"
    downstream:
      - "src/engine/evaluator.py"
      - "src/execution/executor.py"
      - "src/data/daily_obs_append.py"
      - "src/signal/ensemble_signal.py"
      - "src/calibration/store.py"
    stop_conditions:
      - "K0 changes require explicit governance packet approval before merge."
      - "Do not break downstream contracts — all consumers must still compile and pass tests."
      - "Do not weaken settlement_semantics guards."
    reference_reads:
      - "docs/reference/zeus_market_settlement_reference.md"
      - "docs/reference/zeus_domain_model.md"
