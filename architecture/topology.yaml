required_active_pointers:
  - path: "docs/operations/current_state.md"
    rationale: Single live control-entry pointer required by root AGENTS.

registry_directories:
  - path: "architecture"
  - path: "architecture/self_check"
  - path: "scripts"
  - path: "tests"
  - path: "docs/authority"
  - path: "docs/reference"
  - path: "docs/operations"
  - path: "docs/runbooks"
  - path: "docs/reports"
  - path: "docs/to-do-list"
  - path: "docs/artifacts"
  - path: "docs/archives"
  - path: "config"
  - path: "config/reality_contracts"
  - path: ".github/workflows"
  - path: ".agents/skills"
  - path: "raw"

docs_root_allowed_files:
  - docs/AGENTS.md
  - docs/README.md
  - docs/archive_registry.md
  - docs/zeus-architecture-deep-map.md
  - docs/settlement-source-provenance.md
  - docs/settlement-validation-workflow.md
  - docs/zeus-pathology-registry.md
  - docs/zeus-refactor-plan.md
  - docs/zeus-system-constitution.md

active_operations_registry:
  current_state: docs/operations/current_state.md
  required_labels:
    - Active package source
    - Active execution packet
    - Required evidence
    - Next action
  surface_prefix: docs/operations/
  required_anchors:
    - docs/operations/task_2026-04-21_docs_reclassification_reference_extraction/plan.md

docs_registry:
  path: architecture/docs_registry.yaml
  rule: >
    Machine-readable docs classification and default-read registry. P0 seeds
    touched/current docs plus explicit parent entries; later packets may expand
    toward a full census.

runtime_artifact_inventory:
  path: docs/operations/runtime_artifact_inventory.md
  runtime_plan_globs:
    - .omx/plans/*.md
    - .omc/plans/*.md
  rule: >
    Runtime-local planning artifacts are ignored and not authority. When they
    contain planning/progress knowledge, this inventory must list the path and
    disposition so agents do not need to rediscover hidden context.

docs_mode_excluded_roots:
  - path: "docs/archives.zip"

docs_subroots:
  - path: "docs/authority"
    role: authority
    requires_agents: true
    allow_non_markdown: false
  - path: "docs/reference"
    role: reference
    requires_agents: true
    allow_non_markdown: false
  - path: "docs/operations"
    role: operations
    requires_agents: true
    allow_non_markdown: true
    allowed_extensions: [".md", ".json", ".txt"]
  - path: "docs/runbooks"
    role: runbook
    requires_agents: true
    allow_non_markdown: false
  - path: "docs/reports"
    role: generated_report
    requires_agents: true
    allow_non_markdown: true
    allowed_extensions: [".md", ".json", ".csv"]
  - path: "docs/to-do-list"
    role: checklist_evidence
    requires_agents: true
    allow_non_markdown: true
    allowed_extensions: [".xlsx", ".csv", ".json"]
  - path: "docs/artifacts"
    role: evidence_artifact
    requires_agents: true
    allow_non_markdown: true
    allowed_extensions: [".xlsx", ".csv", ".json"]
  - path: "docs/archives"
    role: historical_archive
    visibility: historical_cold_storage
    default_read: false
    visible_interface: docs/archive_registry.md
    requires_agents: false
    allow_non_markdown: true
    allowed_extensions: [".md", ".sql", ".csv", ".json", ".yaml", ".yml", ".py", ".sh", ".txt", ".xlsx", ".patch"]

archive_interface:
  path: docs/archive_registry.md
  default_read: false
  cold_storage_patterns:
    - docs/archives/**
    - docs/archives.zip
  required_label: "[Archive evidence]"
  forbidden_live_peer_phrases:
    - "Active subdirectories plus archives"
    - "archives/AGENTS.md"

reference_fact_specs:
  - path: "docs/reference/zeus_math_spec.md"
    status: active
    authority_role: reference_only
    fact_role: mathematical_specification
    rationale: >
      Newly written high-confidence math specification. It is not top-level
      authority, but its factual content should be reflected in executable
      contracts, authority manifests, tests, and packet plans.

core_map_profiles:
  - id: probability-chain
    purpose: compact verified working view of probability-to-sizing flow
    max_nodes: 9
    max_edges: 11
    forbidden_phrases:
      - "round(value + 0.5)"
      - "Python round"
    nodes:
      - id: settlement_semantics
        file: src/contracts/settlement_semantics.py
        required_claims: [WMO_HALF_UP_FORMULA, ORACLE_TRUNCATION_RULE]
      - id: ensemble_signal
        file: src/signal/ensemble_signal.py
      - id: evaluator
        file: src/engine/evaluator.py
        required_claims: [ALPHA_TARGET_COMPATIBILITY]
      - id: platt
        file: src/calibration/platt.py
      - id: market_fusion
        file: src/strategy/market_fusion.py
        required_claims: [VIG_BEFORE_BLEND, TEMPERATURE_DELTA_SCALE_ONLY]
      - id: market_analysis
        file: src/strategy/market_analysis.py
      - id: fdr_filter
        file: src/strategy/fdr_filter.py
      - id: kelly
        file: src/strategy/kelly.py
        required_claims: [EXECUTION_PRICE_NOT_IMPLIED_PROBABILITY]
      - id: oracle_penalty
        file: src/strategy/oracle_penalty.py
        required_claims: [ORACLE_PENALTY_THRESHOLD]
    edges:
      - {from: settlement_semantics, to: ensemble_signal, required: true, proof: {kind: import_or_call, path: src/signal/ensemble_signal.py, module: src.contracts.settlement_semantics, symbol: SettlementSemantics}}
      - {from: ensemble_signal, to: evaluator, required: true, proof: {kind: import_or_call, path: src/engine/evaluator.py, module: src.signal.ensemble_signal, symbol: EnsembleSignal}}
      - {from: platt, to: evaluator, required: true, proof: {kind: import_or_call, path: src/engine/evaluator.py, module: src.calibration.platt, symbol: calibrate_and_normalize}}
      - {from: market_fusion, to: evaluator, required: true, proof: {kind: import_or_call, path: src/engine/evaluator.py, module: src.strategy.market_fusion, symbol: compute_alpha}}
      - {from: market_fusion, to: market_analysis, required: true, proof: {kind: import_or_call, path: src/strategy/market_analysis.py, module: src.strategy.market_fusion, symbol: compute_posterior}}
      - {from: market_analysis, to: evaluator, required: true, proof: {kind: import_or_call, path: src/engine/evaluator.py, module: src.strategy.market_analysis, symbol: MarketAnalysis}}
      - {from: fdr_filter, to: evaluator, required: true, proof: {kind: import_or_call, path: src/engine/evaluator.py, module: src.strategy.fdr_filter, symbol: fdr_filter}}
      - {from: kelly, to: evaluator, required: true, proof: {kind: import_or_call, path: src/engine/evaluator.py, module: src.strategy.kelly, symbol: dynamic_kelly_mult}}
      - {from: settlement_semantics, to: evaluator, required: true, proof: {kind: import_or_call, path: src/engine/evaluator.py, module: src.contracts, symbol: SettlementSemantics}}
      - {from: settlement_semantics, to: market_analysis, required: true, proof: {kind: import_or_call, path: src/strategy/market_analysis.py, module: src.contracts.settlement_semantics, symbol: round_wmo_half_up_values}}
      - {from: oracle_penalty, to: evaluator, required: true, proof: {kind: import_or_call, path: src/engine/evaluator.py, module: src.strategy.oracle_penalty, symbol: get_oracle_info}}

digest_profiles:
  - id: "change settlement rounding"
    match:
      - "settlement rounding"
      - "wmo"
      - "rounding"
      - "oracle_truncate"
      - "oracle"
      - "hko"
    required_law:
      - "WMO asymmetric half-up: floor(x + 0.5)"
      - "SettlementSemantics is the canonical rounding law."
      - "round_half_to_even and Python/NumPy banker rounding are forbidden for settlement values."
    allowed_files:
      - "src/contracts/settlement_semantics.py"
      - "tests/test_instrument_invariants.py"
      - "state/assumptions.json"
      - "config/reality_contracts/data.yaml"
      - "src/strategy/oracle_penalty.py"
      - "data/oracle_error_rates.json"
    forbidden_files:
      - "state/*.db"
      - "docs/archives/**"
      - ".claude/worktrees/**"
      - ".omx/**"
    gates:
      - "pytest -q tests/test_instrument_invariants.py"
      - "python scripts/validate_assumptions.py"
      - "python scripts/semantic_linter.py"
      - "rg settlement banker-rounding patterns in active src/scripts"
    downstream:
      - "src/signal/ensemble_signal.py"
      - "src/signal/day0_signal.py"
      - "src/strategy/market_analysis.py"
      - "src/engine/replay.py"
      - "src/execution/harvester.py"
      - "src/calibration/store.py"
    stop_conditions:
      - "Any DB rewrite or rebuild request belongs to a separate data-rebuild packet."
      - "Any broad cleanup belongs to a separate cleanup packet."
  - id: "edit replay fidelity"
    match:
      - "replay fidelity"
      - "backtest"
      - "audit replay"
    required_law:
      - "Backtest output is diagnostic_non_promotion."
      - "Replay economics require point-in-time forecast references and market-price linkage."
      - "WU settlement_value is weather truth; stored winning_bin is evidence only."
    allowed_files:
      - "src/engine/replay.py"
      - "scripts/audit_replay_fidelity.py"
      - "tests/test_replay_time_provenance.py"
      - "tests/test_backtest_settlement_value_outcome.py"
    forbidden_files:
      - "state/zeus_trades.db"
      - "state/zeus-world.db"
      - ".claude/worktrees/**"
    gates:
      - "pytest -q tests/test_replay_time_provenance.py tests/test_backtest_settlement_value_outcome.py"
      - "python scripts/audit_replay_fidelity.py"
    downstream:
      - "state/zeus_backtest.db"
      - "docs/reference/data_inventory.md"
    stop_conditions:
      - "Do not promote replay/backtest output into live strategy authority."
      - "If PnL is N/A due missing prices, do not coerce it to zero."
  - id: "add a data backfill"
    match:
      - "data backfill"
      - "data rebuild"
      - "db rebuild"
      - "calibration rebuild"
      - "settlement rebuild"
      - "backfill"
    required_law:
      - "No DB mutation without a dedicated data/rebuild packet and dry-run evidence."
      - "Rebuilt rows require authority/provenance labels."
      - "Live math certification is blocked until data_rebuild_topology criteria are certified."
      - "WU settlement coverage alone is not strategy replay coverage."
    allowed_files:
      - "scripts/rebuild_calibration_pairs_canonical.py"
      - "scripts/backfill_wu_daily_all.py"
