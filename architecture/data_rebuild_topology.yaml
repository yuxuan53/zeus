schema_version: 1
metadata:
  created: "2026-04-13"
  owner_packet: "Packet 8 data/rebuild topology integration"
  note: >
    Data/rebuild topology encodes certification criteria and non-promotion
    rules. It is not permission to run rebuild or mutate DBs.

live_math_certification:
  allowed: false
  reason: >
    Data collection/storage preparation is not sufficient to certify live
    calibration or trading math. Platt utilization, bootstrap resampling, market
    price linkage, and verified authority gates still need packetized proof.
  required_before_allowed:
    - decision_group_id_stability
    - decision_group_sample_independence
    - bin_topology_coverage
    - inf_boundary_serialization
    - square_lead_matrix_coverage
    - authority_verified_provenance_gate
    - idempotent_schema_init
    - bootstrap_resampling_unit
    - zeus_backtest_non_promotion
    - replay_coverage_prerequisites

criteria:
  decision_group_id_stability:
    status: target_not_certified
    source: docs/operations/data_rebuild_plan.md#3.3
    protects: [src/calibration/decision_group.py, src/calibration/store.py]
    required_tests: [tests/test_data_rebuild_relationships.py, tests/test_rebuild_pipeline.py]
    certification_gate: "All calibration_pairs rows have stable non-null decision_group_id generated by one helper."
    blocks_live_math_certification: true
  decision_group_sample_independence:
    status: target_not_certified
    source: docs/reference/zeus_math_spec.md#12.1
    protects: [src/calibration/effective_sample_size.py, src/calibration/platt.py]
    required_tests: [tests/test_data_rebuild_relationships.py]
    certification_gate: "Statistics that assume independence count/resample decision groups, not bin rows."
    blocks_live_math_certification: true
  bin_topology_coverage:
    status: target_not_certified
    source: docs/operations/data_rebuild_plan.md#3.2
    protects: [src/types/market.py]
    required_tests: [tests/test_data_rebuild_relationships.py]
    certification_gate: "Every market bin set covers all integer settlement values exactly once."
    blocks_live_math_certification: true
  inf_boundary_serialization:
    status: target_not_certified
    source: docs/operations/data_rebuild_plan.md#3.5
    protects: [src/types/market.py]
    required_tests: [tests/test_data_rebuild_relationships.py]
    certification_gate: "±inf DB boundaries round-trip and JSON boundaries use sanctioned sentinel helpers."
    blocks_live_math_certification: true
  square_lead_matrix_coverage:
    status: target_not_certified
    source: docs/operations/data_rebuild_plan.md#8
    protects: [scripts/rebuild_calibration_pairs_canonical.py, scripts/refit_platt.py]
    required_tests: [tests/test_data_rebuild_relationships.py]
    certification_gate: "Training matrix has symmetric lead coverage before estimating Platt lead-days coefficient."
    blocks_live_math_certification: true
  authority_verified_provenance_gate:
    status: target_not_certified
    source: docs/authority/zeus_data_rebuild_adr.md
    protects:
      - src/types/observation_atom.py
      - src/data/ingestion_guard.py
      - src/data/rebuild_validators.py
      - scripts/rebuild_settlements.py
      - scripts/rebuild_calibration_pairs_canonical.py
      - scripts/refit_platt.py
    required_tests:
      - tests/test_authority_gate.py
      - tests/test_rebuild_validators.py
      - tests/test_rebuild_pipeline.py
      - tests/test_observation_atom.py
      - tests/test_ingestion_guard.py
    certification_gate: "All rebuild-produced rows carry authority='VERIFIED' only after typed validation/provenance."
    blocks_live_math_certification: true
  idempotent_schema_init:
    status: target_not_certified
    source: docs/operations/data_rebuild_plan.md#0
    protects: [src/state/db.py]
    required_tests: [tests/test_authority_gate.py, tests/test_rebuild_pipeline.py]
    certification_gate: "Schema init/migrations are additive and idempotent on pre-K1 DB shape."
    blocks_live_math_certification: true
  bootstrap_resampling_unit:
    status: deferred_to_recalibrate_packet
    source: docs/operations/data_rebuild_plan.md#10.1
    protects: [src/calibration/platt.py, src/strategy/market_analysis.py]
    required_tests: [tests/test_data_rebuild_relationships.py]
    certification_gate: "Platt parameter bootstrap resamples decision groups, not pair rows."
    blocks_live_math_certification: true
  zeus_backtest_non_promotion:
    status: implemented_topology_gate
    source: AGENTS.md
    protects: [src/engine/replay.py, state/zeus_backtest.db]
    required_tests:
      - tests/test_backtest_outcome_comparison.py
      - tests/test_backtest_trade_subject_identity.py
      - tests/test_run_replay_cli.py
    certification_gate: "Backtest output remains diagnostic_non_promotion and cannot authorize live changes."
    blocks_live_math_certification: true
  replay_coverage_prerequisites:
    status: implemented_topology_gate
    source: AGENTS.md
    protects: [src/engine/replay.py, scripts/audit_replay_fidelity.py]
    required_tests:
      - tests/test_replay_time_provenance.py
      - tests/test_backtest_settlement_value_outcome.py
    certification_gate: "WU settlement sample alone is not strategy replay coverage."
    blocks_live_math_certification: true

rebuilt_row_contract:
  tables:
    observations:
      authority_required: true
      provenance_required: true
      required_fields: [authority, provenance_metadata, source, target_date, value]
      producer_contract: src/types/observation_atom.py
    ensemble_snapshots:
      authority_required: true
      provenance_required: true
      required_fields: [model_version, data_version, issue_time, available_at, members_json]
      producer_script: scripts/ingest_grib_to_snapshots.py
      producer_status: pending_task_53_audited_grib_to_snapshots
    settlements:
      authority_required: true
      provenance_required: true
      required_fields: [authority, settlement_value, settlement_source, settled_at]
      producer_contract: scripts/rebuild_settlements.py
      rounding_law: src/contracts/settlement_semantics.py
    calibration_pairs:
      authority_required: true
      provenance_required: true
      required_fields: [decision_group_id, forecast_available_at, lead_days, range_label, p_raw, outcome]
      producer_contract: scripts/rebuild_calibration_pairs_canonical.py
    platt_models:
      authority_required: true
      provenance_required: true
      required_fields: [bucket_key, authority, fitted_at]
      producer_contract: scripts/refit_platt.py

replay_coverage_rule:
  wu_settlement_sample_is_strategy_coverage: false
  required_for_strategy_replay_coverage:
    - wu_settlement_value
    - point_in_time_forecast_reference
    - vector_compatible_p_raw_json
    - parseable_typed_bin_labels
    - market_price_linkage
  p_and_l_without_market_price: "N/A, never coerced to zero"

diagnostic_non_promotion:
  db: state/zeus_backtest.db
  authority_scope: diagnostic_non_promotion
  forbidden_promotions:
    - state/zeus_trades.db
    - state/zeus-world.db
    - live strategy thresholds
    - calibration model activation
