schema_version: 1
metadata:
  created: "2026-04-14"
  owner_packet: "Reference Replacement Matrix"
  purpose: >
    Track whether bulky reference docs have been replaced by machine manifests,
    lore cards, contracts, tests, or digest routing. This manifest does not
    delete files; it records deletion eligibility.

allowed_replacement_statuses:
  - not_replaced
  - partial_replacement_candidate
  - mostly_replaced
  - replaced

allowed_actions:
  - keep_default
  - keep_conditional
  - demote_from_default_reads
  - extract_lore_then_reassess
  - keep_until_machine_inventory

allowed_claim_roles:
  - fact_spec
  - failure_lore
  - authority_candidate
  - breadcrumb
  - stale_claim
  - derived_diagnostic

allowed_claim_statuses:
  - not_replaced
  - partial_replacement_candidate
  - mostly_replaced
  - replaced
  - intentionally_unpromoted
  - stale_superseded

allowed_proof_target_kinds:
  - executable_contract
  - blocking_test
  - machine_manifest
  - history_lore
  - digest_route
  - authority_doc
  - operations_pointer

required_entry_fields:
  - path
  - default_read
  - replacement_status
  - delete_allowed
  - replaced_by
  - unique_remaining
  - allowed_action
  - rationale

entries:
  - path: docs/reference/zeus_domain_model.md
    default_read: true
    replacement_status: not_replaced
    delete_allowed: false
    replaced_by:
      - AGENTS.md
      - architecture/history_lore.yaml
      - architecture/runtime_modes.yaml
    unique_remaining:
      - worked domain examples
      - strategy shape explanations
      - translation loss and structural decision methodology
      - data provenance model narrative
    allowed_action: keep_default
    rationale: >
      Root AGENTS keeps only the first-read mental model. This file remains the
      conditional deep "why" reference for domain/math work.

  - path: docs/reference/zeus_architecture_reference.md
    default_read: false
    replacement_status: not_replaced
    delete_allowed: false
    replaced_by: []
    unique_remaining:
      - canonical architecture reference destination
      - extraction outline for future deep architecture content
    allowed_action: keep_conditional
    rationale: >
      P0 anchor for architecture reference extraction. It is intentionally
      skeletal until P1 moves durable material out of root snapshots.

  - path: docs/reference/zeus_market_settlement_reference.md
    default_read: false
    replacement_status: not_replaced
    delete_allowed: false
    replaced_by: []
    unique_remaining:
      - canonical market and settlement reference destination
      - extraction outline for settlement provenance and mismatch triage
    allowed_action: keep_conditional
    rationale: >
      P0 anchor for market/settlement extraction. It is not yet a complete
      replacement for existing provenance/workflow material.

  - path: docs/reference/zeus_data_and_replay_reference.md
    default_read: false
    replacement_status: not_replaced
    delete_allowed: false
    replaced_by: []
    unique_remaining:
      - canonical data and replay reference destination
      - extraction outline for data coverage and replay limitations
    allowed_action: keep_conditional
    rationale: >
      P0 anchor for data/replay extraction. Data facts remain in current
      inventory, strategy, and operations gap sources until P1 extraction.

  - path: docs/reference/zeus_failure_modes_reference.md
    default_read: false
    replacement_status: not_replaced
    delete_allowed: false
    replaced_by: []
    unique_remaining:
      - canonical failure modes reference destination
      - extraction outline for pathology and operational gap crosswalk
    allowed_action: keep_conditional
    rationale: >
      P0 anchor for failure-mode extraction. It is intentionally skeletal until
      P1 extracts durable failure classes from snapshot/evidence sources.

  - path: docs/reference/repo_overview.md
    default_read: false
    replacement_status: mostly_replaced
    delete_allowed: false
    replaced_by:
      - AGENTS.md
      - workspace_map.md
      - architecture/source_rationale.yaml
      - architecture/topology.yaml
      - architecture/runtime_modes.yaml
      - docs/reference/zeus_architecture_reference.md
    unique_remaining:
      - dependency summary
      - logs summary
      - compact external boundary summary
    allowed_action: demote_from_default_reads
    rationale: >
      The orientation role is now mostly served by root AGENTS plus workspace
      map and machine manifests. The remaining short summaries should be
      reassessed before deletion.

  - path: docs/reference/data_inventory.md
    default_read: false
    replacement_status: partial_replacement_candidate
    delete_allowed: false
    replaced_by:
      - architecture/data_rebuild_topology.yaml
      - architecture/history_lore.yaml
      - docs/operations/current_state.md
      - docs/reference/zeus_data_and_replay_reference.md
    unique_remaining:
      - current data coverage numbers
      - source inventory status
      - utilization status by asset
    allowed_action: keep_until_machine_inventory
    rationale: >
      Data certification rules moved to machine topology, but current coverage
      facts still need a human-readable inventory until a generated inventory
      exists.

  - path: docs/reference/data_strategy.md
    default_read: false
    replacement_status: partial_replacement_candidate
    delete_allowed: false
    replaced_by:
      - architecture/data_rebuild_topology.yaml
      - architecture/history_lore.yaml
      - docs/operations/task_2026-04-13_remaining_repair_backlog.md
      - docs/reference/zeus_data_and_replay_reference.md
    unique_remaining:
      - prioritized data roadmap prose
      - near/mid/later sequencing
    allowed_action: extract_lore_then_reassess
    rationale: >
      Strategic priorities are partly represented in data_rebuild_topology and
      operations backlog, but the roadmap prose is not fully replaced.

  - path: docs/reference/statistical_methodology.md
    default_read: false
    replacement_status: partial_replacement_candidate
    delete_allowed: false
    replaced_by:
      - architecture/history_lore.yaml
      - docs/reference/zeus_math_spec.md
      - tests/test_instrument_invariants.py
      - tests/test_fdr.py
      - tests/test_kelly.py
    unique_remaining:
      - statistical methodology narrative
      - small-sample and bootstrap reasoning
      - data quality design notes
    allowed_action: keep_conditional
    rationale: >
      Several lessons have been extracted, but this remains a conditional deep
      reference for statistical design.

  - path: docs/reference/quantitative_research.md
    default_read: false
    replacement_status: partial_replacement_candidate
    delete_allowed: false
    replaced_by:
      - architecture/history_lore.yaml
      - docs/reference/zeus_domain_model.md
      - docs/reference/zeus_failure_modes_reference.md
      - docs/reference/zeus_math_spec.md
    unique_remaining:
      - market/data/model research findings
      - failure-mode survey
      - strategy-research background
    allowed_action: extract_lore_then_reassess
    rationale: >
      This is a candidate for further lore extraction, not deletion.

  - path: docs/reference/market_microstructure.md
    default_read: false
    replacement_status: partial_replacement_candidate
    delete_allowed: false
    replaced_by:
      - architecture/history_lore.yaml
      - src/contracts/execution_price.py
      - src/contracts/vig_treatment.py
      - docs/reference/zeus_market_settlement_reference.md
    unique_remaining:
      - participant structure
      - liquidity/edge persistence research
      - strategy-shape market microstructure rationale
    allowed_action: extract_lore_then_reassess
    rationale: >
      Some execution-price/vig lessons moved into contracts and lore, but the
      broader market-structure research is not replaced.

  - path: docs/reference/zeus_math_spec.md
    default_read: false
    replacement_status: partial_replacement_candidate
    delete_allowed: false
    replaced_by:
      - architecture/history_lore.yaml
      - architecture/data_rebuild_topology.yaml
      - tests/test_data_rebuild_relationships.py
      - tests/test_instrument_invariants.py
    unique_remaining:
      - full math/statistics fact specification
      - decision-group and calibration construction details
      - known defects and deferred upgrade inventory
    allowed_action: keep_conditional
    rationale: >
      This is not top-level authority, but its factual content is still a dense
      reference until fully reflected in executable contracts and manifests.
    claim_proofs:
      - claim_id: WMO_HALF_UP_FORMULA
        source:
          path: docs/reference/zeus_math_spec.md
          locator: "1.2 WMO asymmetric half-up rounding"
        claim_role: fact_spec
        claim_status: replaced
        assertion: "Settlement-aligned WU values use floor(x + 0.5), not banker rounding."
        proof_targets:
          - kind: executable_contract
            path: src/contracts/settlement_semantics.py
            locator: SettlementSemantics
          - kind: blocking_test
            path: tests/test_instrument_invariants.py
            locator: WMO_ROUNDING
          - kind: history_lore
            path: architecture/history_lore.yaml
            locator: WMO_ROUNDING_BANKER_FAILURE
        gates:
          - python scripts/semantic_linter.py
          - pytest -q tests/test_instrument_invariants.py
        invalidation_condition: "Only an explicit WU/Polymarket settlement-source rule change."
      - claim_id: ZEUS_MATH_SPEC_REFERENCE_ONLY
        source:
          path: docs/reference/zeus_math_spec.md
          locator: "Purpose / Authority status"
        claim_role: fact_spec
        claim_status: replaced
        assertion: "zeus_math_spec.md is high-confidence math reference, not top-level authority."
        proof_targets:
          - kind: machine_manifest
            path: architecture/topology.yaml
            locator: reference_fact_specs
          - kind: machine_manifest
            path: architecture/context_budget.yaml
            locator: file_budgets
          - kind: authority_doc
            path: docs/reference/AGENTS.md
            locator: "Default vs conditional read path"
          - kind: digest_route
            path: architecture/topology.yaml
            locator: "reference artifact extraction"
        gates:
          - python scripts/topology_doctor.py --reference-replacement
          - python scripts/topology_doctor.py --context-budget
        invalidation_condition: "Only a governance packet may promote this fact spec into authority."
      - claim_id: DECISION_GROUP_INDEPENDENCE
        source:
          path: docs/reference/zeus_math_spec.md
          locator: "12.1 Decision group: the independent sample unit"
        claim_role: fact_spec
        claim_status: partial_replacement_candidate
        assertion: "Calibration and bootstrap logic must treat decision_group as the independent sample unit."
        proof_targets:
          - kind: machine_manifest
            path: architecture/data_rebuild_topology.yaml
            locator: decision_group_sample_independence
          - kind: blocking_test
            path: tests/test_data_rebuild_relationships.py
            locator: decision_group
        gates:
          - python scripts/topology_doctor.py --data-rebuild
          - pytest -q tests/test_data_rebuild_relationships.py
        invalidation_condition: "Only a strategy-math packet may redefine calibration sample independence."
      - claim_id: OPEN_BOUNDARY_BINS
        source:
          path: docs/reference/zeus_math_spec.md
          locator: "5.1 Bin definition (including open-boundary outer bins)"
        claim_role: fact_spec
        claim_status: partial_replacement_candidate
        assertion: "Outer market bins are represented with -inf/+inf boundaries, not finite sentinels."
        proof_targets:
          - kind: machine_manifest
            path: architecture/data_rebuild_topology.yaml
            locator: inf_boundary_serialization
          - kind: blocking_test
            path: tests/test_data_rebuild_relationships.py
            locator: "R4/R5 Bin ±inf"
        gates:
          - python scripts/topology_doctor.py --data-rebuild
          - pytest -q tests/test_data_rebuild_relationships.py
        invalidation_condition: "Only a market-contract topology packet may replace open-boundary bin semantics."
