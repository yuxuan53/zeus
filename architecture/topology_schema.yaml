      companion_update_rule: architecture/map_maintenance.yaml
    history_lore_card:
      canonical_owner: architecture/history_lore.yaml
      derived_owners:
        - docs/archive_registry.md
      companion_update_rule: architecture/map_maintenance.yaml
    invariant_definition:
      canonical_owner: architecture/invariants.yaml
      derived_owners:
