schema_version: 1
purpose: >
  Schema for Zeus's compiled topology graph. The graph is an index over existing
  authority surfaces; it must not redefine zones.yaml, invariants.yaml, or
  negative_constraints.yaml.

required_top_level_keys:
  - schema_version
  - metadata
  - coverage_roots
  - root_governed_files
  - state_surfaces
  - required_active_pointers
  - registry_directories
  - reference_fact_specs
  - digest_profiles

node_required_fields:
  - path
  - status
  - scope
  - zone
  - authority_role
  - forbidden_misread

enums:
  status:
    - active
    - conditional
    - archived
    - generated
    - scratch
    - deprecated
    - shadow
  scope:
    - global
    - scoped
    - historical
    - runtime
    - shadow
  authority_role:
    - executable_law
    - schema_law
    - registry
    - reference_only
    - operations_pointer
    - derived_diagnostic
    - runtime_support
    - canonical_truth
    - legacy_artifact
    - scratch_artifact
    - shadow_worktree

strict_issue_codes:
  - missing_schema_key
  - missing_coverage_root
  - missing_active_pointer
  - stale_registry_entry
  - unregistered_tracked_file
  - reference_authority_without_enforcement
  - hidden_active_doc
  - docs_unregistered_subtree
