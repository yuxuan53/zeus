schema_version: 1
purpose: >
  Schema for Zeus's compiled topology graph. The graph is an index over existing
  authority surfaces; it must not redefine zones.yaml, invariants.yaml, or
  negative_constraints.yaml.

required_top_level_keys:
  - schema_version
  - metadata
  - coverage_roots
  - root_governed_files
  - state_surfaces
  - required_active_pointers
  - registry_directories
  - reference_fact_specs
  - digest_profiles

node_required_fields:
  - path
  - status
  - scope
  - zone
  - authority_role
  - forbidden_misread

issue_json_contract:
  schema_versions:
    "1": "legacy issue keys only"
    "2": "legacy keys plus optional typed metadata"
  legacy_fields:
    code: string
    path: string
    message: string
    severity: string
  typed_fields:
    lane: string
    scope: string
    owner_manifest: string
    repair_kind: string
    blocking_modes: list[string]
    related_paths: list[string]
    companion_of: string
    maturity: string
    expires_at: string
    confidence: string_or_number
    authority_status: string
    repair_hint: string
  enums:
    repair_kind:
      - add_registry_row
      - update_companion
      - extract_law_to_book
      - propose_owner_manifest
      - refresh_graph
      - scope_expansion
      - none
    maturity:
      - stable
      - provisional
      - placeholder
    authority_status:
      - authority
      - derived
      - evidence
      - unknown
    blocking_modes:
      - navigation
      - navigation_strict_health
      - closeout
      - strict_full_repo
      - global_health
      - admission

admission_envelope:
  schema_version: 2
  purpose: >
    The admission envelope is the canonical authority for write authorization
    in topology digest output. It separates route suggestion (profile_id and
    profile_suggested_files) from the admission decision (admitted_files,
    out_of_scope_files, forbidden_hits, status). Downstream consumers MUST
    treat admission.status as the sole signal for write authority. The legacy
    top-level `allowed_files` field is preserved for backward compatibility
    only and is marked legacy_advisory.
  required_fields:
    - schema_version
    - status
    - admitted_files
    - out_of_scope_files
    - forbidden_hits
    - profile_id
    - profile_suggested_files
    - decision_basis
    - match_policy
  status_enum:
    - admitted              # all requested files are admitted by the resolved profile
    - advisory_only         # generic profile resolution; nothing is admitted, caller may proceed read-only
    - scope_expansion_required  # one or more requested files lie outside the resolved profile
    - blocked               # one or more requested files match forbidden_files
    - route_contract_conflict   # task evidence and file evidence resolve to incompatible profiles
    - ambiguous             # multiple profiles match with equal confidence
  decision_basis_enum:
    - profile_match
    - generic_fallback
    - forbidden_hit
    - out_of_scope
    - veto
    - conflict
  match_policy:
    word_boundary: true
    negative_phrase_veto: true
    global_denylist_tokens:
      - source
      - test
      - script
      - data
      - signal
      - state
  ok_semantics:
    description: >
      Top-level `ok` denotes command success (no exception raised by the digest
      tool). It MUST NOT be used as write authorization. Authorization is
      governed by admission.status alone.

ownership:
  maturity_values:
    - stable
    - provisional
    - placeholder
  fact_types:
    doc_classification:
      canonical_owner: architecture/docs_registry.yaml
      derived_owners:
