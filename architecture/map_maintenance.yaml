schema_version: 1
metadata:
  created: "2026-04-14"
  owner_packet: "Map Maintenance Gate"
  purpose: >
    Declare which companion map/registry files must move with added or deleted
    files in active surfaces. This gate is intentionally narrow: it enforces
    registry ownership, not broad prose rewrites.
  operating_model: >
    During active refactors this is an advisory map-delta reporter. At
    precommit/closeout it becomes a blocking ownership check.
  git_tracking: >
    If the caller omits changed_files, topology_doctor reads git status and
    derives added/deleted/modified/renamed paths itself.

modes:
  advisory:
    blocking: false
    use: "During active implementation; report pending map delta only."
  precommit:
    blocking: true
    use: "Before committing a verified slice."
  closeout:
    blocking: true
    use: "At packet closeout; unresolved map delta must be handled or explicitly deferred."

rules:
  - id: docs_top_level_registry
    path_globs: ["docs/*.md", "docs/*.xlsx", "docs/*.csv", "docs/*.json"]
    on_change: [added, deleted]
    required_companions:
      - docs/AGENTS.md
      - docs/README.md
      - architecture/topology.yaml
    rationale: top-level docs files and artifacts must be routed by the docs mesh.
  - id: docs_subtree_registry
    path_globs: ["docs/*/AGENTS.md"]
    on_change: [added, deleted]
    required_companions:
      - docs/AGENTS.md
      - docs/README.md
      - architecture/topology.yaml
    rationale: new or removed docs subtrees change docs-level routing and topology docs_subroots.
  - id: src_file_registry
    path_globs: ["src/**/*.py"]
    on_change: [added, deleted]
    required_companions:
      - architecture/source_rationale.yaml
    rationale: source_rationale owns file-level src registry.
  - id: test_file_registry
    path_globs: ["tests/test_*.py"]
    on_change: [added, deleted]
    required_companions:
      - architecture/test_topology.yaml
    rationale: test_topology owns top-level active test classification.
  - id: script_file_registry
    path_globs: ["scripts/*.py", "scripts/*.sh"]
    on_change: [added, deleted]
    required_companions:
      - architecture/script_manifest.yaml
    rationale: script_manifest owns top-level script registry and lifecycle.
  - id: config_file_registry
    path_globs: ["config/*.json", "config/*.yaml", "config/*.yml"]
    on_change: [added, deleted]
    required_companions:
      - config/AGENTS.md
    rationale: top-level config files are registered in config/AGENTS.md.
  - id: reality_contract_registry
    path_globs: ["config/reality_contracts/*.yaml", "config/reality_contracts/*.yml"]
    on_change: [added, deleted]
    required_companions:
      - config/reality_contracts/AGENTS.md
    rationale: reality contract config files are registered locally.
  - id: reference_doc_registry
    path_globs: ["docs/reference/*.md"]
    on_change: [added, deleted]
    required_companions:
      - docs/reference/AGENTS.md
      - architecture/reference_replacement.yaml
    rationale: reference docs keep a human registry plus a replacement matrix.
  - id: authority_doc_registry
    path_globs: ["docs/authority/*.md"]
    on_change: [added, deleted]
    required_companions:
      - docs/authority/AGENTS.md
    rationale: authority docs remain explicitly enumerated for active law routing.
  - id: operations_doc_registry
    path_globs: ["docs/operations/task_*.md", "docs/operations/task_*/**"]
    on_change: [added, deleted]
    required_companions:
      - docs/operations/AGENTS.md
      - docs/operations/current_state.md
    rationale: active packets and sidecar evidence must remain visible from the live control surface.
  - id: runbook_doc_registry
    path_globs: ["docs/runbooks/*.md"]
    on_change: [added, deleted]
    required_companions:
      - docs/runbooks/AGENTS.md
    rationale: runbooks are operator routing surfaces and need local registry updates.
  - id: report_doc_registry
    path_globs: ["docs/reports/*"]
    on_change: [added, deleted]
    required_companions:
      - docs/reports/AGENTS.md
    rationale: tracked report artifacts need an explicit local registry entry so active evidence does not become a hidden branch.
  - id: docs_artifact_registry
    path_globs: ["docs/artifacts/*"]
    on_change: [added, deleted]
    required_companions:
      - docs/artifacts/AGENTS.md
      - architecture/artifact_lifecycle.yaml
    rationale: binary/non-md docs artifacts must be classified explicitly as evidence, not authority.
  - id: todo_list_registry
    path_globs: ["docs/to-do-list/*"]
    on_change: [added, deleted]
    required_companions:
      - docs/to-do-list/AGENTS.md
      - architecture/artifact_lifecycle.yaml
    rationale: active checklist workbooks are evidence/task inventory and must remain explicit.
  - id: architecture_manifest_registry
    path_globs: ["architecture/*.yaml", "architecture/*.md", "architecture/*.sql"]
    on_change: [added, deleted]
    required_companions:
      - architecture/AGENTS.md
      - workspace_map.md
    rationale: new or removed architecture surfaces change root-level navigation.
  - id: tests_contracts_registry
    path_globs: ["tests/contracts/*.py"]
    on_change: [added, deleted]
    required_companions:
      - tests/contracts/AGENTS.md
      - architecture/test_topology.yaml
    rationale: contract manifests need a local registry and test-topology awareness.
