schema_version: 1
metadata:
  created: "2026-04-14"
  owner_packet: "Authority Coherence & Navigation Contract"
  purpose: >
    Registry for non-obvious code shapes that are intentional system
    structure. This is an index, not a tutorial.

required_idiom_fields:
  - id
  - exists
  - shape
  - owner_gate
  - examples
  - replacement_rule

idioms:
  - id: SEMANTIC_PROVENANCE_GUARD
    exists: "Expose provenance fields to semantic_linter/static analysis in the same scope as probability/edge reads."
    shape: "unreachable static hook"
    owner_gate: scripts/semantic_linter.py
    examples:
      - src/strategy/market_analysis.py
      - src/strategy/market_analysis_family_scan.py
      - src/engine/evaluator.py
      - src/engine/monitor_refresh.py
      - src/engine/replay.py
      - src/engine/cycle_runtime.py
      - src/execution/executor.py
      - src/execution/exit_triggers.py
      - src/execution/harvester.py
      - src/state/db.py
    replacement_rule: "Equivalent linter-visible provenance hook plus tests/test_structural_linter.py coverage."
