    doc_class: router
    default_read: true
    direct_reference_allowed: true
    current_role: docs root routing and local rules
    canonical_replaced_by: []
    next_action: keep
    lifecycle_state: durable
    coverage_scope: exact
    parent_coverage_allowed: false
