schema_version: 1
metadata:
  created: '2026-04-21'
  owner_packet: docs reclassification P0
  purpose: 'Machine-readable classification for tracked docs surfaces. This registry tells agents whether a doc is law, canonical reference, live operations, evidence, archive interface, or a temporary extraction source.

    '
required_entry_fields:
- path
- doc_class
- default_read
- direct_reference_allowed
- current_role
- canonical_replaced_by
- next_action
- lifecycle_state
- coverage_scope
- parent_coverage_allowed
- truth_profile
- freshness_class
- supersedes
- superseded_by
- may_live_in_reference
- contains_volatile_metrics
- current_tense_allowed
- refresh_source
allowed_doc_classes:
- router
- authority
- reference
- module_reference
- operations
- runbook
- report
- artifact
- checklist
- archive_interface
- extraction_source
- package_input
allowed_next_actions:
- keep
- extract_then_move
- extract_then_reassess
- move_to_operations
- demote_after_extraction
- archive_after_closeout
- retain_as_evidence
allowed_lifecycle_states:
- durable
- active
- temporary
- transitional
- historical
- closed
allowed_coverage_scopes:
- exact
- descendants
parent_coverage_allowed_patterns:
- docs/operations/task_*/
- docs/operations/*_package_*/
- docs/reports/
- docs/artifacts/
- docs/to-do-list/
- docs/runbooks/
