schema_version: 1
metadata:
  created: "2026-04-14"
  owner_packet: "Historical Lore Compiler"
  purpose: >
    Dense registry of hard-won system lessons. This file extracts only
    high-signal failure modes, wrong moves, durable rules, antibodies, and
    routing terms from historical docs, ADRs, closeouts, and commit lore.
  density_policy: >
    Work packets, progress logs, and philosophy files are evidence sources, not
    default reading material. Promote only lessons that prevent repeat failures
    or materially route zero-context agents.

required_card_fields:
  - id
  - status
  - severity
  - sources
  - failure_mode
  - trigger_context
  - wrong_moves
  - correct_rule
  - antibodies
  - residual_risk
  - invalidation_condition
  - routing
  - downstream_blast_radius
  - zero_context_digest

allowed_statuses:
  - active_law
  - mitigated
  - open_gap
  - candidate
  - historical

allowed_severities:
  - critical
  - high
  - medium
  - low

cards:
  - id: DISCOVERY_MODES_SHAPE_RUNTIME_CYCLE
    status: active_law
    severity: high
    sources:
      - architecture/runtime_modes.yaml
      - src/engine/discovery_mode.py
      - src/main.py
      - src/engine/cycle_runner.py
    failure_mode: >
      Agents treat Zeus as a single undifferentiated cycle and miss that
      opening_hunt, update_reaction, and day0_capture activate different timing
      and signal behavior inside the shared CycleRunner path.
    trigger_context:
      - discovery mode changes
      - evaluator strategy classification
      - update reaction logic
      - day0 capture logic
      - runtime scheduling
    wrong_moves:
      - optimize update_reaction without checking DiscoveryMode
      - treat day0_capture as the same signal regime as opening_hunt
      - create separate runtime paths instead of parameterizing CycleRunner
    correct_rule: >
      Discovery modes are explicit CycleRunner parameters. Check
      architecture/runtime_modes.yaml and src/engine/discovery_mode.py before
      changing mode-sensitive behavior.
    antibodies:
      code:
        - src/engine/discovery_mode.py
        - src/engine/cycle_runner.py
        - src/engine/evaluator.py
      tests:
        - tests/test_runtime_guards.py
        - tests/test_fdr.py
        - tests/test_day0_runtime_observation_context.py
      gates:
        - python scripts/topology_doctor.py --runtime-modes
    residual_risk: >
      Mode-specific behavior is spread through evaluator, cycle_runner,
      executor, and tests; digest routing must keep the mode concept visible.
    invalidation_condition: >
      Only a runtime architecture packet may add/remove discovery modes or split
      them into separate code paths.
    routing:
      task_terms: [discovery mode, opening_hunt, update_reaction, day0_capture, mode-sensitive, runtime scheduling]
      file_patterns:
        - src/engine/discovery_mode.py
        - src/engine/cycle_runner.py
        - src/engine/evaluator.py
        - src/main.py
    downstream_blast_radius:
      - src/execution/executor.py
      - src/engine/monitor_refresh.py
      - tests/test_runtime_guards.py
      - tests/test_fdr.py
    zero_context_digest: >
      Zeus has three discovery modes on one CycleRunner path; mode-sensitive
      work starts at architecture/runtime_modes.yaml.

  - id: BIN_CONTRACT_KIND_DISCRETE_SETTLEMENT_SUPPORT
    status: active_law
    severity: high
    sources:
      - docs/reference/zeus_domain_model.md
      - src/types/market.py
      - tests/test_instrument_invariants.py
    failure_mode: >
      Agents reason about bins as continuous ranges and miss point,
      finite_range, and open_shoulder settlement support semantics.
    trigger_context:
      - position calculation
      - uncertainty math
      - calibration
      - edge math
      - bin parsing
    wrong_moves:
      - treat open_shoulder bins as symmetric finite ranges
      - compare p_raw across different bin support cardinalities without normalization
      - do interval math without checking discrete settlement support
    correct_rule: >
      Every uncertainty/calibration/edge change must preserve bin contract kind:
      point, finite_range, or open_shoulder.
    antibodies:
      code:
        - src/types/market.py
        - src/contracts/settlement_semantics.py
      tests:
        - tests/test_instrument_invariants.py
      gates:
        - pytest -q tests/test_instrument_invariants.py
    residual_risk: >
      This concept is easy to miss outside explicit math tasks, so root AGENTS
      keeps one index sentence and digest routes position/bin work here.
    invalidation_condition: >
      Only a Polymarket market-contract change plus authority update may alter
      bin support semantics.
    routing:
      task_terms: [bin_contract_kind, open_shoulder, finite_range, point bin, bin support, position calculation, edge math]
      file_patterns:
        - src/types/market.py
        - src/data/market_scanner.py
        - src/strategy/market_analysis.py
        - src/engine/evaluator.py
    downstream_blast_radius:
      - src/signal/ensemble_signal.py
      - src/calibration/platt.py
      - src/engine/replay.py
    zero_context_digest: >
      Bin support is discrete: point, finite_range, or open_shoulder. Do not
      reason about settlement bins as generic continuous intervals.

  - id: HISTORICAL_LORE_DENSITY_POLICY
    status: active_law
    severity: high
    sources:
      - architecture/history_lore.yaml
      - docs/archives/**
      - .omx/context/**
      - git commit trailers
    failure_mode: >
      Agents treat low-density work packets, progress logs, and philosophy
      files as default reading material, exhausting context while still missing
      the few failure modes that actually prevent repeat incidents.
    trigger_context:
      - historical analysis
      - lore extraction
      - archive cleanup
      - topology expansion
      - zero-context onboarding
    wrong_moves:
      - summarize work packets chronologically
      - load whole archive folders by default
      - promote philosophical narrative into active law without an antibody
      - preserve progress files as if they were high-density operational memory
    correct_rule: >
      Extract only dense cards: failure mode, wrong move, correct rule,
      antibody, residual risk, invalidation condition, and task routing.
    antibodies:
      code:
        - scripts/topology_doctor.py
      tests:
        - tests/test_topology_doctor.py
      gates:
        - python scripts/topology_doctor.py --history-lore
    residual_risk: >
      The first lore registry is hand-curated. A later pruning package should
      remove or archive low-density historical surfaces after their useful lore
      has been extracted.
    invalidation_condition: >
      Only a better compressed memory substrate can replace this density policy;
      raw progress logs should still not become default context.
    routing:
      task_terms: [history, lore, archive, work packet, progress, philosophy, context]
      file_patterns:
        - architecture/history_lore.yaml
        - docs/archives/**
        - .omx/context/**
    downstream_blast_radius:
      - workspace_map.md
      - AGENTS.md
      - scripts/topology_doctor.py
    zero_context_digest: >
      Do not summarize history wholesale. Promote only dense, actionable lessons
      that route future agents and have antibodies or explicit residual risk.

  - id: ARCHIVE_CONTAMINATION_PROMOTION_GATE
    status: active_law
    severity: high
    sources:
      - docs/archive_registry.md
      - docs/operations/zeus_workspace_authority_reconstruction_package_2026-04-20_v2/05_archives_policy.md
      - docs/operations/zeus_workspace_authority_reconstruction_package_2026-04-20_v2/08_patch_blueprints/p3_patch_blueprint.md
    failure_mode: >
      Agents promote raw archive content, secret-bearing historical prose, or
      binary/scratch debris into active docs because the archive is locally
      available and appears to answer a current question.
    trigger_context:
      - archive lookup
      - historical compression
      - lore extraction
      - packet reconstruction
      - online review context
    wrong_moves:
      - copy archive prose wholesale into active docs
      - track archive bodies or bundles as default context
      - quote secret-bearing archive lines into current authority
      - treat archived DBs/spreadsheets/reports as canonical runtime truth
      - omit the [Archive evidence] label on archive-derived claims
    correct_rule: >
      Use archives only as historical evidence. Promote only sanitized,
      rewritten, dense lessons through the visible archive registry or
      history-lore path, and never let archive prose outrank current manifests,
      tests, source, packets, or canonical DB truth.
    antibodies:
      docs:
        - docs/archive_registry.md
        - docs/AGENTS.md
        - docs/README.md
      tests:
        - tests/test_topology_doctor.py
      gates:
        - python scripts/topology_doctor.py --docs
        - python scripts/topology_doctor.py --history-lore
    residual_risk: >
      Local ignored archive bundles can still be opened manually. The gate is
      procedural unless a future secret-scan or archive-reader tool enforces
      sanitization before promotion.
    invalidation_condition: >
      Only a reviewed archive ingestion system with secret scanning,
      provenance labeling, and machine-enforced non-authority status may replace
      this manual promotion gate.
    routing:
      task_terms: [archive, archives.zip, cold storage, promotion, contamination, secret, historical evidence]
      file_patterns:
        - docs/archive_registry.md
        - architecture/history_lore.yaml
        - docs/archives/**
        - docs/operations/zeus_workspace_authority_reconstruction_package_2026-04-20_v2/05_archives_policy.md
    downstream_blast_radius:
      - docs/README.md
      - docs/AGENTS.md
      - workspace_map.md
      - architecture/context_budget.yaml
    zero_context_digest: >
      Archive material is cold evidence, not law. Sanitize, label
      [Archive evidence], and rewrite into dense current guidance before
      promotion.

  - id: WMO_ROUNDING_BANKER_FAILURE
    status: active_law
    severity: critical
    sources:
      - AGENTS.md
      - docs/reports/legacy_reference_statistical_methodology.md
      - docs/reference/zeus_math_spec.md
      - docs/operations/known_gaps.md
    failure_mode: >
      Settlement, probability, or calibration code uses banker rounding or
      integer coercion while WU/Polymarket settlement truth uses WMO asymmetric
      half-up integer rounding.
    trigger_context:
      - settlement writes
      - p_raw generation
      - day0 signal rounding
      - replay settlement scoring
      - calibration target construction
    wrong_moves:
      - use Python round() for settlement values
      - use numpy round/around for settlement values
      - use int(x + 0.5), which truncates negatives toward zero
      - treat Celsius and Fahrenheit bins as interchangeable continuous ranges
    correct_rule: "Use SettlementSemantics; WMO rounding is floor(x + 0.5)."
    antibodies:
      code:
        - src/contracts/settlement_semantics.py
      tests:
        - tests/test_instrument_invariants.py
      gates:
        - python scripts/semantic_linter.py
        - python scripts/topology_doctor.py --strict
    residual_risk: >
      New scripts or data rebuild code can still bypass SettlementSemantics
      unless script and semantic gates are run.
    invalidation_condition: >
      Only an explicit Polymarket/WU settlement-source rule change can overturn
      this lore; otherwise code that disagrees is wrong.
    routing:
      task_terms: [rounding, WMO, settlement, p_raw, calibration, replay, day0]
      file_patterns:
        - src/contracts/settlement_semantics.py
        - src/signal/**
        - src/strategy/market_analysis.py
        - src/engine/replay.py
        - scripts/rebuild_*.py
    downstream_blast_radius:
      - src/signal/ensemble_signal.py
      - src/signal/day0_signal.py
      - src/engine/replay.py
      - src/calibration/store.py
      - scripts/rebuild_calibration.py
      - src/execution/harvester.py
    zero_context_digest: >
      Before touching settlement/probability/calibration, verify WMO half-up
      through SettlementSemantics and never use banker rounding.

  - id: DIAGNOSTIC_BACKTEST_NON_PROMOTION
    status: active_law
    severity: critical
    sources:
      - AGENTS.md
      - docs/authority/zeus_live_backtest_shadow_boundary.md
      - architecture/data_rebuild_topology.yaml
      - .omx/context/packet8_data_rebuild_topology_closeout_2026-04-13.md
    failure_mode: >
      Backtest, replay, JSON, or CSV diagnostics are treated as authorization
      for live strategy, calibration, or DB truth changes.
    trigger_context:
      - replay PnL interpretation
      - wu_settlement_sweep interpretation
      - trade_history_audit interpretation
      - derived report generation
      - data rebuild certification
    wrong_moves:
      - promote state/zeus_backtest.db into zeus-world.db or zeus_trades.db
      - coerce missing replay PnL to zero
      - tune Kelly/FDR/alpha from contaminated backtest metrics
      - treat WU settlement coverage as strategy replay coverage
    correct_rule: >
      Backtest may evaluate only. Live strategy changes require certified data,
      point-in-time forecast references, market-price linkage, and packet
      evidence.
    antibodies:
      code:
        - scripts/run_replay.py
        - scripts/audit_replay_fidelity.py
      tests:
        - tests/test_topology_doctor.py
        - tests/test_replay_time_provenance.py
        - tests/test_backtest_settlement_value_outcome.py
      gates:
        - python scripts/topology_doctor.py --data-rebuild
        - python scripts/audit_replay_fidelity.py
    residual_risk: >
      Diagnostics can still influence human/agent reasoning unless digest
      routing reminds agents that reports are non-promotion.
    invalidation_condition: >
      Only a future authority packet may promote a diagnostic lane, and it must
      update live/backtest/shadow boundary law and machine gates.
    routing:
      task_terms: [backtest, replay, audit, PnL, wu_settlement_sweep, trade_history_audit]
      file_patterns:
        - src/engine/replay.py
        - scripts/run_replay.py
        - scripts/audit_replay_fidelity.py
        - state/zeus_backtest.db
    downstream_blast_radius:
      - src/strategy/market_fusion.py
      - src/strategy/kelly.py
      - src/engine/evaluator.py
      - state/zeus-world.db
      - state/zeus_trades.db
    zero_context_digest: >
      Treat replay/backtest output as diagnostic evidence only; never promote it
      into live DB truth or strategy authority.

  - id: VERIFIED_AUTHORITY_IS_CONTRACT_NOT_STAMP
    status: active_law
    severity: critical
    sources:
      - docs/authority/zeus_k4_fix_pack_adr.md
      - git log K4.5 commits
    failure_mode: >
      Data rebuild scripts stamp rows authority='VERIFIED' after shallow checks,
      letting wrong-unit, Kelvin, NaN, or wrong-member-count rows pass through
      the live calibration gate.
    trigger_context:
      - settlement rebuild
      - rebuild_calibration
      - refit_platt
      - calibration pair reads
      - ensemble snapshot ingestion
    wrong_moves:
      - set authority='VERIFIED' without per-row validation
      - read calibration_pairs without authority='VERIFIED'
      - swallow DB errors while reporting successful row counts
      - assert only len(rows) > 0 in rebuild tests
    correct_rule: >
      VERIFIED is a contract. Validate row content before constructing atoms,
      filter SELECTs at the perimeter, and test exact semantics.
    antibodies:
      code:
        - src/data/rebuild_validators.py
        - src/calibration/store.py
        - src/calibration/blocked_oos.py
        - src/calibration/effective_sample_size.py
        - scripts/rebuild_calibration.py
        - src/execution/harvester.py
      tests:
        - tests/test_rebuild_validators.py
        - tests/test_rebuild_pipeline.py
        - tests/test_authority_gate.py
        - tests/test_semantic_linter.py
      gates:
        - python scripts/semantic_linter.py
        - python scripts/topology_doctor.py --data-rebuild
    residual_risk: >
      Operator scripts are still a named perimeter gap unless script manifest
      and review gates classify their write targets.
    invalidation_condition: >
      Only a new data authority architecture can change the VERIFIED contract;
      convenience or missing columns cannot.
    routing:
      task_terms: [VERIFIED, authority, calibration_pairs, refit, data rebuild, calibration rebuild, settlement rebuild]
      file_patterns:
        - src/data/rebuild_validators.py
        - src/calibration/**
        - scripts/rebuild_*.py
        - scripts/refit_platt.py
    downstream_blast_radius:
      - src/engine/evaluator.py
      - src/strategy/market_fusion.py
      - src/calibration/manager.py
      - state/zeus-world.db
    zero_context_digest: >
      Do not stamp authority. Validate content first, default reads to VERIFIED,
      and use exact-count/exact-format tests.

  - id: CANONICAL_DB_TRUTH_OUTRANKS_JSON_FALLBACK
    status: active_law
    severity: critical
    sources:
      - AGENTS.md
      - docs/archives/work_packets/REPAIR-REALIZED-TRUTH-CONVERGENCE.md
      - docs/operations/known_gaps.md
      - git log live-only cleanup commits
    failure_mode: >
      Derived JSON caches, status summaries, or legacy paper files outrank
      canonical DB/event truth, causing risk, bankroll, and operator surfaces to
      diverge.
    trigger_context:
      - load_portfolio fallback behavior
      - RiskGuard realized PnL
      - status_summary generation
      - strategy_tracker reporting
      - paper/live cleanup
    wrong_moves:
      - promote positions.json or status_summary.json into canonical truth
      - let fallback JSON hide projection failure
      - compute realized PnL from stale tracker/report artifacts
      - treat paper artifacts as active live-only runtime state
    correct_rule: >
      Chain and canonical DB/event truth outrank derived caches. Fallbacks must
      be explicit, degraded, and operator-visible.
    antibodies:
      code:
        - src/state/projection.py
        - src/state/ledger.py
        - src/riskguard/riskguard.py
        - src/observability/status_summary.py
      tests:
        - tests/test_pnl_flow_and_audit.py
        - tests/test_riskguard.py
        - tests/test_cross_module_relationships.py
      gates:
        - python scripts/topology_doctor.py --source
        - python scripts/verify_truth_surfaces.py
    residual_risk: >
      Legacy files still exist as historical artifacts; agents can misread them
      unless topology/state classifications are checked.
    invalidation_condition: >
      Only a future canonical truth redesign can change precedence; derived
      exports remain non-authority.
    routing:
      task_terms: [portfolio, JSON fallback, riskguard, status_summary, bankroll, realized PnL, canonical]
      file_patterns:
        - src/state/**
        - src/riskguard/**
        - src/observability/status_summary.py
        - state/*.json
    downstream_blast_radius:
      - src/engine/cycle_runtime.py
      - src/control/control_plane.py
      - src/state/strategy_tracker.py
      - state/zeus_trades.db
    zero_context_digest: >
      Never let JSON/status/report artifacts outrank canonical DB/event truth;
      degraded fallback must be labeled.

  - id: UNCOMMITTED_AGENT_EDIT_LOSS
    status: active_law
    severity: critical
    sources:
      - AGENTS.md
      - docs/archives/investigations/agent_edit_loss_investigation.md
    failure_mode: >
      Large uncommitted multi-agent work is lost through checkout/restore/reset,
      stash application, or concurrent last-writer-wins edits.
    trigger_context:
      - long-running packet implementation
      - multi-agent edits
      - dirty worktree cleanup
      - shared file ownership
    wrong_moves:
      - run git checkout/restore/reset/clean on a dirty worktree
      - apply an old stash without inspection and human approval
      - let two agents write the same file concurrently
      - leave more than one verified batch uncommitted when commits are authorized
    correct_rule: >
      Protect uncommitted work, assign file ownership, avoid destructive git
      commands, and commit verified batches when commit authority exists.
    antibodies:
      code: []
      tests: []
      gates:
        - git status --short
        - git diff --check
      docs:
        - AGENTS.md
    residual_risk: >
      This remains partly procedural because Codex cannot enforce git behavior
      outside explicit commands.
    invalidation_condition: >
      Only a transactional multi-agent editing substrate would reduce this law;
      until then, dirty worktree protection remains mandatory.
    routing:
      task_terms: [multi-agent, commit, stash, restore, reset, dirty worktree, lost edits]
      file_patterns: []
    downstream_blast_radius:
      - all source files touched in shared sessions
    zero_context_digest: >
      In a dirty worktree, never reset/restore/stash-pop; protect user and
      agent edits and serialize overlapping writes.

  - id: POST_CLOSE_CONTROL_SURFACE_MISMATCH
    status: active_law
    severity: high
    sources:
      - .omx/artifacts/user-p4-2-postclose-review-20260404T010500Z.md
      - .omx/notepad.md
      - docs/operations/current_state.md
      - docs/operations/runtime_artifact_inventory.md
    failure_mode: >
      A packet's code and tests are complete, but active control surfaces still
      point at stale packet state or omit the post-close verifier evidence,
      causing the next agent to freeze or execute from a false state.
    trigger_context:
      - packet closeout
      - post-close critic or verifier review
      - current_state updates
      - operations packet archival
      - context compaction handoff
    wrong_moves:
      - mark a packet complete before pre-close and post-close reviews finish
      - freeze the next packet while current_state still says review pending
      - leave completed packet work logs under docs/operations as active evidence
      - rely on .omx/.omc runtime state instead of repo-facing current_state
    correct_rule: >
      Closeout is not complete until code, tests, current_state, operations
      registry, archive pointers, and post-close review evidence agree. If
      those surfaces disagree, block the next packet freeze.
    antibodies:
      code: []
      tests:
        - tests/test_topology_doctor.py
      gates:
        - python scripts/topology_doctor.py --docs
        - python scripts/topology_doctor.py --work-record --changed-files <files> --work-record-path <record>
      docs:
        - docs/operations/current_state.md
        - docs/operations/runtime_artifact_inventory.md
    residual_risk: >
      Runtime-only review artifacts under .omx/.omc can still be deleted
      locally; durable conclusions must be mirrored into current_state,
      manifests, lore, or archive pointers before the next packet starts.
    invalidation_condition: >
      Only a stronger machine receipt/archive system that validates review
      evidence and current_state parity can replace this closeout rule.
    routing:
      task_terms: [closeout, post-close, current_state, verifier, critic, handoff, archive, packet complete]
      file_patterns:
        - docs/operations/**
        - .omx/artifacts/*postclose*
        - .omx/context/*closeout*
        - .omc/plans/*.md
    downstream_blast_radius:
      - docs/operations/current_state.md
      - docs/operations/AGENTS.md
      - architecture/artifact_lifecycle.yaml
      - scripts/topology_doctor_docs_checks.py
    zero_context_digest: >
      Packet code green is not enough; freeze the next packet only after
      current_state, operations registry, archive pointers, and post-close
      review evidence agree.

  - id: FDR_CANDIDATE_FAMILY_NOT_WHOLE_CYCLE
    status: active_law
    severity: high
    sources:
      - AGENTS.md
      - git commit "Align FDR authority with candidate families"
      - tests/test_fdr.py
    failure_mode: >
      Docs or strategy code claim whole-cycle BH/FDR control while the
      implemented control unit is the active tested candidate family.
    trigger_context:
      - strategy selection
      - FDR filtering
      - replay interpretation
      - statistical methodology docs
    wrong_moves:
      - claim whole-cycle BH control without cycle-level aggregation
      - exclude hypotheses that failed positive-edge prefilter from the family
      - change FDR narrative without tests
    correct_rule: >
      Zeus currently applies BH over the active tested candidate/market/snapshot
      family, including hypotheses that fail positive-edge prefilter.
    antibodies:
      code:
        - src/strategy/fdr_filter.py
        - src/strategy/selection_family.py
      tests:
        - tests/test_fdr.py
        - tests/test_runtime_guards.py
      gates:
        - pytest -q tests/test_fdr.py
    residual_risk: >
      Whole-cycle BH would be a future strategy-math redesign, not a wording
      change.
    invalidation_condition: >
      A future packet may implement cycle-level aggregation and update this lore
      with replay parity evidence.
    routing:
      task_terms: [FDR, BH, selection family, hypothesis, candidate family]
      file_patterns:
        - src/strategy/fdr_filter.py
        - src/strategy/selection_family.py
        - src/engine/evaluator.py
    downstream_blast_radius:
      - src/strategy/market_analysis.py
      - src/engine/replay.py
    zero_context_digest: >
      Do not claim whole-cycle BH control; current FDR law is active tested
      candidate-family control.

  - id: ENTRY_EXIT_EPISTEMIC_ASYMMETRY
    status: mitigated
    severity: high
    sources:
      - docs/operations/known_gaps.md
      - docs/archives/audits/math_audit_2026_04_06.md
      - git commits around monitor_chain_missing, CI-aware exit, divergence thresholds
    failure_mode: >
      Entry requires bootstrap/FDR evidence while exit acts on weaker point
      estimates or missing monitor chains, causing false exits or missed
      protective actions.
    trigger_context:
      - monitor refresh
      - exit_triggers
      - settlement-sensitive positions
      - day0 exit authority
    wrong_moves:
      - exit on raw forward_edge without coherent CI/audit context
      - force exit solely because monitor evidence is missing
      - treat monitor_chain_missing as a trade signal
      - ignore missing best_bid/current price provenance
    correct_rule: >
      Exit evidence must be explicit and auditable. Missing monitor chains are
      infrastructure RED, not an exit trigger by themselves.
    antibodies:
      code:
        - src/engine/cycle_runtime.py
        - src/engine/monitor_refresh.py
        - src/execution/exit_triggers.py
        - src/state/portfolio.py
      tests:
        - tests/test_runtime_guards.py
        - tests/test_live_safety_invariants.py
        - tests/test_day0_exit_gate.py
      gates:
        - pytest -q tests/test_runtime_guards.py tests/test_live_safety_invariants.py
