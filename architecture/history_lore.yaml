  - id: NUMPY_ARRAY_TRUTHINESS_IN_CONDITIONALS
    status: active_law
    severity: high
    sources:
      - "commit f6eaa72 (data-improve): critic-response — numpy truthiness fix"
      - "docs/operations/task_2026-04-14_topology_context_efficiency/work_log.md"
    failure_mode: >
      Using `if array_variable:` on a numpy array with >1 element raises
      ValueError at runtime. This only surfaces when the array is non-empty
      AND has multiple elements — single-element arrays silently work.
    trigger_context: >
      Platt-parameterized bootstrap paths in market_analysis.py assigned
      `platt_params = calibrator.bootstrap_params` (a numpy array), then
      tested `if platt_params:` in an inner loop. Tests with unfitted
      calibrators never triggered it. Only adding Platt bootstrap tests
      with a mock fitted calibrator exposed the crash.
    wrong_moves:
      - "Using `if variable:` truthiness checks on numpy arrays"
      - "Testing only the un-calibrated path and assuming the calibrated path works"
    correct_rule: >
      Always use a pre-computed boolean (`has_platt = ... is not None and ...`)
      or explicit `len()` / `.size` checks for numpy array conditionals.
      Never rely on truthiness of numpy arrays.
    antibodies:
      code:
        - src/strategy/market_analysis.py
      tests:
        - tests/test_k3_slice_p.py
      gates:
        - pytest -q tests/test_k3_slice_p.py -k PlattCalibrator
    residual_risk: >
      Other numpy arrays in conditional positions may exist elsewhere in
      the codebase; no static scan currently enforces this.
    invalidation_condition: >
      A static linter rule that flags `if <numpy_array>:` patterns would
      make this lore entry redundant.
    routing:
      task_terms: [numpy, truthiness, ValueError, array, bootstrap, platt, calibrator]
      file_patterns:
        - src/strategy/market_analysis.py
        - tests/test_k3_slice_p.py
    downstream_blast_radius:
      - src/strategy/market_analysis.py
      - tests/test_k3_slice_p.py
    zero_context_digest: >
      Never use `if numpy_array:` — it raises ValueError when the array
      has multiple elements. Use a pre-computed boolean instead.

  - id: ORACLE_TRUNCATION_BIAS
    status: active_law
    severity: high
    sources:
      - docs/authority/zeus_current_architecture.md
      - src/contracts/settlement_semantics.py
      - src/strategy/oracle_penalty.py
      - data/oracle_error_rates.json
    failure_mode: >
      HKO rounds settlement temperatures by truncation (floor), not WMO
      half-up. Applying WMO rounding to HKO cities created a systematic
      +0.5°C oracle bias that inflated edge estimates and caused losses.
    trigger_context:
      - HKO settlement handling
      - oracle penalty updates
      - settlement rounding changes
      - calibration/replay work touching settlement values
    wrong_moves:
      - "Assuming all sources use WMO half-up rounding"
      - "Hardcoding round_half_up without per-source dispatch"
      - "Treating oracle error rates as canonical settlement truth"
    symptoms:
      - "HKO settlement values off by 1 bin vs Polymarket resolution"
      - "Persistent positive edge on HKO cities that vanishes at settlement"
      - "Calibration drift on Hong Kong markets"
    correct_rule: >
      Use SettlementSemantics.for_city(city) to get the correct rounding
      law. HKO uses oracle_truncate (math.floor); all others use wmo_half_up.
      Never call round() or math.floor() directly on settlement values.
    antibodies:
      code:
        - src/contracts/settlement_semantics.py
        - src/strategy/oracle_penalty.py
      tests:
        - tests/test_instrument_invariants.py
      gates:
        - pytest -q tests/test_instrument_invariants.py -k settlement
    residual_risk: >
      Other weather sources (CWA, NOAA) may also use non-WMO rounding;
      not yet investigated.
    invalidation_condition: >
      If HKO changes its rounding method or PM standardises bin resolution,
      the oracle_truncate path may need updating.
    routing:
      task_terms: [hko, oracle, truncate, rounding, settlement, floor, bias]
      file_patterns:
        - src/contracts/settlement_semantics.py
        - src/strategy/oracle_penalty.py
        - data/oracle_error_rates.json
    downstream_blast_radius:
      - src/contracts/settlement_semantics.py
      - src/signal/day0_signal.py
      - src/strategy/market_analysis.py
      - src/engine/evaluator.py
      - src/engine/replay.py
    zero_context_digest: >
      HKO/Oracle settlement semantics use truncation, not WMO half-up. Route
      all settlement rounding through SettlementSemantics.for_city and keep
      oracle_penalty as evidence/penalty logic, not canonical truth.
    zero_context_digest: >
      HKO truncates temperatures (floor), not WMO half-up. Use
      SettlementSemantics.for_city() to dispatch the correct rounding law.
