    correct_rule: >
      Every row in a canonical authority table carries its own
      provenance: source, authority grade, decision_time_snapshot_id,
      imported_at. Bulk-batch writes must carry per-row evidence, not
      batch-wide evidence. Row-level provenance survives batch
      boundaries; batch-wide provenance does not.
    antibodies:
