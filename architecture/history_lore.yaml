  - id: DB_TRIGGER_ENFORCED_AUTHORITY_MONOTONICITY
    status: active_law
    severity: critical
    sources:
      - docs/operations/task_2026-04-23_data_readiness_remediation/evidence/pb_schema_plan.md
      - src/state/db.py
    failure_mode: >
      Any code path — including future agents, scripts, or direct SQL —
      can silently demote a VERIFIED row to UNVERIFIED or downgrade the
      authority grade of a settlement. Python-layer gates cannot defend
      against writers that bypass them.
    trigger_context:
      - settlement writes
      - authority-grade transitions (VERIFIED / UNVERIFIED / QUARANTINED)
      - data migrations that touch authority columns
      - direct SQL ad-hoc queries on the operations DB
    wrong_moves:
      - rely on Python-layer SettlementSemantics.assert_settlement_value() as the sole guard
      - trust a migration script to self-police its authority invariants
      - assume in-code enforcement extends to all current + future writers
    correct_rule: >
      Authority-monotonicity invariants that must survive every writer
      belong at the DB trigger layer, not the application layer. Python
      guards are defense-in-depth above the trigger, not in place of it.
    antibodies:
      gates:
        - settlements_authority_monotonic trigger (v2 with json_type + length checks)
        - settlements_verified_insert_integrity trigger (S2.2)
        - settlements_verified_update_integrity trigger (S2.2)
      tests:
        - tests/test_settlements_authority_trigger.py
        - tests/test_settlements_verified_row_integrity.py
    residual_risk: >
      A migration that drops + recreates the settlements table without
      re-installing the triggers would re-expose the category. Mitigation:
      migration helpers already re-install on DROP+CREATE (REOPEN-2 pattern).
    invalidation_condition: >
      Only a complete replacement of SQLite with an engine whose CHECK /
      trigger semantics differ materially supersedes this rule.
    routing:
      task_terms: [authority, monotonicity, settlement authority, DB trigger, VERIFIED, QUARANTINED]
      file_patterns:
        - src/state/db.py
        - tests/test_settlements_*.py
    downstream_blast_radius:
      - src/state/portfolio.py
      - src/engine/evaluator.py
      - docs/operations/current_data_state.md
    zero_context_digest: >
      Authority invariants that must survive every writer belong in DB
      triggers, not in application code. Re-install triggers on every
      table rebuild.

  - id: FAIL_CLOSED_EXTERNAL_API_PARSING
    status: active_law
    severity: high
    sources:
      - docs/operations/task_2026-04-23_live_harvester_enablement_dr33/plan.md
      - src/execution/harvester.py
    failure_mode: >
      External API responses (Polymarket Gamma, UMA votes, CLOB
      orderbook) drift silently — fields rename, shapes change, edge
      cases emerge — and tolerant parsers produce plausibly-wrong
      outputs that feed authority decisions (settlements, risk actions,
      position state).
