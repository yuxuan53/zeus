    zero_context_digest: >
      Batch-wide provenance is non-provenance. Every row in an authority
      table carries its own source + authority + decision_snapshot_id.

  - id: VERIFIED_WITHOUT_PER_ROW_EVIDENCE_IS_FALSE_CONFIDENCE
    status: active_law
    severity: critical
    sources:
      - docs/operations/zeus_world_data_forensic_audit_package_2026-04-23/12_major_findings.md
      - docs/operations/task_2026-04-23_data_readiness_remediation/first_principles.md
    failure_mode: >
      42,749 WU daily observations were stamped VERIFIED but 39,431 had
      empty provenance_metadata. Authority grade is inflated: the
      system believes it knows things it cannot prove. Downstream
      consumers trust VERIFIED as a semantic but it carries no
      verifiable evidence.
    trigger_context:
      - authority-grade columns on bulk-imported data
      - migrations that back-stamp historical rows
      - VERIFIED / UNVERIFIED / QUARANTINED taxonomies
    wrong_moves:
      - default unknown-provenance rows to VERIFIED on migration
      - treat absence of provenance as verified-by-proxy (nothing flagged it)
      - conflate row-exists with row-is-verified
    correct_rule: >
      VERIFIED is a strong claim that requires per-row evidence. A row
      without verifiable source + timestamp + authority chain CANNOT
      be VERIFIED; it is UNVERIFIED or QUARANTINED. Authority inflation
      is the canonical data provenance antipattern and the direct
      embodiment of Fitz Constraint #4 "data provenance > code
      correctness".
    antibodies:
