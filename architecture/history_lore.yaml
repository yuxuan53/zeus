        - document the sample count + date in the test docstring
    residual_risk: >
      API providers can change response shape between verification and
      deployment. Mitigation: dated last-verified stamps on parsers with
      operator periodic re-verification.
    invalidation_condition: >
      If external APIs move to typed, versioned contracts with
      enforceable schemas (e.g. protobuf with strict mode), the hand-
      coded fail-closed parsing may be replaceable with codegen'd
      strict parsers.
    routing:
      task_terms: [external API, Gamma, UMA, fail-closed parsing, schema drift]
      file_patterns:
        - src/execution/harvester.py
        - src/data/*.py
        - tests/test_harvester_*.py
    downstream_blast_radius:
