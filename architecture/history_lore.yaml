    correct_rule: >
      Hardening asynchronous execution truth follows a 4-phase
      progression (P0) harden current live behavior (stop the bleed);
      (P1) introduce durable execution command truth (venue_commands +
      venue_command_events with submit-before-side-effect discipline);
