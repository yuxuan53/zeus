      - reading UMA resolution votes
      - CLOB orderbook shape assumptions
      - any external API whose output is downstream authority input
    wrong_moves:
      - use .get(key, default) with plausible defaults when the default would produce a wrong-but-valid downstream decision
      - silent pass-through of unexpected shapes
      - assume an absent field means a specific semantic
    correct_rule: >
      External-API parsers that feed authority decisions must fail
      closed on any unexpected shape. Verify assumptions against real
      response samples before coding; never accept a silent default for
      a field whose absence changes the authority verdict.
    antibodies:
      code:
        - src/execution/harvester.py _find_winning_bin (hard-raises on unexpected shape)
      tests:
        - tests/test_harvester_dr33_live_enablement.py
      discipline:
