      degrades to rubber-stamping. Adversarial 10-ask template is load-
      bearing.

  - id: FORENSIC_DATA_AUDIT_TEMPLATE
    status: active_law
    severity: high
    sources:
      - docs/operations/zeus_world_data_forensic_audit_package_2026-04-23/
      - docs/operations/task_2026-04-23_data_readiness_remediation/first_principles.md
    failure_mode: >
      Inherited or migrated databases carry unknown authority gaps.
      Ad-hoc audits miss systemic issues (DST, point-in-time, source
      tiering, join-safety) because they probe random tables rather
      than following a semantic sequence.
    trigger_context:
      - inherited DB (from another team, another repo, a merger)
      - post-migration data-trustworthiness verification
      - pre-live-readiness data audit
      - cross-metric / dual-track identity surfaces
    wrong_moves:
      - sample a few tables and declare looks-ok
      - trust schema conformance as evidence of semantic correctness
      - audit without a provenance-chain traversal
      - skip DST / timezone / point-in-time checks because code-handles-it
    correct_rule: >
      Forensic data audits follow a reusable sequence (1) schema audit
      (shapes + constraints), (2) table-by-table truth audit (authority
      grade per table), (3) source tiering (TIER_A/B/C/D with
      authority-chain traceback), (4) time geometry + DST (London
      2025-03-30 style pitfalls), (5) causality + point-in-time
      (decision_time_snapshot_id presence), (6) settlement alignment
      (row identity vs source identity join-safety), (7) provenance +
      authority (per-row evidence presence), (8) backfill script audit
      (what writes where with what invariants), (9) downstream usage
      audit (who reads what and assumes what).
    antibodies:
      template:
        - docs/operations/zeus_world_data_forensic_audit_package_2026-04-23
      artifacts:
        - 10 critical findings + 10 structural fixes in 12_major_findings.md
        - safe/unsafe use-case matrix in 11_data_readiness_ruling.md
    residual_risk: >
      Template is template; specific DBs may require additional steps
      (e.g. geospatial indices, graph-data integrity). Apply as base
      sequence, extend per-domain.
    invalidation_condition: >
      Only a canonical data-quality certification framework with
      automated enforcement (e.g. Great Expectations + authority-layer
      compilation) supersedes the manual audit template.
    routing:
      task_terms: [forensic audit, data trustworthiness, provenance audit, DST, point-in-time, join-safety]
      file_patterns:
        - docs/operations/*forensic_audit*
        - docs/operations/task_*_data_readiness_remediation/
    downstream_blast_radius:
      - every future inherited-DB onboarding
      - every pre-live-readiness data audit
    zero_context_digest: >
      9-step sequence schema - table-truth - source tiering - DST -
      causality/PIT - settlement alignment - provenance - backfill -
      downstream. Apply as base template; extend per-domain.

  - id: EXECUTION_STATE_TRUTH_FOUR_PHASE_PROGRESSION
