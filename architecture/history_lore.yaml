  - id: INV_14_IDENTITY_SPINE_FOR_CANONICAL_ROWS
    status: active_law
    severity: critical
    sources:
      - docs/operations/task_2026-04-23_data_readiness_remediation/first_principles.md
      - src/state/db.py
      - docs/operations/zeus_world_data_forensic_audit_package_2026-04-23
    failure_mode: >
      Without a typed identity spine, rows in canonical authority
      tables cannot be joined safely across time, cannot be audited for
      decision-time provenance, and cannot be distinguished when their
      physical_quantity or observation_field differs (e.g. HIGH vs LOW
      metric for the same city x date).
    trigger_context:
      - settlement rows
      - observation rows (hourly, daily)
      - any canonical authority table that downstream trusts
    wrong_moves:
      - use (city, target_date) as the canonical key
      - assume temperature_metric can be inferred from source at join time
      - omit decision_time_snapshot_id from row-level provenance
    correct_rule: >
      Canonical authority rows carry a 4-column identity spine:
      temperature_metric + physical_quantity + observation_field +
      data_version. Plus a provenance_json sidecar with required keys
      including decision_time_snapshot_id. The spine makes join
      ambiguity structurally impossible: two rows cannot share the
      identity-key subset unless they semantically describe the same
      observation at the same point in time.
    antibodies:
      schema:
        - settlements table INV-14 columns + UNIQUE(city, target_date, temperature_metric)
        - observation_instants_v2 32-col with INV-14 spine extension
      tests:
        - tests/test_settlements_unique_migration.py
    residual_risk: >
      Legacy rows pre-INV-14 do not carry the spine. Migration backfills
      the spine when source+metric are derivable; otherwise row is
      QUARANTINED.
    invalidation_condition: >
      Only a replacement identity scheme (e.g. content-addressable
      hashes derived from full canonical context) supersedes the
      four-column spine.
    routing:
      task_terms: [INV-14, identity spine, canonical row, temperature_metric, physical_quantity, data_version]
      file_patterns:
        - src/state/db.py
        - tests/test_*_unique_migration.py
    downstream_blast_radius:
      - every join against settlements / observations
      - calibration corpus identity at bucket boundary
      - dual-track (HIGH/LOW) separation at every layer
    zero_context_digest: >
      Canonical authority rows carry a 4-column identity spine +
      provenance_json. (city, target_date) alone is not safe; metric +
      physical_quantity are required to disambiguate dual-track.

  - id: BUG_DISPOSITION_TAXONOMY_TERMINATES_OPEN_LISTS
    status: active_law
    severity: medium
    sources:
      - docs/operations/task_2026-04-16_dual_track_metric_spine/work_log.md
      - docs/to-do-list/zeus_bug100_reassessment_table.csv
    failure_mode: >
      Open-ended bug lists accumulate indefinitely because is-this-fixed
      has no canonical answer. Lists grow, triage gets skipped, agents
      face a wall of unresolved items that cannot be closed.
    trigger_context:
      - multi-month bug sweeps
      - post-audit findings lists
      - backlog triage after long work
    wrong_moves:
      - keep items as open until fully resolved by new code
      - conflate not-done with still-applicable
      - refuse to close items that were absorbed by other work
    correct_rule: >
      Every item in a bug sweep routes to exactly one disposition:
      PRE_EXISTING_FIX (already fixed by earlier work), RESOLVED (fixed
      by this sweep), ABSORBED (covered by another packet / workstream),
      or FORWARDED (explicitly moved to a new packet with pointer). The
      taxonomy converts an unbounded list into a closed disposition set.
    antibodies:
      artifacts:
        - docs/to-do-list/zeus_bug100_reassessment_table.csv
        - bug100 routing table in task_2026-04-16_dual_track_metric_spine
      discipline:
        - every sweep output MUST route each item; un-routed items block closure
    residual_risk: >
      Taxonomy quality depends on triage rigor. Mitigation: explicit
      cross-references from each disposition to the packet / commit
      that settles it.
    invalidation_condition: >
      Only a richer taxonomy (e.g. explicit versioning of sweep
      generations) supersedes the four-disposition set.
    routing:
      task_terms: [bug taxonomy, disposition, triage, ABSORBED, FORWARDED, PRE_EXISTING_FIX]
      file_patterns:
        - docs/to-do-list/*reassessment*.csv
        - docs/to-do-list/*bug_audit*.md
    downstream_blast_radius:
      - every future multi-item sweep
      - backlog grooming cadence
    zero_context_digest: >
      PRE_EXISTING_FIX / RESOLVED / ABSORBED / FORWARDED. Every sweep
      item routes to exactly one disposition. Un-routed items block
      sweep closure.

  - id: PERSISTENT_CRITIC_ROTATION_PREVENTS_RUBBER_STAMPING
    status: active_law
    severity: high
    sources:
      - docs/operations/task_2026-04-16_dual_track_metric_spine/team_lead_handoff.md
      - ~/.claude/projects/-Users-leofitz--openclaw-workspace-venus-zeus/memory/feedback_critic_prompt_adversarial_template.md
    failure_mode: >
      Long multi-phase programs use a single critic across all phases.
      The critic loses adversarial distance as it re-reads a
      progressively-contextualized problem; later phases get rubber-
      stamped because the-pattern-is-proven. Prior bugs stop surfacing.
    trigger_context:
      - multi-month work programs
      - multi-phase packets with 5+ sequential PASS milestones
      - critic-opus dispatched repeatedly on adjacent scopes
    wrong_moves:
      - use one critic for the entire program
      - allow self-justification language in the dispatch prompt
      - accept APPROVE with zero findings as a valid verdict on complex slices
    correct_rule: >
      Rotate critics between phases. Each critic retires after a multi-
      phase PASS. Successor critic reads the scope fresh without
      adversarial-distance erosion. Dispatch prompts use the 10-ask
      adversarial template — no scope-narrowing, no self-justification,
      explicit find-what-is-wrong + zero-findings-is-probably-rubber-
      stamping framing.
    antibodies:
