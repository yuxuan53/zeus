    residual_risk: >
      Rotation has overhead (new critic onboarding). Mitigation:
      packet-level handoff docs that cold-start successors quickly.
    invalidation_condition: >
      Only a programmatically-enforced adversarial framework (e.g.
      critic-bot with forced scope resampling) supersedes manual
      rotation.
    routing:
      task_terms: [critic rotation, adversarial review, rubber-stamping, 10-ask template, prompt degradation]
      file_patterns:
        - docs/operations/task_*/team_lead_handoff.md
    downstream_blast_radius:
