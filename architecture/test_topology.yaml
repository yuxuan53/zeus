schema_version: 1
metadata:
  created: "2026-04-13"
  owner_packet: "Packet 5 test suite law gate and debt quarantine"
  note: >
    Test topology classifies the active pytest suite as law antibodies,
    regressions, transitional/advisory checks, diagnostics, stale/obsolete
    tests, or reverse-antibodies. It does not delete tests.

test_trust_policy:
  rule: >
    Tests are untrusted by default. A test is trusted only when its source
    file contains both a Created date and a Last reused/audited date in
    YYYY-MM-DD format within the first 15 lines. Tests without these lifecycle
    headers are classified as audit_required — an agent must review the test
    for correctness and currency before running it. Running an untrusted test
    without prior audit is forbidden.
  header_formats:
    - "# Created: YYYY-MM-DD"
    - "# Last reused/audited: YYYY-MM-DD"
    - "# Lifecycle: created=YYYY-MM-DD; last_reviewed=YYYY-MM-DD; last_reused=YYYY-MM-DD"
  classification:
    trusted: "Both Created and Last reused dates present with real YYYY-MM-DD values"
    reviewed_only: "Has Created and last_reviewed but last_reused=never"
    audit_required: "No lifecycle header or missing required dates"
  enforcement: "topology_doctor test_trust check + digest gate output"

  # Machine-readable registry: 59 tests with valid lifecycle headers.
  # Tests not in this list require audit before running.
  trusted_tests:
