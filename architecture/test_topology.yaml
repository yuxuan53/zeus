high_sensitivity_skips:
  tests/test_cross_module_invariants.py:
    owner: topology-program
    packet: Packet 5
    reason: Bias/calibration cross-module invariants are skipped only when runtime data/config makes them inapplicable.
    skip_count: 4
    reason_patterns:
      - "bias_correction_enabled = false"
      - "No calibration pairs in database"
    sunset: Replace DB-dependent skips with fixtures or explicit advisory status.
  tests/test_instrument_invariants.py:
    owner: topology-program
    packet: Packet 5
    reason: Unit/bin/settlement law tests skip Celsius-only checks if no Celsius cities are configured.
    skip_count: 2
    reason_patterns:
      - "No °C cities configured"
    sunset: Keep until city fixture guarantees Celsius coverage independent of runtime config.
  tests/test_no_bare_float_seams.py:
    owner: topology-program
    packet: Packet 5
    reason: Structural seam tests skip when target symbols/files are absent; these protect INV-12.
    skip_count: 2
    reason_patterns:
      - "portfolio.py not found"
      - "kelly_size not found in kelly.py"
    sunset: Convert to static assertions tied to current source topology.
  tests/test_provenance_enforcement.py:
    owner: topology-program
    packet: Packet 5
    reason: Provenance registry law skips only when registry YAML or PyYAML is unavailable.
    skip_count: 8
    reason_patterns:
      - "Registry YAML not yet created"
      - "PyYAML not installed"
    sunset: Remove once provenance registry dependency is always present in test env.
  tests/test_wu_scheduler.py:
    owner: topology-program
    packet: Packet 6
    reason: WU scheduler test skips only when source entrypoint is absent in the current worktree.
    skip_count: 1
    reason_patterns:
      - "src/main.py not present in this worktree"
    sunset: Remove once scheduler dispatch fixture no longer depends on optional entrypoint presence.
  tests/test_architecture_contracts.py:
    owner: topology-program
    packet: Packet 5
    reason: Legacy P9/Phase2 position_events vocabulary and backfill tests are skipped while canonical event/projection law is represented elsewhere.
    skip_count: 22
    reason_patterns:
      - "P9: legacy position_events vocabulary eliminated"
      - "P9/Phase2: legacy position_events_legacy or backfill eliminated"
    sunset: Replace, reactivate, or archive in test cleanup packet after canonical coverage is mapped.
  tests/test_db.py:
    owner: topology-program
    packet: Packet 5
    reason: Legacy position_events write-path tests skipped after write path elimination; DB truth coverage remains high sensitivity.
    skip_count: 19
    reason_patterns:
      - "P9: legacy position_events write path eliminated"
    sunset: Reconcile with canonical ledger/projection tests in test cleanup packet.
  tests/test_live_safety_invariants.py:
    owner: topology-program
    packet: Packet 5
    reason: Canonical write path and contamination-guard relocation skips remain safety-sensitive.
    skip_count: 8
    reason_patterns:
      - "P9: requires canonical write path setup"
      - "Phase2: paper mode removed"
      - "P4: contamination guard"
    sunset: Must have replacement live-safety antibodies before deletion.
  tests/test_truth_surface_health.py:
    owner: topology-program
    packet: Packet 5
    reason: Legacy truth-surface skips indicate topology drift, not safe deletion.
    skip_count: 6
    reason_patterns:
      - "P9/Phase2: legacy position_events_legacy or backfill eliminated"
    sunset: Resolve with truth-surface cleanup packet.
  tests/test_reality_contracts.py:
    owner: topology-program
    packet: Packet 5
    reason: p10-infra verifier/loader skips cover INV-11 external assumption law.
    skip_count: 10
    reason_patterns:
      - "RealityContractVerifier not yet delivered by p10-infra"
      - "Reality contract YAML loader not yet delivered by p10-infra"
    sunset: Reactivate after reality verifier/loader delivery or explicitly archive with replacement.
  tests/test_cross_module_relationships.py:
    owner: topology-program
    packet: Packet 5
    reason: Data-dependent relationship skips include settlement, canonical position, and risk-state topology checks.
    skip_count: 11
    reason_patterns:
      - "Canonical position tables not present"
      - "No SETTLEMENT events in chronicle"
      - "position_current"
      - "risk_state"
    sunset: Replace data-dependent skips with fixture-backed relationship tests.
  tests/test_pnl_flow_and_audit.py:
    owner: topology-program
    packet: Packet 5
    reason: BI-05 and paper-mode skips touch PnL/audit truth boundaries.
    skip_count: 5
    reason_patterns:
      - "BI-05"
      - "Phase2: paper_mode removed"
    sunset: Resolve after runtime no longer imports forbidden portfolio surfaces.
  tests/test_truth_layer.py:
    owner: topology-program
    packet: Packet 5
    reason: K1 no-op tracker/paper elimination tests are transitional but truth-layer sensitive.
    skip_count: 5
    reason_patterns:
      - "K1: save_tracker is no-op"
    sunset: Archive only after durable truth-layer replacement coverage exists.
  tests/test_strategy_tracker_regime.py:
    owner: topology-program
    packet: Packet 5
    reason: Strategy tracker migrated to no-op; keep explicit until tracker authority is deleted or replaced.
    skip_count: 6
    reason_patterns:
      - "K1: strategy_tracker migrated to no-op"
    sunset: Archive in tracker cleanup packet after replacement evidence.

