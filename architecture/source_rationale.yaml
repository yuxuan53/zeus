schema_version: 1
metadata:
  created: "2026-04-13"
  owner_packet: "Packet 4 source file rationale map"
  note: >
    Per-file rationale map for tracked src/** files. This file indexes why
    source files exist and what they protect; it does not override zones.yaml.

hazard_badges:
  DERIVED_ONLY: Derived output/read model; never canonical truth.
  NO_WRITE_PATH: Must not write canonical truth.
  VENUS_CONTROL_ONLY: External writes must flow through Venus/control contracts.
  TRANSITIONAL_DO_NOT_DEEPEN: Transitional compatibility surface; do not deepen dependency.
  WMO_ROUNDING_LAW: Settlement-aligned values must use WMO half-up.

write_routes:
  canonical_position_write:
    owner: src/state/ledger.py
    projection: src/state/projection.py
    lifecycle_gate: src/state/lifecycle_manager.py
  control_write:
    owner: src/control/control_plane.py
    external_contract: src/supervisor_api/contracts.py
  settlement_write:
    owner: src/execution/harvester.py
    rounding_law: src/contracts/settlement_semantics.py
    db_gate: src/state/db.py
  backtest_diagnostic_write:
    owner: src/engine/replay.py
    db: state/zeus_backtest.db
    authority_scope: diagnostic_non_promotion
  calibration_persistence_write:
    owner: src/calibration/store.py
    tables: [calibration_pairs, platt_models]
    guardrail: Settlement values must use WMO helper; decision_group_id must stay stable.
  calibration_decision_group_write:
    owner: src/calibration/effective_sample_size.py
    tables: [calibration_decision_group, calibration_pairs]
    guardrail: Additive/shadow accounting only until promoted by a governance packet.
  decision_artifact_write:
    owner: src/state/decision_chain.py
    tables: [decision_log]
    guardrail: Decision artifacts are evidence/read-model facts, not lifecycle authority.
  script_repair_write:
    owner: scripts/**
    guardrail: dry-run/apply metadata required in later scripts manifest packet

package_defaults:
  src/contracts:
    zone: K0_frozen_kernel
    authority_role: executable_law
    gates: ["pytest -q tests/test_instrument_invariants.py tests/test_structural_linter.py"]
  src/types:
    zone: K0_frozen_kernel
    authority_role: executable_law
    gates: ["pytest -q tests/test_temperature.py tests/test_instrument_invariants.py"]
  src/state:
    zone: mixed_k0_k2
    authority_role: truth_surface
    gates: ["pytest -q tests/test_architecture_contracts.py tests/test_truth_surface_health.py"]
  src/control:
    zone: K1_governance
    authority_role: governance_write_surface
    gates: ["pytest -q tests/test_gate_decision.py tests/test_runtime_guards.py"]
  src/riskguard:
    zone: K1_governance
    authority_role: risk_policy_runtime
    gates: ["pytest -q tests/test_riskguard.py tests/test_live_safety_invariants.py"]
  src/execution:
    zone: K2_runtime
    authority_role: live_execution_boundary
    gates: ["pytest -q tests/test_executor.py tests/test_exit_authority.py"]
  src/engine:
    zone: K2_K3_coordination
    authority_role: orchestration
    gates: ["pytest -q tests/test_architecture_contracts.py tests/test_run_replay_cli.py"]
  src/data:
    zone: K2_runtime
    authority_role: external_data_boundary
    gates: ["pytest -q tests/test_ensemble_client.py tests/test_observation_contract.py"]
  src/signal:
    zone: K3_extension
    authority_role: probability_signal
    gates: ["pytest -q tests/test_ensemble_signal.py tests/test_day0_signal.py"]
  src/calibration:
    zone: K3_extension
    authority_role: calibration_math
    gates: ["pytest -q tests/test_platt.py tests/test_calibration_manager.py"]
  src/strategy:
    zone: K3_extension
    authority_role: strategy_math
    gates: ["pytest -q tests/test_market_analysis.py tests/test_fdr.py tests/test_kelly.py"]
  src/observability:
    zone: K2_runtime
    authority_role: derived_operator_read_model
    hazards: [DERIVED_ONLY, NO_WRITE_PATH]
    gates: ["pytest -q tests/test_healthcheck.py"]
  src/supervisor_api:
    zone: K2_runtime
    authority_role: external_contract
    hazards: [VENUS_CONTROL_ONLY]
    gates: ["pytest -q tests/test_runtime_guards.py"]
  src/analysis:
    zone: K4_experimental
    authority_role: placeholder
    hazards: [NO_WRITE_PATH]
    gates: []

