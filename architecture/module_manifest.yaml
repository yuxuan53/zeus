  owner_packet: "authority rehydration P0 scaffold"
  source_plan: "docs/operations/task_2026-04-23_authority_rehydration/plan.md"
  purpose: >
    Machine registry for dense module books, scoped module routers, and
    module-level law/current-fact/test dependencies. This manifest routes the
    cognition layer; it does not create a second authority plane.
  status: skeletal

placeholder_policy:
  law_dependencies: "Populate in P1/P2 from active law and machine manifests."
  current_fact_dependencies: "Populate only where a module genuinely depends on time-bound operational facts."
  required_tests: "Populate with load-bearing current tests, not exhaustive catalogs."
  graph_appendix_status: "Tracked-only placeholder until graph/context-pack support lands."
  archive_extraction_status: "Tracked-only placeholder until archive extraction review lands."

