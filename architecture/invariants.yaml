schema_version: 1
invariants:
  - id: INV-01
    zones: [K2_runtime]
    statement: Exit is not local close.
    why: Monitor decisions must not directly imply terminal economic closure.
    enforced_by:
      spec_sections: [3, P0.1, P2]
      semgrep_rule_ids: [zeus-no-direct-close-from-engine]
      tests:
        - tests/test_architecture_contracts.py::test_negative_constraints_include_no_local_close
  - id: INV-02
    zones: [K0_frozen_kernel, K2_runtime]
    statement: Settlement is not exit.
    why: Exit execution and final market settlement are distinct lifecycle facts.
    enforced_by:
      spec_sections: [3, P2]
      schema:
        - migrations/2026_04_02_architecture_kernel.sql
  - id: INV-03
    zones: [K0_frozen_kernel]
    statement: Canonical authority is append-first and projection-backed.
    why: Durable audit plus fast current-state reads require one canonical event stream and one deterministic projection.
    enforced_by:
      spec_sections: [3, P1, 19]
      schema:
        - migrations/2026_04_02_architecture_kernel.sql
      scripts:
        - scripts/replay_parity.py
  - id: INV-04
    zones: [K1_governance, K3_extension]
    statement: strategy_key is the sole governance key.
    why: edge_source, discovery_mode, and entry_method are metadata and must not compete as governance centers.
    enforced_by:
      spec_sections: [3, P0.2, P3, 18]
      schema:
        - migrations/2026_04_02_architecture_kernel.sql
      tests:
        - tests/test_architecture_contracts.py::test_strategy_key_manifest_is_frozen
  - id: INV-05
    zones: [K1_governance, K3_extension]
    statement: Risk must change behavior.
    why: Advisory-only risk outputs are theater.
    enforced_by:
      spec_sections: [3, P3]
      tests:
        - tests/test_architecture_contracts.py::test_risk_actions_exist_in_schema
  - id: INV-06
    zones: [K0_frozen_kernel, K2_runtime, K3_extension]
    statement: Point-in-time truth beats hindsight truth.
    why: Learning must preserve decision-time truth and must not silently upgrade to later snapshots.
    enforced_by:
      spec_sections: [3, P4, 22]
      negative_constraints: [NC-05]
      tests:
        - tests/test_cross_module_invariants.py::test_inv03_harvester_prefers_decision_snapshot_over_latest
  - id: INV-07
    zones: [K0_frozen_kernel]
    statement: Lifecycle grammar is finite and authoritative.
    why: Arbitrary state strings create semantic drift.
    enforced_by:
      spec_sections: [3, P5, 18]
      schema:
        - migrations/2026_04_02_architecture_kernel.sql
      semgrep_rule_ids: [zeus-no-direct-phase-assignment]
  - id: INV-08
    zones: [K0_frozen_kernel]
    statement: Canonical write path has one transaction boundary.
    why: Event append and projection update must succeed or fail together.
    enforced_by:
      spec_sections: [3, P0.3, P1, 19]
      scripts:
        - scripts/check_kernel_manifests.py
  - id: INV-09
    zones: [K2_runtime, K3_extension]
    statement: Missing data is first-class truth.
    why: Opportunity loss and degraded reliability must be explicit facts, not log noise.
    enforced_by:
      spec_sections: [3, P0.4, P4]
      schema:
        - migrations/2026_04_02_architecture_kernel.sql
  - id: INV-10
    zones: [K1_governance]
    statement: LLM output is never authority.
    why: Generated code is only valid after packet, gates, and evidence.
    enforced_by:
      spec_sections: [3, P8, 23]
      scripts:
        - scripts/check_work_packets.py
      docs:
        - architecture/self_check/zero_context_entry.md
