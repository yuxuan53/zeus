schema_version: 1
invariants:
  - id: INV-01
    zones: [K2_runtime]
    statement: Exit is not local close.
    why: Monitor decisions must not directly imply terminal economic closure.
    enforced_by:
      spec_sections: [3, P0.1, P2]
      semgrep_rule_ids: [zeus-no-direct-close-from-engine]
      tests:
        - tests/test_architecture_contracts.py::test_negative_constraints_include_no_local_close
  - id: INV-02
    # CITATION_REPAIR 2026-04-28: tests: block added per SIDECAR-2 audit. Tests
    # already existed in tests/test_architecture_contracts.py (lifecycle phase
    # kernel transitions verify that exit→settled and settled-as-terminal are
    # distinct from the exit lifecycle); no test design needed, only YAML
    # citation. Continues the pattern from BATCH D INV-16/17 schema-citation
    # repair: enforcement is broader than the YAML field initially exposed.
    zones: [K0_frozen_kernel, K2_runtime]
    statement: Settlement is not exit.
    why: Exit execution and final market settlement are distinct lifecycle facts.
    enforced_by:
      spec_sections: [3, P2]
      schema:
        - architecture/2026_04_02_architecture_kernel.sql
      tests:
        - tests/test_architecture_contracts.py::test_lifecycle_phase_kernel_accepts_current_canonical_builder_folds
        - tests/test_architecture_contracts.py::test_lifecycle_phase_kernel_rejects_illegal_fold
  - id: INV-03
    zones: [K0_frozen_kernel]
    statement: Canonical authority is append-first and projection-backed.
    why: Durable audit plus fast current-state reads require one canonical event stream and one deterministic projection.
    enforced_by:
      spec_sections: [3, P1, 19]
      schema:
        - architecture/2026_04_02_architecture_kernel.sql
      scripts:
        - scripts/replay_parity.py
  - id: INV-04
    zones: [K1_governance, K3_extension]
    statement: strategy_key is the sole governance key.
    why: edge_source, discovery_mode, and entry_method are metadata and must not compete as governance centers.
    enforced_by:
      spec_sections: [3, P0.2, P3, 18]
      schema:
        - architecture/2026_04_02_architecture_kernel.sql
      tests:
        - tests/test_architecture_contracts.py::test_strategy_key_manifest_is_frozen
  - id: INV-05
    zones: [K1_governance, K3_extension]
    statement: Risk must change behavior.
    why: Advisory-only risk outputs are theater.
    enforced_by:
      spec_sections: [3, P3]
      tests:
        - tests/test_architecture_contracts.py::test_risk_actions_exist_in_schema
  - id: INV-06
    zones: [K0_frozen_kernel, K2_runtime, K3_extension]
    statement: Point-in-time truth beats hindsight truth.
    why: Learning must preserve decision-time truth and must not silently upgrade to later snapshots.
    enforced_by:
      spec_sections: [3, P4, 22]
      negative_constraints: [NC-05]
      tests:
        - tests/test_cross_module_invariants.py::test_inv03_harvester_prefers_decision_snapshot_over_latest
  - id: INV-07
    zones: [K0_frozen_kernel]
    statement: Lifecycle grammar is finite and authoritative.
    why: Arbitrary state strings create semantic drift.
    enforced_by:
      spec_sections: [3, P5, 18]
      schema:
        - architecture/2026_04_02_architecture_kernel.sql
      semgrep_rule_ids: [zeus-no-direct-phase-assignment]
  - id: INV-08
    zones: [K0_frozen_kernel]
    statement: Canonical write path has one transaction boundary.
    why: Event append and projection update must succeed or fail together.
    enforced_by:
      spec_sections: [3, P0.3, P1, 19]
      scripts:
        - scripts/check_kernel_manifests.py
  - id: INV-09
    zones: [K2_runtime, K3_extension]
    statement: Missing data is first-class truth.
    why: Opportunity loss and degraded reliability must be explicit facts, not log noise.
    enforced_by:
      spec_sections: [3, P0.4, P4]
      schema:
        - architecture/2026_04_02_architecture_kernel.sql
  - id: INV-10
    zones: [K1_governance]
    statement: LLM output is never authority.
    why: Generated code is only valid after packet, gates, and evidence.
    enforced_by:
      spec_sections: [3, P8, 23]
      scripts:
        - scripts/check_work_packets.py
      docs:
        - architecture/self_check/zero_context_entry.md
  - id: INV-21
    zones: [K2_runtime, K3_extension]
    statement: Kelly sizing requires an executable-price distribution, not a bare static entry_price.
    why: A bare entry_price scalar discards fill probability, adverse selection, and queue-priority hazards; sizing against it produces systematically wrong position sizes.
    enforced_by:
      spec_sections: [20]
      negative_constraints: [NC-14]
      semgrep_rule_ids: [zeus-no-bare-entry-price-kelly]
      tests:
        - tests/test_dual_track_law_stubs.py::test_kelly_input_carries_distributional_info
  - id: INV-14
    # CITATION_REPAIR 2026-04-28: tests: block added per SIDECAR-2 audit. Tests
    # already existed in tests/test_canonical_position_current_schema_alignment.py
    # (3 tests verifying temperature_metric is a canonical column at multiple
    # layers) + tests/test_dual_track_law_stubs.py (settlements_metric_identity
    # asserts non-null + unique-per-metric constraint). Continues the pattern
    # from BATCH D INV-16/17 + INV-02: enforcement is broader than the YAML
    # field initially exposed.
    zones: [K0_frozen_kernel, K2_runtime]
    statement: Every temperature-market family row in canonical tables must carry temperature_metric, physical_quantity, observation_field, and data_version.
    why: These four fields are row identity; without them, high and low truths share the same key space and conflate two distinct settlement facts.
    enforced_by:
      spec_sections: [13]
      negative_constraints: [NC-11, NC-12]
      schema:
        - architecture/2026_04_02_architecture_kernel.sql
      tests:
        - tests/test_canonical_position_current_schema_alignment.py::test_canonical_position_current_columns_includes_temperature_metric
        - tests/test_canonical_position_current_schema_alignment.py::test_kernel_sql_position_current_declares_temperature_metric
        - tests/test_canonical_position_current_schema_alignment.py::test_canonical_constants_match_kernel_sql_position_current_columns
        - tests/test_dual_track_law_stubs.py::test_settlements_metric_identity_requires_non_null_and_unique_per_metric
  - id: INV-15
    zones: [K2_runtime]
    statement: Forecast rows lacking canonical cycle identity may serve runtime degrade paths but must not enter canonical training.
    why: Training purity requires every training row to carry verified provenance; fallback rows without reliable issue_time are not training evidence.
    enforced_by:
      spec_sections: [14]
      schema:
        - architecture/2026_04_02_architecture_kernel.sql
  - id: INV-16
    # CITATION_REPAIR 2026-04-28: PRUNE_CANDIDATE marker REVERTED per critic-harness BATCH C cross-batch audit (docs/operations/task_2026-04-27_harness_debate/evidence/critic-harness/batch_C_review_2026-04-28.md §INV-16 finding). The R1+R2+R3 verdicts based the prose-as-law claim on opponent's grep-of-`tests:`-field-only audit, which missed that 3 relationship tests for this invariant ALREADY EXIST in tests/test_phase6_causality_status.py (file docstring: "Relationship tests for Phase 6 INV-16 causality_status enforcement"). The schema-citation gap was real; the enforcement gap was imaginary.
    zones: [K2_runtime]
    statement: Day0 low slots with causality_status != 'OK' must not route through historical Platt lookup; low Day0 uses nowcast path only.
    why: Causality preservation — routing a slot that is already partly historical through a forecast Platt model produces incorrect probability estimates.
    enforced_by:
      spec_sections: [15]
      negative_constraints: [NC-12]
      tests:
        - tests/test_phase6_causality_status.py::TestCausalityStatusRejectAxis::test_evaluator_has_causality_status_reject_gate_for_low_track
        - tests/test_phase6_causality_status.py::TestCausalityStatusRejectAxis::test_causality_status_reject_is_distinct_from_observation_unavailable
        - tests/test_phase6_causality_status.py::TestCausalityStatusRejectAxis::test_day0_observation_context_carries_causality_status
  - id: INV-17
    # CITATION_REPAIR 2026-04-28: PRUNE_CANDIDATE marker REVERTED per critic-harness BATCH C cross-batch audit. The R1+R2+R3 verdicts based the prose-as-law claim on opponent's grep-of-`tests:`-field-only audit, which missed that 6 relationship tests for this invariant ALREADY EXIST in tests/test_dt1_commit_ordering.py (file docstring: "Relationship tests for DT#1 / INV-17: DB authority writes commit BEFORE derived JSON exports fire"). The schema-citation gap was real; the enforcement gap was imaginary.
    zones: [K0_frozen_kernel, K2_runtime]
    statement: DB authority writes (event append + projection fold) must COMMIT before any derived JSON export is updated.
    why: On a mid-step crash the DB wins and JSON is rebuilt from projection; a JSON write that races the commit can leave exports ahead of authority, making recovery ambiguous.
    enforced_by:
      spec_sections: [16]
      negative_constraints: [NC-13]
      tests:
        - tests/test_dt1_commit_ordering.py::TestCommitThenExportHappyPath::test_commit_then_export_happy_path
        - tests/test_dt1_commit_ordering.py::TestCommitThenExportHappyPath::test_commit_then_export_fires_all_json_exports_in_order
        - tests/test_dt1_commit_ordering.py::TestCommitThenExportDbFailure::test_commit_then_export_db_failure_suppresses_json
        - tests/test_dt1_commit_ordering.py::TestCommitThenExportJsonFailure::test_commit_then_export_json_failure_after_commit
        - tests/test_dt1_commit_ordering.py::TestSavePortfolioRecoveryContract::test_save_portfolio_persists_last_committed_artifact_id
        - tests/test_dt1_commit_ordering.py::TestSavePortfolioRecoveryContract::test_load_portfolio_detects_stale_json_when_db_newer
  - id: INV-18
    zones: [K2_runtime]
    statement: Chain reconciliation state is three-valued — CHAIN_SYNCED / CHAIN_EMPTY / CHAIN_UNKNOWN — and void decisions require CHAIN_EMPTY.
    why: Collapsing CHAIN_UNKNOWN into CHAIN_EMPTY causes void decisions on stale or incomplete chain reads, creating phantom exits.
    enforced_by:
      spec_sections: [19]
      tests:
        - tests/test_dual_track_law_stubs.py::test_chain_reconciliation_three_state_machine
  - id: INV-19
    zones: [K1_governance, K2_runtime]
    statement: RED risk level must cancel all pending orders and sweep active positions toward exit; advisory-only RED is forbidden.
    why: RED is a truth claim about system integrity, not a throttle; an entry-block-only implementation is theater and leaves open exposure during detected integrity failures.
    enforced_by:
      spec_sections: [17]
      tests:
        - tests/test_dual_track_law_stubs.py::test_red_triggers_active_position_sweep
  - id: INV-20
    zones: [K2_runtime]
    statement: Authority-loss must preserve monitor/exit/reconciliation paths in read-only mode; raising RuntimeError that kills the entire cycle on authority-loss is forbidden.
    why: Fail-closed for new-risk creation must not blind the monitor/exit lane of a live single-daemon system.
    enforced_by:
      spec_sections: [21]
      tests:
        - tests/test_dual_track_law_stubs.py::test_load_portfolio_degrades_gracefully_on_authority_loss
  - id: INV-13
    zones: [K2_runtime, K3_extension]
    statement: >
      Numeric multipliers entering Kelly sizing must be traceable to a
      registered provenance entry (config/provenance_registry.yaml).
    why: Unregistered constants in the Kelly cascade are invisible to governance — they cannot be audited, replaced, or bounded without a registry entry.
    enforced_by:
      spec_sections: [P9.5]
      tests:
        - tests/test_provenance_enforcement.py
    severity: P1
  - id: INV-22
    zones: [K1_governance, K2_runtime]
    statement: "make_family_id() must resolve to one canonical family grammar across every call site. strategy_key is either always part of the family key or never part of it; per-path drift is forbidden. Enforcement intent: one choke-point helper + test asserting every call site delegates to it."
    why: FDR family key drift allows the same market to be tracked under multiple identities, corrupting Platt calibration, settlement lookup, and chain reconciliation.
    enforced_by:
      spec_sections: [18]
      negative_constraints: [NC-15]
      semgrep_rule_ids: [zeus-no-fdr-family-key-drift]
      tests:
        - tests/test_dual_track_law_stubs.py::test_fdr_family_key_is_canonical
  - id: INV-23
    zones: [K2_runtime]
    statement: A degraded portfolio projection must never export authority="VERIFIED"; the export must use a distinct non-VERIFIED label.
    why: A degraded loader signals that DB authority was unreachable or the projection is non-canonical. Stamping that export as VERIFIED tells operator surfaces and downstream consumers that authority survived loss, which is false. Authority labels must reflect actual provenance, not load-success.
    enforced_by:
      negative_constraints: [NC-17]
      tests:
        - tests/test_p0_hardening.py::TestR1DegradedExportNeverVerified::test_truth_authority_map_does_not_collapse_degraded_to_verified
        - tests/test_p0_hardening.py::TestR1DegradedExportNeverVerified::test_save_portfolio_degraded_does_not_export_verified
  - id: INV-24
    zones: [K2_runtime]
    statement: place_limit_order is gateway-only; non-gateway call sites are forbidden.
    why: Allowing arbitrary callers to invoke place_limit_order bypasses the gateway boundary, creating multiple uncontrolled order-placement paths. The gateway (executor.py) is the single enforcement point for pre-flight checks, idempotency keys, and rejection-reason surfacing.
    enforced_by:
      negative_constraints: [NC-16]
      semgrep_rule_ids: [zeus-place-limit-order-gateway-only]
      tests:
        - tests/test_p0_hardening.py::test_place_limit_order_gateway_only
  - id: INV-25
    zones: [K2_runtime]
    statement: When V2 endpoint preflight fails, no live place_limit_order call may be issued for that cycle.
    why: A failed V2 preflight indicates the CLOB endpoint is unreachable or non-responsive. Proceeding with order placement against an unverified endpoint risks silent API errors, duplicate order submission, or orders against a stale/wrong endpoint.
    enforced_by:
      tests:
        - tests/test_p0_hardening.py::TestR2V2PreflightBlocksPlacement::test_v2_preflight_blocks_placement
        - tests/test_p0_hardening.py::TestR2V2PreflightBlocksPlacement::test_v2_preflight_success_does_not_block
        - tests/test_p0_hardening.py::TestR2V2PreflightBlocksPlacement::test_v2_preflight_fails_when_sdk_lacks_get_ok
  - id: INV-26
    zones: [K2_runtime]
    statement: runtime_posture is read-only at runtime; the entry-decision path must consult it; non-NORMAL posture blocks new entry irrespective of risk_level.
    why: runtime_posture is a committed YAML law document (O2-c). Allowing runtime mutation or ignoring it in the entry path recreates the second-authority-plane problem. The posture gate is additive with risk_level — both must pass for entry to proceed.
    enforced_by:
      tests:
        - tests/test_p0_hardening.py::TestR3RuntimePostureBlocksEntry::test_cycle_runner_posture_gate_blocks_with_reason
        - tests/test_p0_hardening.py::test_runtime_posture_yaml_present
  - id: INV-29
    zones: [K2_runtime]
    statement: VenueCommand and IdempotencyKey are frozen dataclasses; CommandState,
      CommandEventType, and IntentKind are closed string enums; their string values
      must match the venue_commands schema state column and venue_command_events
      event_type column without drift. R3 M1's grammar-additive command states
      and event types are incorporated by the 2026-04-27 amendment below; any
      future enum expansion requires a new planning-lock amendment.
    why: A drifting type surface breaks the command journal's grammar guarantees.
      Frozen types at the kernel boundary let all callers (executor, repo, recovery,
      reconciliation) trust the same definitions. Catching drift at test time
      prevents the kind of silent translation loss flagged in Fitz Constraint #2.
    amendment:
      id: R3-M1-INV-29-2026-04-27
      status: incorporated
      receipt: docs/operations/task_2026-04-26_ultimate_plan/r3/operator_decisions/inv_29_amendment_2026-04-27.md
      scope: >
        Approves only the M1 grammar-additive command-side states/events that
        were implemented and reviewed at COMPLETE_AT_GATE. It does not authorize
        M2 unknown-side-effect runtime resolution, order/trade fact grammar
        collapse, RESTING/MATCHED/MINED/CONFIRMED in CommandState, live venue
        submission, or CLOB v2 cutover.
      command_state_values:
        - INTENT_CREATED
        - SNAPSHOT_BOUND
        - SUBMITTING
        - SIGNED_PERSISTED
        - POSTING
        - POST_ACKED
        - ACKED
        - UNKNOWN
        - SUBMIT_UNKNOWN_SIDE_EFFECT
        - PARTIAL
        - FILLED
        - CANCEL_PENDING
        - CANCELLED
        - EXPIRED
        - SUBMIT_REJECTED
        - REJECTED
        - REVIEW_REQUIRED
      command_event_type_values:
        - INTENT_CREATED
        - SNAPSHOT_BOUND
        - SIGNED_PERSISTED
        - POSTING
        - POST_ACKED
        - SUBMIT_REQUESTED
        - SUBMIT_ACKED
        - SUBMIT_REJECTED
        - SUBMIT_UNKNOWN
        - SUBMIT_TIMEOUT_UNKNOWN
        - CLOSED_MARKET_UNKNOWN
        - PARTIAL_FILL_OBSERVED
        - FILL_CONFIRMED
        - CANCEL_REQUESTED
        - CANCEL_ACKED
        - CANCEL_FAILED
        - CANCEL_REPLACE_BLOCKED
        - EXPIRED
        - REVIEW_REQUIRED
    enforced_by:
      tests:
        - tests/test_command_bus_types.py::TestVenueCommandFrozen::test_venuecommand_is_frozen
        - tests/test_command_bus_types.py::TestVenueCommandFrozen::test_venuecommand_state_must_be_enum
        - tests/test_command_bus_types.py::TestVenueCommandFrozen::test_venuecommand_intent_kind_must_be_enum
        - tests/test_command_bus_types.py::TestIdempotencyKeyDeterministic::test_same_inputs_produce_same_key
        - tests/test_command_bus_types.py::TestIdempotencyKeyDeterministic::test_key_stable_across_separate_processes
        - tests/test_command_bus_types.py::TestEnumsAreClosed::test_command_state_grammar_is_closed
        - tests/test_command_bus_types.py::TestEnumsAreClosed::test_command_event_type_grammar_is_closed
        - tests/test_command_bus_types.py::TestRepoTypeAlignment::test_transitions_state_keys_are_valid_command_states
        - tests/test_command_bus_types.py::TestRepoTypeAlignment::test_transitions_event_keys_are_valid_command_events
        - tests/test_command_bus_types.py::TestRepoTypeAlignment::test_inflight_states_match_repo_unresolved_filter
  - id: INV-27
    zones: [K2_runtime]
    statement: Cycle summary must surface execution-truth warnings for portfolio positions in execution-unsafe states (quarantined without order_id, pending_* without order_id). Surfacing is observability-only and does NOT block entries.
    why: Without explicit operator visibility into execution-truth gaps, positions in unsafe states (quarantined without command authority, pending without order_id) silently accumulate. P0 surfaces them; K4 will replace heuristic detection with durable command-journal lookup. Surfacing must not block entries (operator decision 2026-04-26) so entry-decision logic remains driven by risk_level / posture / quarantine, not by surface-warning side effects.
    enforced_by:
      tests:
        - tests/test_p0_hardening.py::TestRWExecutionTruthWarnings::test_quarantined_without_order_id_surfaces_warning
        - tests/test_p0_hardening.py::TestRWExecutionTruthWarnings::test_pending_state_without_order_id_surfaces_warning
        - tests/test_p0_hardening.py::TestRWExecutionTruthWarnings::test_clean_portfolio_emits_no_warnings_key
        - tests/test_p0_hardening.py::TestRWExecutionTruthWarnings::test_warnings_do_not_block_entries
  - id: INV-28
    zones: [K0_frozen_kernel, K2_runtime]
    statement: Every venue order side effect (place_limit_order / cancel) must be
      preceded by a persisted venue_commands row + venue_command_events SUBMIT_REQUESTED
      event written through src/state/venue_command_repo.py.
    why: Without pre-side-effect persistence, a daemon crash between SDK submit
      and ack write produces an orphan order at the venue. The command journal is
      the only mechanism that survives the crash and lets the next cycle reconcile.
    enforced_by:
      schema:
        - src/state/db.py::init_schema (venue_commands, venue_command_events tables)
      tests:
        - tests/test_venue_command_repo.py::TestInsertCommandAtomicWithIntentCreatedEvent::test_both_rows_inserted
        - tests/test_venue_command_repo.py::TestInsertCommandAtomicWithIntentCreatedEvent::test_rollback_on_mid_transaction_failure
        - tests/test_venue_command_repo.py::TestAppendEventStateTransitionIsGrammarChecked::test_illegal_transition_raises_value_error
        - tests/test_venue_command_repo.py::TestIdempotencyKeyUniquenessEnforced::test_duplicate_key_raises_integrity_error
  - id: INV-30
    zones: [K2_runtime]
    statement: client.place_limit_order MUST be preceded by a venue_commands row
      persisted with state=SUBMITTING within the SAME process invocation. Crash
      between submit and ack must leave the row in SUBMITTING state for recovery.
      The venue_commands journal lives in the trades DB (zeus_trades.db); cross-DB
      atomicity with positions in zeus.db is not guaranteed; P1.S4 recovery must
      reconcile across both databases.
    why: Pre-side-effect persistence is the only mechanism that survives a daemon
      crash between submit and ack. Without it, an orphan order at the venue has
      no local record to reconcile against.
    enforced_by:
      tests:
        - tests/test_executor_command_split.py::TestLiveOrderCommandSplit::test_persist_precedes_submit
        - tests/test_executor_command_split.py::TestLiveOrderCommandSplit::test_submit_unknown_writes_event_with_state_unknown
        - tests/test_executor_command_split.py::TestLiveOrderCommandSplit::test_idempotency_key_collision_raises_before_submit
        - tests/test_executor_command_split.py::TestExitOrderCommandSplit::test_exit_persist_precedes_submit
        - tests/test_executor_command_split.py::TestExitOrderCommandSplit::test_exit_submit_unknown_writes_event_with_state_unknown
        - tests/test_executor_command_split.py::TestIdempotencyCollisionRetry::test_idempotency_collision_returns_existing_state_acked
        - tests/test_executor_command_split.py::TestIdempotencyCollisionRetry::test_idempotency_collision_with_filled_state_returns_pending
        - tests/test_executor_command_split.py::TestIdempotencyCollisionRetry::test_idempotency_collision_with_rejected_state_returns_rejected
        - tests/test_executor_command_split.py::test_synthetic_decision_id_emits_warning
        - tests/test_executor_db_target.py::TestExecutorDbTarget::test_live_order_writes_command_to_trades_db
        - tests/test_executor_db_target.py::TestExecutorDbTarget::test_exit_order_writes_command_to_trades_db
  - id: INV-31
    zones: [K2_runtime]
    statement: Cycle start must scan venue_commands for unresolved states (SUBMITTING,
      UNKNOWN, REVIEW_REQUIRED, CANCEL_PENDING) and apply reconciliation events
      based on venue truth. Cross-DB note per INV-30 — venue_commands lives in
      zeus_trades.db; reconciliation does not block the cycle on errors.
    why: Without active reconciliation, UNKNOWN/SUBMITTING rows accumulate
      indefinitely. Recovery is the only path that turns runtime crash debris
      into a clean operator surface. P2/K4 will extend with chain-truth integration
      for FILL_CONFIRMED.
    enforced_by:
      tests:
        - tests/test_command_recovery.py::TestRecoveryResolutionTable::test_submitting_with_venue_order_resolves_to_acked
        - tests/test_command_recovery.py::TestRecoveryResolutionTable::test_submitting_without_order_id_resolves_to_expired
        - tests/test_command_recovery.py::TestRecoveryResolutionTable::test_unknown_with_venue_order_resolves_to_acked
        - tests/test_command_recovery.py::TestRecoveryResolutionTable::test_unknown_without_venue_order_resolves_to_review_required
        - tests/test_command_recovery.py::TestRecoveryResolutionTable::test_cancel_pending_with_missing_order_resolves_to_cancelled
        - tests/test_command_recovery.py::TestRecoveryResolutionTable::test_review_required_is_skipped
        - tests/test_command_recovery.py::TestRecoveryResolutionTable::test_venue_lookup_exception_leaves_state
        - tests/test_command_recovery.py::TestRecoveryCycleIntegration::test_cycle_runner_calls_recovery
  - id: INV-32
    zones: [K2_runtime]
    statement: Position authority (materialize_position) advances ONLY after the
      venue command has reached state ACKED, PARTIAL, or FILLED. Commands in
      SUBMITTING / UNKNOWN / REVIEW_REQUIRED do not yield position rows; recovery
      resolves them out-of-band.
    why: >
      Pre-P1, materialize_position fired on result.status == pending regardless
      of command state. That races the command journal: a position appeared as
      active while the venue might never have received the order. Tying
      materialization to durable ack closes that window.
    enforced_by:
      tests:
        - tests/test_discovery_idempotency.py::test_materialize_skipped_for_submitting_command
        - tests/test_discovery_idempotency.py::test_materialize_skipped_for_unknown_command
        - tests/test_discovery_idempotency.py::test_materialize_runs_for_acked_command
