schema_version: 1
metadata:
  created: "2026-04-13"
  owner_packet: "Packet 6 scripts manifest and DB repair guardrails"
  note: >
    Manifest for top-level scripts. Effective metadata is class defaults plus
    per-script overrides. This is a safety manifest, not permission to run any
    script.

required_effective_fields:
  - class
  - status
  - lifecycle
  - authority_scope
  - reuse_when
  - do_not_use_when
  - canonical_command
  - delete_policy
  - read_targets
  - write_targets
  - dry_run_default
  - apply_flag
  - target_db
  - external_inputs
  - dangerous_if_run
  - promotion_barrier
  - required_helpers
  - required_tests

canonical_db_targets:
  - state/zeus_trades.db
  - state/zeus-world.db
  - state/risk_state.db
  - state/zeus.db
  - state/zeus-paper.db
  - state/zeus-shared.db

diagnostic_allowed_write_targets:
  - stdout
  - temp
  - state/zeus_backtest.db
  - state/*.json
  - docs/reports
  - docs/reports/*

allowed_lifecycles:
  - long_lived
  - packet_ephemeral
  - promotion_candidate
  - deprecated_fail_closed

class_selection_guide:
  enforcement: Repeatable repo policy, topology, structural lint, or contract gate.
  diagnostic: Read-only investigation; output is stdout and cannot authorize live changes.
  diagnostic_report_writer: Repeatable non-authority report artifact writer.
  runtime_support: Operator/runtime health, heartbeat, watch, resume, or post-run support.
  etl_writer: Repeatable external/world-data ingestion or backfill writer.
  repair: Packet-approved repair with explicit dry-run/apply boundary.
  config_writer: Repeatable config artifact generator from declared inputs.
  stale_deprecated: Retained only to fail closed; canonical_command must be DO_NOT_RUN.

long_lived_naming:
  allowed_prefixes:
    - check_
    - validate_
    - verify_
    - audit_
    - diagnose_
    - etl_
    - backfill_
    - rebuild_
    - migrate_
    - repair_
    - run_
    - generate_
    - build_
    - capture_
    - post_
    - resume_
    - kickoff_
    - watch_
  exceptions:
    _yaml_bootstrap.py: import bootstrap helper for script entrypoints
    antibody_scan.py: established operator diagnostic name
    apply_recommended_controls.py: established control-plane repair entrypoint
    auto_pause_live.sh: established operator emergency control
    automation_analysis.py: established automation diagnostic report
    baseline_experiment.py: established diagnostic baseline report
    cleanup_ghost_positions.py: established repair command name
    data_completeness_audit.py: legacy word-order exception; keep until renamed
    deep_heartbeat.py: established runtime heartbeat helper
    deprecate_legacy_state_files.py: established repair command name
    equity_curve.py: established diagnostic report command
    force_lifecycle.py: established repair command name; dangerous and packet-gated
    healthcheck.py: established operator entrypoint
    heartbeat_dispatcher.py: established runtime dispatcher
    investigate_ecmwf_bias.py: established diagnostic report name
    live_smoke_test.py: established runtime smoke entrypoint
    nuke_rebuild_projections.py: established repair command name; dangerous and packet-gated
    onboard_cities.py: established ETL/operator onboarding entrypoint
    parse_change_log.py: established utility entrypoint
    post_sequential_fillback.sh: K2 post-backfill fillback orchestrator; post_ prefix is the natural name for a "runs after <x>" ops wrapper
    resume_backfills_sequential.sh: K2 sequential backfill orchestrator; resume_ prefix reflects its role as a restart wrapper
    profit_validation_replay.py: established diagnostic report command
    refit_platt.py: established repair command name
    replay_parity.py: established diagnostic command
    semantic_linter.py: established enforcement tool
    topology_doctor.py: established topology compiler/checker
    venus_autonomy_gate.py: established Venus boundary gate
    venus_sensing_report.py: established Venus boundary report

class_defaults:
  enforcement:
    lifecycle: long_lived
    reuse_when: Repeatable repo policy, topology, or contract enforcement is needed.
    do_not_use_when: The task is a one-off investigation or migration probe.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: blocking_or_policy_check
    read_targets: [repo]
    write_targets: [stdout]
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    promotion_barrier: "May block only when signal is reliable and owned."
    required_helpers: []
    required_tests: [tests/test_topology_doctor.py, tests/test_structural_linter.py]
  diagnostic:
    lifecycle: long_lived
    reuse_when: Repeatable read-only diagnosis is needed without mutating canonical truth.
    do_not_use_when: The output would authorize live changes or write canonical DB truth.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: diagnostic_non_promotion
    read_targets: [state]
    write_targets: [stdout]
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    promotion_barrier: "Diagnostic output cannot authorize live strategy or DB truth changes."
    required_helpers: []
    required_tests: []
  runtime_support:
    lifecycle: long_lived
    reuse_when: Operators need a repeatable runtime support or health command.
    do_not_use_when: The task is a data repair, migration, or strategy diagnostic.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: operator_runtime_support
    read_targets: [state, logs]
    write_targets: [stdout]
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    promotion_barrier: "Runtime support must not become hidden authority."
    required_helpers: []
    required_tests: [tests/test_healthcheck.py, tests/test_runtime_guards.py]
  shadow_artifact_writer:
    lifecycle: long_lived
    reuse_when: Shadow observation artifacts must be written through the declared shadow lane.
    do_not_use_when: The output would place trades, mutate lifecycle truth, or promote diagnostics.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: shadow_observation_write
    read_targets: [state/zeus-world.db, market_data]
    write_targets: [state/zeus-world.db]
    dry_run_default: false
    apply_flag: implicit
    target_db: state/zeus-world.db
    external_inputs: [Polymarket CLOB, Weather observations]
    dangerous_if_run: true
    unguarded_write_rationale: "Existing capture script writes shadow_signals/decision_log without an apply flag; classified as dangerous shadow write until hardened."
    promotion_barrier: "Writes shadow/decision artifacts only; output cannot place trades or promote replay authority."
    required_helpers: [src.state.db.log_shadow_signal, src.state.decision_chain.store_artifact]
    required_tests: [tests/test_run_replay_cli.py, tests/test_replay_time_provenance.py]
  etl_writer:
    lifecycle: long_lived
    reuse_when: A repeatable ETL/backfill writes declared world-data targets.
    do_not_use_when: The task is exploratory or lacks a packet-reviewed write target.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: world_data_write
    read_targets: [external_data, state/zeus-world.db]
    write_targets: [state/zeus-world.db]
    dry_run_default: false
    apply_flag: implicit
    target_db: state/zeus-world.db
    external_inputs: []
    dangerous_if_run: true
    write_by_default: true
    unguarded_write_rationale: "Existing ETL writers often default to writing; Packet 6 marks them dangerous pending CLI hardening."
    promotion_barrier: "Must not promote output to live authority without packet evidence."
    required_helpers: [src.state.db.get_world_connection]
    required_tests: []
  diagnostic_report_writer:
    lifecycle: long_lived
    reuse_when: A repeatable diagnostic report artifact is needed for non-promotion evidence.
    do_not_use_when: The report would become live authority or replace typed runtime truth.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: report_artifact_non_promotion
    read_targets: [state]
    write_targets: [docs/reports, state/*.json, stdout]
    dry_run_default: true
    apply_flag: implicit
    target_db: report_artifact
    external_inputs: []
    dangerous_if_run: true
    unguarded_write_rationale: "Existing report writers write non-authority report artifacts without an apply flag; Packet 6 classifies targets explicitly."
    promotion_barrier: "Writes diagnostic report artifacts only; reports do not become live authority."
    required_helpers: []
    required_tests: []
  repair:
    lifecycle: long_lived
    reuse_when: A packet-approved repair needs an explicit dry-run/apply boundary.
    do_not_use_when: The repair is exploratory, unreviewed, or lacks target DB metadata.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: repair_write
    read_targets: [state]
    write_targets: [state]
    dry_run_default: true
    apply_flag: "--apply"
    target_db: state
    external_inputs: []
    dangerous_if_run: true
    promotion_barrier: "Requires explicit packet, dry-run evidence, and target DB."
    required_helpers: []
    required_tests: []
  stale_deprecated:
    lifecycle: deprecated_fail_closed
    reuse_when: Never; retained only so stale references fail visibly.
    do_not_use_when: Always.
    canonical_command: DO_NOT_RUN
    delete_policy: archive_or_delete_in_cleanup_packet
    status: deprecated
    authority_scope: none
    read_targets: []
    write_targets: []
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    fail_closed: true
    promotion_barrier: "Do not run; replace or archive in cleanup packet."
    required_helpers: []
    required_tests: []
  config_writer:
    lifecycle: long_lived
    reuse_when: A repeatable config artifact must be generated from declared inputs.
    do_not_use_when: The generated config cannot be reviewed before promotion.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: config_generation
    read_targets: [state/zeus-world.db]
    write_targets: [config/city_monthly_bounds.json]
    dry_run_default: false
    apply_flag: implicit
    target_db: config/city_monthly_bounds.json
    external_inputs: []
    dangerous_if_run: true
    write_by_default: true
    unguarded_write_rationale: "Existing generator writes active config without an apply flag; must be packet-reviewed before use."
    promotion_barrier: "Generated config cannot be promoted without review and diff evidence."
    required_helpers: []
    required_tests: [tests/test_ingestion_guard.py, tests/test_cities_config_authoritative.py]
  utility:
    lifecycle: long_lived
    reuse_when: A narrow reusable repo utility is needed.
    do_not_use_when: The utility would become hidden authority or mutate truth.
    canonical_command: "python scripts/{script}"
    delete_policy: retain_until_superseded
    status: active
    authority_scope: utility
    read_targets: [repo]
    write_targets: [stdout]
    dry_run_default: true
    apply_flag: null
    target_db: null
    external_inputs: []
    dangerous_if_run: false
    promotion_barrier: "Utility output is not authority."
    required_helpers: []
    required_tests: []

