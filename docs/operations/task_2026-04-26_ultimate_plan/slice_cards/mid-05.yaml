id: mid-05
title: EXCHANGE_RECONCILE_SWEEP — exchange-side journal-diff (F-006 closure)
authority_basis:
  - Apr26 review §3 F-006 (line 420, position-level vs execution-level reconcile)
  - Apr26 §8.3 transition_RECONCILED_BY_OPEN_ORDERS (line 635)
  - Apr26 §8.3 transition_RECONCILED_BY_TRADES (line 636)
  - Apr26 §8.3 transition_POSITION_CONFIRMED_FROM_EXCHANGE (line 634)
  - 'Forbid-rerun list: INV-30 + INV-31 (recovery loop) — EXCH_RECON must compose with both, not replace'
  - 'Joint-converged Mid R1L1 result: F-006 SPLIT (authority-direction CLOSED via INV-32; exchange-enum OPEN)'
file_line:
  current_state:
    - src/execution/command_recovery.py:124-126  # client.get_order(venue_order_id) — single-row lookup ONLY; never enumerates exchange-side
    - src/execution/command_recovery.py:80-92  # SUBMITTING + no_venue_order_id → REVIEW_REQUIRED operator-handoff (the exact F-006 case)
    - src/engine/cycle_runtime.py:139-190  # cleanup_orphan_open_orders DOES call clob.get_open_orders() at L173 BUT it's POSITION-side orphan-cancel (cancels exchange-only orders), not journal-DIFF
    - src/data/polymarket_client.py:275-287  # get_open_orders() exists — REUSABLE (no new SDK wrapper needed)
    - src/data/polymarket_client.py:289-340  # get_positions_from_api() exists — REUSABLE
    - src/data/polymarket_client.py  # get_trades(since) — DOES NOT EXIST; new SDK wrapper required for trades enumeration
  zero-enumeration_evidence:
    - "grep open_orders|get_trades|get_positions across src/execution/command_recovery.py = 0 hits (R1L1 turn-3 verified)"
new_module: src/execution/exchange_reconcile_sweep.py
module_responsibilities:
  - Periodic (per-cycle or every-N-cycle) sweep that enumerates exchange-side state via 3 SDK calls:
      1. client.get_open_orders() — all currently-resting orders
      2. client.get_trades(since=last_sweep_at) — fills since last sweep
      3. client.get_positions_from_api() — exchange's view of positions
  - Diff each enumerated set against the journal:
      - venue_commands rows in IN_FLIGHT_STATES + ACKED + PARTIAL — should be present in get_open_orders, OR have a corresponding fill in get_trades
      - exchange-side ghost orders (in get_open_orders, NOT in venue_commands by venue_order_id) — flag + emit OPERATOR_REVIEW
      - exchange-side trades not yet recorded as FILL_CONFIRMED — emit FILL_CONFIRMED for matched venue_commands row
      - position-snapshot drift between venue and journal-derived position — emit POSITION_RECONCILE_DELTA event (operator-visible)
mutual_exclusion_with_INV31:
  decision: EXCHANGE_RECONCILE_SWEEP runs AFTER command_recovery.reconcile_unresolved_commands within the same cycle tick
  rationale: |
    INV-31 (command_recovery) reconciles WHAT-WE-PERSISTED (per-row, by venue_order_id).
    EXCHANGE_RECONCILE_SWEEP (mid-05) reconciles WHAT-EXCHANGE-CLAIMS (bulk, by enumeration).
    Running INV-31 first ensures all knowable rows are advanced before exchange-side
    sweep diffs against journal — minimizes false-flag of "ghost orders" that are actually
    rows we just hadn't reconciled yet. mid-05 emits venue_command_events ONLY for rows
    matched to a journal command_id; UNMATCHED exchange-side state goes to a
    separate exchange_reconcile_findings table for operator review (NEVER fabricates a venue_commands row).
  journal_write_authority:
    - mid-05 MAY emit FILL_CONFIRMED + PARTIAL_FILL_OBSERVED + CANCEL_ACKED + EXPIRED for rows already in venue_commands
    - mid-05 MUST NOT call insert_command (NC-19 idempotency would be violated; only the executor or A1 RED-emitter inserts new rows)
    - mid-05 MUST NOT bypass the closed-grammar transitions in src/state/venue_command_repo.py:41-83
schema_changes:
  new_table: exchange_reconcile_findings
  columns:
    - finding_id TEXT PRIMARY KEY
    - sweep_at TEXT  # ISO timestamp of sweep that found this
    - finding_type TEXT  # ghost_order | unrecorded_fill | position_drift | journal_orphan
    - venue_order_id TEXT  # if applicable
    - command_id TEXT  # if matched to journal
    - payload_json TEXT  # raw exchange response excerpt
    - resolution TEXT  # null until operator resolves; values like "operator_acknowledged", "false_positive_post_INV31"
    - resolved_at TEXT
antibody_test:
  new_file: tests/test_exchange_reconcile_sweep.py
  assertions:
    - 'test_sweep_does_not_create_new_venue_commands_rows  # NC-19 + INV-30 invariant: only executor inserts'
    - test_sweep_emits_fill_confirmed_for_matched_journal_row  # exchange shows fill, journal row exists in ACKED → emit FILL_CONFIRMED transitioning ACKED→FILLED
    - test_sweep_flags_ghost_order_for_operator  # exchange shows order with venue_order_id NOT in journal → exchange_reconcile_findings row, no command_id
    - test_sweep_runs_after_command_recovery  # ordering invariant within cycle tick
    - test_sweep_uses_existing_sdk_methods  # reuses client.get_open_orders + get_positions_from_api; new wrapper only for get_trades
    - test_sweep_position_drift_detection  # exchange position shares != journal-derived shares from FILLED rows → POSITION_RECONCILE_DELTA event
    - test_sweep_idempotent_within_cycle  # running sweep twice in same cycle produces identical findings (no double-write events)
  closes_invariants: [F-006 exchange-enum, INV-30 (preserved — sweep does NOT call SDK before persist), INV-31 (composed with — sweep runs AFTER recovery), NC-19 (preserved — sweep does NOT insert new rows)]
sdk_extension_needed:
  new_method: 'PolymarketClient.get_trades(since: str | None = None)'
  current_state: src/data/polymarket_client.py — get_trades does NOT exist
  signature: |
    def get_trades(self, since: Optional[str] = None) -> list[dict]:
        # Returns list of trade dicts; each contains venue_order_id, price, size, executed_at, fee, taker_or_maker
  X1_dependency: get_trades availability in py-clob-client unified surface — verify at R2/R3 cite-time per X1 verdict
depends_on:
  - mid-03  # CANCEL_FAILED + CANCEL_REPLACE_BLOCKED + CLOSED_MARKET_UNKNOWN events — sweep may need to emit these for matched rows in adverse exchange states
  - X1 (judge verdict §29) — get_trades availability in unified SDK
  - INV-31 (already landed) — sweep COMPOSES with command_recovery; ordering pinned in cycle_runner
estimated_h: 14-22  # new module + journal-diff logic + 3 SDK calls + 7 antibody tests + new SDK wrapper for get_trades + new findings table
risk:
  - "JOURNAL-WRITE BOUNDARY: must not insert venue_commands rows. Critic gate enforces this via test_sweep_does_not_create_new_venue_commands_rows. If this gate is bypassed, NC-19 idempotency drift becomes possible."
  - "ORDERING-DEPENDENCY: must run AFTER command_recovery in cycle. If runs before, INV-31's just-resolved rows would be flagged as exchange-side ghosts (false positives). cycle_runner integration must pin order."
  - "GET_TRADES SDK GAP: py-clob-client may not expose get_trades on unified surface. If unavailable, fallback to position-snapshot diff alone (weaker — misses fills that happened-and-were-cancelled within sweep interval). R2/R3 must cite SDK method existence."
  - "POSITION-DRIFT FALSE POSITIVES: exchange position-snapshot vs journal-derived position can diverge for legitimate reasons (e.g. operator manual trade). exchange_reconcile_findings table operator-resolution flow MUST distinguish noise from real drift; suggest 1-cycle suppression for newly-FILLED commands."
  - "PROVENANCE: all sweep findings carry payload_json with raw exchange response. Per Memory L20+L21 + Universal Methodology Constraint #4 (Data Provenance), this is non-negotiable for forensic reconstruction."
critic_gate:
  - test_sweep_does_not_create_new_venue_commands_rows MUST pass (negative-grammar test — disabling closes the invariant violation)
  - test_sweep_runs_after_command_recovery MUST pass (ordering invariant)
  - 'get_trades SDK method exists at R2/R3 cite-time (else: card scope reduces to open_orders + positions only; document fallback)'
  - cycle_runner integration adds the sweep call BEFORE the cycle's monitor_refresh phase (so sweep's POSITION_RECONCILE_DELTA is visible to monitor decisions)
  - exchange_reconcile_findings table schema landed via init_schema (not raw ALTER)
notes:
  - mid-05 closes F-006 EXCHANGE-ENUM gap; F-006 AUTHORITY-DIRECTION (INV-32 command-truth → position-truth) is already CLOSED on HEAD 874e00c.
  - This card REUSES existing SDK methods (get_open_orders + get_positions_from_api) per opponent-mid Turn-4 cardinality reduction. ONLY get_trades is a new SDK wrapper.
  - mid-04 (PARTIAL/RESTING) is a separate card owned by opponent-mid; mid-05 EMITS PARTIAL_FILL_OBSERVED events for matched rows, but does NOT define the event grammar (mid-04 owns that).
  - K6 settlement (REDEEM_*) explicitly OUT-OF-SCOPE per opponent-mid Strike-3 + judge §74 K=4 mid-active.
