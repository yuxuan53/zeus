  - docs/operations/task_2026-04-26_ultimate_plan/evidence/down/_context_boot_opponent.md §3.5 (post_heartbeat at client.py:245-251)
  - docs/operations/task_2026-04-26_ultimate_plan/evidence/down/_context_boot_opponent.md §3.8 (get_fee_rate_bps + get_fee_exponent + get_tick_size + get_neg_risk dedicated methods)
