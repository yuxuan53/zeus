  - Apr26 review F-009 (tick/min/negRisk SDK discipline at SDK boundary; antibody pattern is the closure mechanism)
  - architecture/test_topology.yaml:134 (existing V1 antibody registered; new V2 antibody must be registered alongside)
  - Fitz Constraint #3 "Immune system > security guard" — antibody is the early-warning tripwire for SDK-rename surprise; cheaper than discovering breakage at first runtime call
file_line:
  current_state:
    - tests/test_neg_risk_passthrough.py:66-83  # V1 antibody pattern: skip-if-not-importable + assert get_neg_risk callable
    - tests/test_polymarket_error_matrix.py:39  # V1 PolyApiException import; V2 also exposes PolyApiException + PolyException (per opponent-down §3.9 — same class name, no rename)
    - architecture/test_topology.yaml:134  # V1 antibody registry entry
    - architecture/source_rationale.yaml:271,606-608  # polymarket_client.py registry; needs protocol_version: v1 (today) → v2 (post-down-01)
  zero-emission_evidence:
    - "grep py_clob_client_v2 tests/ = 0 hits across HEAD 874e00c"
    - "no test asserts presence of OrderArgsV1, OrderArgsV2, _resolve_version, _is_v2_order, post_heartbeat, get_fee_rate_bps, get_fee_exponent, get_tick_size, or get_neg_risk on V2 SDK"
  new_emission_seam:
    - tests/test_v2_sdk_contract.py (NEW)  # asserts unified-client shape; pattern from tests/test_neg_risk_passthrough.py:66-83
    - architecture/test_topology.yaml:134 area  # add new test entry
antibody_test:
  new_file_or_extend: tests/test_v2_sdk_contract.py (NEW; this slice IS the antibody)
  assertions:
    - test_v2_sdk_imports_or_skip  # `from py_clob_client_v2.client import ClobClient`; pytest.skip if ImportError (matches V1 antibody pattern at test_neg_risk_passthrough.py:66-83)
    - test_v2_sdk_exports_order_args_v1_and_v2  # asserts both OrderArgsV1 and OrderArgsV2 importable from py_clob_client_v2 (or its clob_types submodule); FAILS if SDK collapses to one shape
    - test_v2_sdk_exposes_resolve_version_and_is_v2_order  # asserts ClobClient class has _resolve_version (or _ClobClient__resolve_version when name-mangled) and _is_v2_order (or module-level alternative); these are the per-token-routing primitives
    - test_v2_sdk_exposes_post_heartbeat  # ClobClient.post_heartbeat callable; signature accepts heartbeat_id="" string param
    - test_v2_sdk_exposes_get_fee_rate_bps  # ClobClient.get_fee_rate_bps callable; signature accepts token_id string param (replaces direct httpx /fee-rate per Apr26 §2.8)
    - test_v2_sdk_exposes_get_tick_size_and_get_neg_risk  # both callable with token_id; preserves Apr26 F-009 closure
    - test_v2_sdk_exposes_get_balance_allowance  # ClobClient.get_balance_allowance + BalanceAllowanceParams + AssetType (for down-07 pUSD wiring)
    - test_v2_sdk_create_order_post_order_two_step_pattern_intact  # ClobClient.create_order(args) + ClobClient.post_order(signed) BOTH exist as public methods (NOT collapsed to only create_and_post_order); this is the seam mid-02 anchors on
    - test_v2_sdk_polyapiexception_class_name_unchanged  # assert PolyApiException importable from py_clob_client_v2.exceptions (V1 + V2 share class name per opponent-down §3.9)
  closes_invariants: [F-009 (tick/min/negRisk discipline at SDK boundary; antibody is the immune-system closure mechanism)]
depends_on:
  - down-02  # PyPI install of py-clob-client-v2 happens via slice 1.G (requirements.txt dual pin); operator-side install evidence is part of D0 question pair
estimated_h: 2-3
risk:
  - "NAME-MANGLING: Python's double-underscore name mangling means `self.__resolve_version` becomes `_ClobClient__resolve_version` on instance. Antibody must use getattr() with both names OR test via behavior (instantiate client with mock host, call create_order, observe resolution behavior). Choose getattr-based check for L1 antibody simplicity."
  - "SDK SURFACE DRIFT: this antibody is the cheapest tripwire for ANY SDK rename in v1.0.x → v1.1+. False-positive risk LOW; false-negative risk HIGH if assertions are too narrow (e.g. assert exact signature). Use `hasattr` + `callable` pattern, NOT signature inspection."
  - "DUAL-PIN PRECONDITION: `py_clob_client_v2` import requires `pip install py-clob-client-v2` to have run. Slice 1.G dual-pin (was in original plan, now folded into down-01) is the dependency. Antibody skips cleanly when V2 SDK absent; test_v2_sdk_imports_or_skip is the gate."
  - "REGISTRY UPDATE COUPLING: architecture/test_topology.yaml:134 registers V1 antibody; new V2 antibody entry must be added in same commit so topology_doctor.py --planning-lock returns ok=true. Co-locate registry edit with test creation."
critic_gate:
  - test runs in two modes: (a) V2 SDK absent → all assertions SKIP cleanly with one `pytest.skip` call (no error); (b) V2 SDK present → all assertions PASS against py-clob-client-v2 v1.0.0 actual surface
  - architecture/test_topology.yaml registry entry added; topology_doctor.py --planning-lock returns ok=true
  - existing V1 antibody at tests/test_neg_risk_passthrough.py:66-83 STAYS GREEN (V2 SDK exposes get_neg_risk per opponent-down §3.10 — Closing as VERIFIED-OK)
  - critic verifies that test_v2_sdk_create_order_post_order_two_step_pattern_intact protects the same seam down-01 commits to (X1 ruling enforcement)
notes:
  - This is a Fitz-Constraint-#3 "antibody" slice — it makes a category of error (SDK-rename, surface-drift) detectable at test time rather than runtime. Cheap insurance.
  - Pre-condition for down-01 (D1 swap): antibody MUST be GREEN before drop-in swap proceeds. If V2 SDK has drifted, antibody fails first → human investigation before swap → no surprise breakage.
  - Pattern source: tests/test_neg_risk_passthrough.py:66-83 (existing V1 antibody). New file mirrors structure exactly.
  - X1 enforcement: test_v2_sdk_create_order_post_order_two_step_pattern_intact is the negative-spec test for X1. If V2 SDK ever collapses post_order into create_and_post_order without keeping the two-step API, this antibody breaks LOUDLY → mid-02's interception design needs revisit.
