notes:
  - This slice is a TRACKER SLOT until Q-HB returns positive. Until then, the yaml card exists; no code lands.
  - 'Activation trigger: Polymarket support / Discord confirms a mandated heartbeat cadence rule (e.g. "10s missed → mass cancel"). Without that cite, this slice is permanently SKIP.'
  - Race-spec (a)-(e) is BINDING when activated. The 180-second window between V2-heartbeat fail and existing 3-strike os._exit gives ample room for tombstone-write to complete.
  - 'WHY a 4th apscheduler-job, NOT a new threading primitive: Zeus has zero asyncio code (impact_report §4.2 confirms; grep validates). main.py:19 uses BlockingScheduler. Adding a new threading model is an architectural shift this slice does NOT take. Sibling-job pattern reuses existing daemon supervisor.'
  - 'WHY tombstone-write BEFORE os._exit: existing _heartbeat_fails 3-strike os._exit at main.py:367 BYPASSES Python finally/atexit and any sibling-job''s tombstone-flush. Race avoidance: V2-heartbeat owns its OWN counter and writes tombstone EAGERLY on fail, not lazily on N-th strike.'
  - 'Activation likelihood: LOW. Polymarket has not surfaced a mandated cadence in any reachable surface. Slot is future-proofing without LOC cost.'
