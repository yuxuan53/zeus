acceptance_criteria_when_activated:
  - "(a) MUST be a `scheduler.add_job(...)` call at main.py:579 sibling to _write_heartbeat. NOT new threading. NOT asyncio (Zeus has zero asyncio per impact_report §4.2; BlockingScheduler-only)."
  - "(b) Tombstone-write MUST use atomic tmp-then-replace pattern matching _write_heartbeat lines 350-352 (Path.write_text(json.dumps(...)) on tmp; tmp.replace(target))."
  - "(c) V2-heartbeat tick on exception writes tombstone then RETURNS. Does NOT call os._exit. Existing _write_heartbeat 3-strike os._exit(1) is the daemon-fatal path; V2-heartbeat is fail-soft."
  - "(d) Cycle entry (_run_mode at main.py:78 or earlier) reads tombstone BEFORE _cycle_lock.acquire. If reason starts with 'clob_v2_heartbeat_failure_', log + return without lock acquire or cycle body. Existing tombstone semantics extended."
  - "(e) Race-coverage for worst-case (existing _write_heartbeat os._exit wins over V2-heartbeat tombstone-write): (i) os._exit fires only after 3 consecutive 60s strikes (180s minimum); (ii) on daemon restart, INV-25 V2-preflight (architecture/invariants.yaml:202-204) blocks new placement until V2 endpoint reachable; (iii) cleanup_orphan_open_orders at cycle_runner.py:287 catches process-death orphans. Window structurally closed by EXISTING mechanisms."
