# Down R2L2 (2026-04-26 turn-3) — A4 SINGLE-FILE TWO-REASON-PREFIX INVARIANT:
single_tombstone_invariant:
  rule: "ONE physical tombstone file (state/auto_pause_failclosed.tombstone), TWO reason-prefix domains. V2-heartbeat NEVER writes daemon-heartbeat.json (existing _write_heartbeat owns that distinct file)."
  files:
    - "state_path('daemon-heartbeat.json') — existing, owned by _write_heartbeat (apscheduler 60s job, 3-strike os._exit at main.py:369)"
    - "state/auto_pause_failclosed.tombstone — existing kill switch, holds two reason-prefix domains as a single-file dual-writer pattern"
  reason_prefix_domains:
    - "daemon_heartbeat_failure_* — pre-V2-heartbeat baseline reason prefix domain"
    - "clob_v2_heartbeat_failure_* — written by NEW V2-heartbeat tick on clob.post_heartbeat failure (fail-soft, no os._exit)"
  invariant: "Single-writer-per-reason-prefix; V2-heartbeat tick writes ONLY `clob_v2_heartbeat_failure_*` reason and NEVER touches daemon-heartbeat.json"
  tests:
    - "tests/test_clob_v2_heartbeat_supervisor.py::test_v2_heartbeat_writes_distinct_reason_prefix — mock V2 failure; assert reason.startswith('clob_v2_heartbeat_failure_') AND NOT 'daemon_heartbeat_failure_'"
    - "tests/test_clob_v2_heartbeat_supervisor.py::test_v2_heartbeat_never_touches_daemon_heartbeat_json — mock V2 failure; assert daemon-heartbeat.json stat unchanged + auto_pause_failclosed.tombstone written with V2-prefixed reason"
