antibody_test:
  new_file_or_extend: tests/test_state_grammar_amend.py (NEW) + extend tests/test_command_bus_types.py + extend tests/test_command_recovery.py
  assertions:
    - test_command_state_strings_match_repo_round_trip  # extend existing antibody to cover CANCEL_FAILED state member
    - test_cancel_failed_terminal_no_outgoing_transitions  # CANCEL_FAILED is in TERMINAL_STATES; (CANCEL_FAILED, *) ∉ _TRANSITIONS
    - test_cancel_failed_event_legal_from_submitting_acked_unknown_partial_cancel_pending  # 5 legal source states
    - test_partial_fill_observed_payload_schema_filled_size_remaining_size  # PARTIAL_FILL_OBSERVED carries filled_size + remaining_size in payload_json
    - test_partial_fill_observed_remaining_size_eq_size_minus_sum_filled  # cross-row invariant: sum(payload.filled_size) == venue_commands.size - latest.remaining_size
    - test_submit_timeout_unknown_distinct_from_submit_unknown  # SUBMIT_TIMEOUT_UNKNOWN is timeout-after-post; SUBMIT_UNKNOWN is exception-before-post
    - test_closed_market_unknown_emitted_when_discovery_invalidates_mid_cycle  # if discovery_state changes to CLOSED while command in flight, emit CLOSED_MARKET_UNKNOWN
    - test_cancel_replace_blocked_when_post_only_violation  # post-only constraint rejection produces CANCEL_REPLACE_BLOCKED, not generic REJECTED
    - test_executor_does_not_flatten_submit_unknown_to_rejected_status  # OrderResult.status carries the typed grammar (or new typed-error field), not the generic "rejected" string
    - test_inv29_compat_map_complete  # every §8.3 transition mapped to {already-exists, payload-typing, new-state, new-event} in slice doc
  closes_invariants: [INV-29 (closed-law amendment), F-002 (typed SDK errors), F-004 (partial fill first-class), F-005 (cancel failure first-class)]
