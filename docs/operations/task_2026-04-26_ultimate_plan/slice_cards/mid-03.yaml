  - "VOID/REJECTED-AT-VENUE/POST_ONLY_REJECTED are payload-discrimination on existing CommandState.REJECTED, not new enum members (per proponent-mid R2 enumeration accepted by opponent-mid R5)"
  - "K3 RESTING (ACCEPTED-vs-RESTING): proponent prefers payload-discrimination via venue_status; opponent prefers enum split. R2 audit of chain_reconciliation/lifecycle_manager downstream interpretation decides."
  - "F-002 typed-error closure depends on this slice landing FIRST so executor.py can stop flattening exceptions to generic status='rejected'"
