  - "BACKWARD COMPAT: existing venue_commands rows in production DBs have current grammar. Migration must NOT mutate historical rows; new state members apply to NEW commands only."
  - "CANCEL_FAILED vs REVIEW_REQUIRED authority: when SDK rejects cancel, is the row CANCEL_FAILED (terminal — give up) or REVIEW_REQUIRED (operator-resolves)? Decide based on whether venue exposes a retry-allowed flag in error response."
