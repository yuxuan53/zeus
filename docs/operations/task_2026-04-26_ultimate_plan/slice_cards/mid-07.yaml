    tests/test_ws_or_poll_sufficiency.py::test_polling_loop_has_documented_miss_window_bound
    asserts: poll_interval_seconds × 2 < settlement_market_close_warning_window AND
      miss_window_observability is queried by mid-06 relationship test (forces honest disclosure of gap rather than silent miss)
  - |
    tests/test_ws_or_poll_sufficiency.py::test_ws_path_emits_equivalent_command_events_when_enabled
    asserts: when ZEUS_WS_FILL_INGEST=1, ws_listener emits SUBMIT_ACKED / PARTIAL_FILL_OBSERVED / FILL_CONFIRMED / CANCEL_FAILED via venue_command_repo with EXACTLY THE SAME schema as polling path (paper/live parity by construction)
  - |
    tests/test_ws_or_poll_sufficiency.py::test_no_user_ws_subscription_creates_documented_polling_evidence_file
    asserts: if SDK does NOT expose user-WS, evidence/mid/ws_or_poll_decision_2026-04-26.md exists AND documents miss-window bound + reconciliation cadence
  - architecture/test_topology.yaml registry entry added
