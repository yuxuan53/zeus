    - src/engine/cycle_runner.py:60-102 (_execute_force_exit_sweep — sequential cycle model; current model assumes polling-only)
    - src/execution/fill_tracker.py (existing fill ingestion via REST polling)
    - src/state/venue_command_repo.py:42-84 (_TRANSITIONS — events that WS-mode would emit equivalently)
