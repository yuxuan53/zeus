notes:
  - DECISION SLICE — owner picks (a) USER_WS available + adopt, OR (b) USER_WS absent + document miss-window bound + tighten polling. Either path closes axis-45 + axis-24.
  - 'If (a) WS adopted: must NOT remove polling sweep (mid-05) — WS + sweep is belt-and-suspenders per Apr26 axis-24.'
  - 'If (b) polling-only: must produce miss-window bound (e.g., "max 2× poll_interval = 60s" with reconciliation closes any gap within next sweep) and surface as observability metric in mid-06.'
  - Cross-region: down-01 unified-SDK swap may change WS surface availability — must coordinate via X1 AST-shape contract (don't pin to V1-only or V2-only WS API).
  - 'Closes the largest single scope hole flagged by multi-review critic: zero WebSocket coverage across all prior 20 cards.'
