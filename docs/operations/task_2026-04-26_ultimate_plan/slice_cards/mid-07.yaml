  - Apr26 forensic review §6 axis-24 ("user WS or documented polling loop with equivalent guarantees")
  - evidence/multi_review/critic_report.md TOP_5_ATTACKS §1 (zero `WebSocket|user.ws` hits across all 20 prior cards; mid-05 polling self-acknowledges miss-windows)
  - evidence/mid/converged_R1L1.md (mid-05 EXCH_RECON acknowledged "GET_TRADES SDK GAP" + "POSITION-DRIFT FALSE POSITIVES" risks)
