id: F1
phase: F
title: Forecast pipeline plumbing — wired but operator-gated source switch
purpose: |
  Wire the ingestion architecture so any new forecast source (TIGGE, GFS,
  ECMWF HRES, etc.) can be added by config + operator flag, without code
  changes in calibration / signal / strategy. Existing scaffolding in
  `src/data/ensemble_client.py` + `src/data/forecasts_append.py` +
  `src/signal/ensemble_signal.py` extended with a typed source registry.
authority_basis:
  - 'User directive 2026-04-26: "数据回输和训练（例如tigge数据）的时候需要我决定，但是搭线需要搭好" (data ingest + training is operator-decision; wiring must be ready)'
  - AGENTS.md "THE PROBABILITY CHAIN" — `51 ENS members → ... → P_raw → Platt → ...`
  - evidence/multi_review/trading_correctness_report.md MONEY_PATH_GAPS (forecast/calibration/learning untouched in R2)
preconditions:
  head: 874e00cc0244 + Z0..Z4 + U1 + U2 land (M-series may run in parallel)
  required_files:
    - src/data/ensemble_client.py (existing; will be extended)
    - src/data/forecasts_append.py (existing; will be extended)
    - src/signal/ensemble_signal.py (existing)
    - src/calibration/platt.py (existing)
    - src/contracts/ensemble_snapshot_provenance.py (existing)
deliverables:
  new_modules:
    - path: src/data/forecast_source_registry.py
      summary: |
        Typed registry of forecast sources. Each source is wired but has
        a feature flag for active ingest. Operator flips flags to add a
        source to the live ensemble.
      surface: |
        @dataclass(frozen=True)
        class ForecastSourceSpec:
            source_id: str  # e.g., "ecmwf_open_data", "tigge", "gfs", "openmeteo_quota"
            tier: Literal["primary","secondary","experimental","disabled"]
            ingest_class: type[ForecastIngestProtocol]
            requires_api_key: bool
            requires_operator_decision: bool
            operator_decision_artifact: Optional[str]  # path to evidence file
            env_flag_name: Optional[str]  # e.g., "ZEUS_TIGGE_INGEST_ENABLED"

        SOURCES: 'dict[str, ForecastSourceSpec] = {'
            "ecmwf_open_data": ForecastSourceSpec(
                source_id="ecmwf_open_data",
                tier="primary",
                ingest_class=ECMWFOpenDataIngest,  # existing in src/data/ecmwf_open_data.py
                requires_api_key=False,
                requires_operator_decision=False,
                env_flag_name=None,
            ),
            "tigge": ForecastSourceSpec(
                source_id="tigge",
                tier="experimental",
                ingest_class=TIGGEIngest,  # NEW — F3 mints stub
                requires_api_key=True,  # ECMWF TIGGE archive requires registration
                requires_operator_decision=True,
                operator_decision_artifact="docs/operations/.../evidence/tigge_ingest_decision_<date>.md",
                env_flag_name="ZEUS_TIGGE_INGEST_ENABLED",
            ),
            # ... other sources
        }

        def active_sources() -> list[ForecastSourceSpec]:
            """Return sources whose tier != 'disabled' AND (no operator decision required OR decision artifact + env flag both present)."""
        def gate_source(source_id: str) -> bool:
            """Check operator gate at runtime; raise SourceNotEnabled if gate-locked."""

    - path: src/data/forecast_ingest_protocol.py
      surface: |
        class ForecastIngestProtocol(Protocol):
            source_id: str
            def fetch(self, run_init_utc: datetime, lead_hours: list[int]) -> ForecastBundle: ...
            def health_check(self) -> ForecastSourceHealth: ...

        @dataclass(frozen=True)
        class ForecastBundle:
            source_id: str
            run_init_utc: datetime
            lead_hours: list[int]
            ensemble_members: list[ForecastMember]  # adapt existing ForecastMember from contracts/
            captured_at: datetime
            raw_payload_hash: str
            authority_tier: Literal["GROUND_TRUTH","FORECAST","DERIVED"]
  extended_modules:
    - file: src/data/forecasts_append.py
      change: |
        Extend writer to accept `source_id` per-row; ensure every persisted
        forecast carries source_id + raw_payload_hash + captured_at +
        authority_tier (mirrors weather observation_atom shape).
    - file: src/data/ensemble_client.py
      change: |
        Resolve live ensemble model identity through forecast_source_registry
        before network fetch and return source_id/raw_payload_hash/captured_at/
        authority_tier metadata with the fetched member arrays.
    - file: src/signal/ensemble_signal.py
      change: |
        No math change in F1. EnsembleSignal remains a pure member-array →
        P_raw engine; registry/source gating lives at data/evaluator fetch
        boundaries so Monte Carlo behavior is bit-identical.
acceptance_tests:
  - tests/test_forecast_source_registry.py::test_disabled_source_excluded_from_active_list
  - tests/test_forecast_source_registry.py::test_operator_decision_gated_source_blocked_when_artifact_absent
  - tests/test_forecast_source_registry.py::test_operator_decision_gated_source_blocked_when_env_flag_unset
  - tests/test_forecast_source_registry.py::test_gated_source_active_when_artifact_present_AND_env_flag_set
  - tests/test_forecast_source_registry.py::test_ingest_protocol_requires_source_id_and_authority_tier
  - tests/test_forecast_source_registry.py::test_forecasts_append_persists_source_id_and_raw_payload_hash
  - tests/test_forecast_source_registry.py::test_tigge_gate_closed_does_not_call_fetch
  - tests/test_forecast_source_registry.py::test_ensemble_fetch_result_carries_registry_provenance
  - tests/test_forecast_source_registry.py::test_ensemble_signal_math_bit_identical_with_registry_metadata_only
operator_decision_required: []
depends_on: [Z0..Z4, U1, U2]
estimated_h: 12
risk: medium
critic_gate: critic-opus
links:
  r2_cards: []
  v2_1_phases: []  # net new for R3
new_invariants_or_NCs:
  - 'NC-NEW-J (new): "Forecast source ingestion gated by operator-decision artifact + env flag where required. Source classes raise SourceNotEnabled if gate-locked."'
  - INV-NEW-N: "Every forecast row in `forecasts` table carries `source_id` + `raw_payload_hash` + `authority_tier` — same provenance discipline as observation_atoms."
notes:
  - This card builds the WIRING. F2 adds calibration loop control. F3 adds the TIGGE-specific ingest stub.
  - Existing primary sources (ECMWF open data, openmeteo, etc.) are tier='primary' and ungated.
  - TIGGE is tier='experimental' AND operator-decision-gated. Code path lands; ingest is dormant until operator flips the flag.
  - Operator decision artifact + env flag is the same dual-gate pattern as Q-FX-1 (Z4) — process gate + runtime gate.
