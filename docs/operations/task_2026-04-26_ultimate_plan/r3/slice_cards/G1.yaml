id: G1
phase: G
title: Live readiness gates — 17 CI gates + staged live-smoke verification
purpose: |
  Zeus is not live-money-ready until ALL 17 gates pass in CI AND at least
  one staged live-smoke environment. Each gate is a runnable test or
  semgrep rule that maps to a specific R3 slice antibody.
authority_basis:
  - V2.1 §G1
  - All R3 phases Z..A inheritance (each phase contributes ≥1 gate)
preconditions:
  head: 874e00cc0244 + ALL Z0..Z4 + U1 + U2 + M1..M5 + R1 + T1 + F1 + F2 + F3 + A1 + A2 land
deliverables:
  new_modules:
    - path: scripts/live_readiness_check.py
      summary: Runs all 17 gates; reports per-gate PASS/FAIL with evidence path.
  new_tests:
    - tests/test_live_readiness_gates.py — orchestrates the 17 gate tests
acceptance_tests:
  # Gates — each is runnable + auto-runs in CI
  - 1. V2 SDK gate
    | tests/test_live_readiness_gates.py::test_only_v2_sdk_in_live_code
    | grep `from py_clob_client ` in src/ live-mode paths returns 0
  - 2. Host gate
    | tests/test_live_readiness_gates.py::test_correct_pre_cutover_or_production_host_verified_from_zeus_daemon
    | reads evidence/q1_zeus_egress_*.txt; asserts probe response 200 OK
  - 3. Heartbeat gate
    | tests/test_live_readiness_gates.py::test_heartbeat_supervised_failure_quarantines_orders
    | inject heartbeat miss in fake venue; assert HEARTBEAT_CANCEL_SUSPECTED on local resting orders
  - 4. pUSD gate
    | tests/test_live_readiness_gates.py::test_pusd_balance_allowance_wrap_unwrap_tested
    | Z4 antibody suite green
  - 5. Sell-token gate
    | tests/test_live_readiness_gates.py::test_exits_use_token_balances_reservations
    | Z4 + M4 antibody suite green
  - 6. Snapshot gate
    | tests/test_live_readiness_gates.py::test_every_order_has_fresh_executable_snapshot
    | U1 antibody — venue_command insert raises StaleMarketSnapshotError when snapshot expired
  - 7. Provenance gate
    | tests/test_live_readiness_gates.py::test_every_side_effect_has_raw_payload_envelope
    | U2 antibody — full provenance chain reconstructable
  - 8. Order-type gate
    | tests/test_live_readiness_gates.py::test_GTC_GTD_FOK_FAK_explicit
    | Z2 antibody — submit() without OrderType raises TypeError
  - 9. Unknown gate
    | tests/test_live_readiness_gates.py::test_unknown_blocks_duplicate_submit
    | M2 antibody green
  - 10. Matched-not-final gate
    | tests/test_live_readiness_gates.py::test_MATCHED_cannot_final_close_or_final_train
    | NC-NEW-H + M3 antibody green
  - 11. User-channel gate
    | tests/test_live_readiness_gates.py::test_user_trade_statuses_persisted_and_reconciled
    | M3 antibody green
  - 12. Cancel/replace gate
    | tests/test_live_readiness_gates.py::test_cancel_unknown_failed_blocks_replacement
    | M4 antibody green
  - 13. Cutover/wipe gate
    | tests/test_live_readiness_gates.py::test_open_order_wipe_simulation_reconciles
    | Z1 + M5 antibody green
  - 14. Crash gate
    | tests/test_live_readiness_gates.py::test_process_crash_at_every_order_lifecycle_point_recovers_deterministically
    | T1 P0 suite green
  - 15. Paper/live parity gate
    | tests/test_live_readiness_gates.py::test_fake_venue_produces_same_event_schema_as_live_adapter
    | T1 antibody green
  - 16. Strategy benchmark gate
    | tests/test_live_readiness_gates.py::test_alpha_candidates_pass_replay_paper_shadow
    | A1 antibody green
  - 17. Agent-docs gate
    | tests/test_live_readiness_gates.py::test_no_agent_facing_docs_expose_direct_SDK_calls_or_ambiguous_status
    | grep agent-facing docs for forbidden tokens
operator_decision_required:
  - gate_id: live-money-deploy-go
    blocking: yes (LIVE deployment final gate)
    artifact: scripts/live_readiness_check.py output showing 17/17 PASS + staged-live-smoke evidence
    runtime_gate: operator dispatches deploy command after CI green + smoke green
depends_on: [Z0..Z4, U1, U2, M1, M2, M3, M4, M5, R1, T1, F1, F2, F3, A1, A2]
estimated_h: 14
risk: medium
critic_gate: critic-opus + operator
links:
  r2_cards: [up-06, up-08, mid-06]
  v2_1_phases: [G1]
new_invariants_or_NCs:
  - INV-NEW-S: "LIVE deployment requires 17/17 G1 gate PASS + ≥1 staged-live-smoke environment passing the same test set."
notes:
  - G1 is the last gate before live-money cutover. All R3 phases contribute their antibodies; G1 is the orchestration surface.
  - Operator gate is the FINAL live-money flip; engineering can ship the suite green but operator pulls the trigger.
