id: M2
phase: M
title: SUBMIT_UNKNOWN_SIDE_EFFECT semantics — never treat unknown as rejected
purpose: |
  Replace OrderResult.status='rejected' for post-side-effect exceptions
  with 'unknown_side_effect'. Block duplicate retry until reconciliation
  proves no venue side effect.
authority_basis:
  - V2.1 §M2
  - Apr26 review F-002 (submit exceptions become semantic rejection)
  - R2 mid-03 (A3 typed-error closure folded — SUBMIT_TIMEOUT_UNKNOWN event already minted in M1)
preconditions:
  head: 874e00cc0244 + Z0..Z4 + U1 + U2 + M1 land
deliverables:
  extended_modules:
    - file: src/execution/executor.py
      function: execute_entry_order, execute_exit_order
      change: |
        Replace `except Exception as exc: status="rejected"` (currently at
        executor.py:547-577) with typed exception classification:
        - typed venue rejection (response.success=false, error_code) → SUBMIT_REJECTED
        - timeout/network exceptions post-POST → SUBMIT_UNKNOWN_SIDE_EFFECT
        - timeout/network exceptions pre-POST (i.e., pre-signing) → SUBMIT_REJECTED safe
        - unexpected exceptions (TypeError, KeyError) → SUBMIT_UNKNOWN_SIDE_EFFECT (fail-closed, raise)
    - file: src/contracts/execution_intent.py (or similar OrderResult holder)
      change: extend OrderResult.status enum with 'unknown_side_effect' member
    - file: src/execution/command_recovery.py
      function: _resolve_one
      change: |
        Add SUBMIT_UNKNOWN_SIDE_EFFECT case: reconcile by querying venue
        for orders with the idempotency_key; if no order found within
        configured window, emit SAFE_REPLAY_PERMITTED event linking the
        prior unknown; if order found, transition to ACKED; if order
        found and FILLED, transition to FILLED.
acceptance_tests:
  - tests/test_unknown_side_effect.py::test_network_timeout_after_POST_creates_unknown_not_rejected
  - tests/test_unknown_side_effect.py::test_typed_venue_rejection_creates_SUBMIT_REJECTED
  - tests/test_unknown_side_effect.py::test_pre_post_signing_exception_safe_to_retry
  - tests/test_unknown_side_effect.py::test_duplicate_retry_blocked_during_unknown
    | identical command idempotency_key → recovery returns existing row in unknown state; second submit attempt raises IdempotencyKeyCollisionWithUnknown
  - tests/test_unknown_side_effect.py::test_strategy_cannot_submit_replacement_with_different_idempotency_key_for_same_economic_intent
    | requires economic-intent fingerprint (token_id + side + price + size) to be tracked alongside idempotency_key; second submit with same fingerprint while unknown exists raises EconomicIntentDuplication
  - tests/test_unknown_side_effect.py::test_reconciliation_finding_order_converts_unknown_to_acked_or_filled
  - tests/test_unknown_side_effect.py::test_reconciliation_finding_no_order_within_window_permits_safe_replay
operator_decision_required: []
depends_on: [Z0, Z1, Z2, Z3, Z4, U1, U2, M1]
estimated_h: 10
risk: high
critic_gate: critic-opus
links:
  r2_cards: [mid-03]
  v2_1_phases: [M2]
new_invariants_or_NCs:
  - INV-NEW-G: "Network/timeout exceptions after POST request leaves the SDK MUST create SUBMIT_UNKNOWN_SIDE_EFFECT, never SUBMIT_REJECTED. Reconciliation determines actual venue state."
notes:
  - F-002 closure depends on this slice landing correctly. Apr26 review §330 lists the canonical pattern.
  - M2 hardens M1's SUBMIT_TIMEOUT_UNKNOWN event with safe-replay semantics.
