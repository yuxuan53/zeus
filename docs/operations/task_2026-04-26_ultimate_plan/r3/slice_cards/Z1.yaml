id: Z1
phase: Z
title: CutoverGuard — runtime state machine for V1→V2 cutover
purpose: |
  Replace the operator-driven runbook for cutover with code. Runtime
  states block live placement during the transition. Z1 exposes a deferred
  post-cutover reconciliation seam; M5/T1 own wiped-order classification and
  full cutover simulation before LIVE_ENABLED can be used operationally.
authority_basis:
  - V2.1 §Z1
  - evidence/multi_review/V2_1_STRUCTURAL_DIFF.md §2.4 (CutoverGuard runtime states, not runbook)
  - INV-25 (V2 endpoint preflight gate, already shipped)
preconditions:
  head: 874e00cc0244 + Z0 lands first
  required_invariants: [INV-23, INV-25, INV-26]
deliverables:
  new_modules:
    - path: src/control/cutover_guard.py
      summary: |
        CutoverGuard module with state enum, transition table, and gate
        helper. Persists current state in `state/cutover_guard.json` (atomic
        write pattern per AGENTS.md "State updates").
      surface: |
        class CutoverState(str, Enum):
            NORMAL = "NORMAL"  # V1 only
            PRE_CUTOVER_FREEZE = "PRE_CUTOVER_FREEZE"  # cancel all V1 open orders, no new V1 submit
            CUTOVER_DOWNTIME = "CUTOVER_DOWNTIME"  # no submits at all
            POST_CUTOVER_RECONCILE = "POST_CUTOVER_RECONCILE"  # V2 only, sweep pre-existing V1 orphans
            LIVE_ENABLED = "LIVE_ENABLED"  # normal V2 operation
            BLOCKED = "BLOCKED"  # operator-set kill switch

        @dataclass(frozen=True)
        class CutoverDecision:
            allow_submit: bool
            allow_cancel: bool
            allow_redemption: bool
            block_reason: Optional[str]

        def current_state() -> CutoverState: ...
        def transition(target: CutoverState, *, operator_token: str, operator_evidence_path: Path | None = None) -> CutoverState: ...
        def gate_for_intent(intent_kind: IntentKind) -> CutoverDecision: ...
        def post_cutover_reconcile(clob_v2: ClobV2Client, conn: sqlite3.Connection) -> ReconcileReport: ...
  extended_modules:
    - file: src/execution/executor.py
      function: execute_intent, execute_exit_order, _live_order
      change: "prepend `decision = cutover_guard.gate_for_intent(intent_kind); if not decision.allow_submit: raise CutoverPending(decision.block_reason)`"
    - file: src/engine/cycle_runner.py
      function: cycle_runner_main_loop
      change: read CutoverGuard.current_state() into cycle_summary observability surface
  state_artifacts:
    - path: state/cutover_guard.json
      summary: |
        Atomic JSON state plus bounded transition event trail. Events store
        operator_id and token fingerprint, never the operator token itself.
        A DB-backed cutover/exchange findings table is deferred to M5.
acceptance_tests:
  - tests/test_cutover_guard.py::test_initial_state_is_normal_or_prior_persisted
  - tests/test_cutover_guard.py::test_cannot_transition_without_operator_token
  - tests/test_cutover_guard.py::test_live_enabled_rejects_unsigned_operator_token
  - tests/test_cutover_guard.py::test_pre_cutover_freeze_blocks_new_submit_allows_cancel
  - tests/test_cutover_guard.py::test_cutover_downtime_blocks_all
  - "tests/test_cutover_guard.py::test_post_cutover_reconcile_marks_v1_orphans_as_VENUE_WIPED_REVIEW (deferred skip in Z1: M5 owns exchange reconciliation findings table and cutover-wipe classification)"
  - "tests/test_cutover_guard.py::test_live_enabled_allows_normal_v2_operation (gate-decision-only in Z1; full V2 adapter operation waits for Z2)"
  - tests/test_cutover_guard.py::test_blocked_kill_switch_blocks_everything
  - "tests/test_cutover_guard.py::test_transition_table_rejects_illegal_jumps (NORMAL → CUTOVER_DOWNTIME skipping FREEZE raises IllegalTransition)"
  - tests/test_cutover_guard.py::test_atomic_write_no_partial_state_visible_during_transition
  - tests/test_cutover_guard.py::test_executor_raises_cutover_pending_when_freeze
  - tests/test_cutover_guard.py::test_cycle_summary_exposes_cutover_state_and_blocks_discovery
  - "tests/test_cutover_guard.py::test_simulate_cutover_open_orders_wipe_no_silent_resting (deferred skip in Z1: fake-venue cutover-wipe simulation belongs to T1/G1 after Z2/M5 surfaces exist)"
operator_decision_required:
  - gate_id: "CLOB v2 cutover"
    blocking: "yes (LIVE_ENABLED transition only)"
    artifact: docs/operations/task_2026-04-26_polymarket_clob_v2_migration/cutover_runbook_2026-XX-XX.md
    runtime_gate: HMAC-signed operator token plus runbook evidence path for LIVE_ENABLED
depends_on: [Z0]
estimated_h: 12
risk: high
critic_gate: critic-opus
links:
  r2_cards: []
  v2_1_phases: [Z1]
new_invariants_or_NCs:
  - INV-NEW-A: "No live submit may proceed when CutoverGuard.current_state() != LIVE_ENABLED. CutoverPending exception raised in executor pre-flight."
notes:
  - This is the first new control surface added by R3. NOT in R2.
  - The operator_token check prevents ambient code from transitioning state; only an operator-issued signed token can drive the state machine.
  - Z1 enforces entry/exit submit preflight before command persistence or SDK contact. Cancel/redemption decisions are exposed as future-facing/advisory surfaces until M4/R1 wire every direct cancel/redeem side effect.
  - post_cutover_reconcile depends on M5 sweep semantics (reuse exchange_reconcile_findings table) — coordinate.
