id: A1
phase: A
title: StrategyBenchmarkSuite — alpha + execution metrics + replay/paper/live promotion gate
purpose: |
  Standardized metrics suite for evaluating alpha candidates. No strategy
  goes live without passing replay → paper → small-cap-live-shadow tests.
  This is the dominance layer; without it Zeus passes safety bar but
  cannot prove edge.
authority_basis:
  - V2.1 §A1
  - AGENTS.md "Strategy families" — settlement-capture / shoulder-bin / center-bin / opening-inertia
  - evidence/multi_review/trading_correctness_report.md EDGE_PRESERVATION + VERDICT (R2 §4 deferred Dominance Roadmap pulled in)
preconditions:
  head: 874e00cc0244 + Z0..Z4 + U1 + U2 + M1..M5 + R1 + T1 land + F1 land
deliverables:
  new_modules:
    - path: src/strategy/benchmark_suite.py
      surface: |
        @dataclass
        class StrategyMetrics:
            strategy_key: str
            window_start: datetime
            window_end: datetime
            ev_after_fees_slippage: float
            realized_spread_capture: float
            fill_probability: float
            adverse_selection_bps: float
            time_to_resolution_risk: float  # capital-lock duration weighted
            liquidity_decay: float
            opportunity_cost: float
            drawdown_max: float
            drawdown_max_duration_hours: float
            calibration_error_vs_market_implied: float

        class StrategyBenchmarkSuite:
            def evaluate_replay(self, strategy_key: str, fixture_corpus: ReplayCorpus) -> StrategyMetrics: ...
            def evaluate_paper(self, strategy_key: str, fake_venue: FakePolymarketVenue, duration_hours: int) -> StrategyMetrics: ...
            def evaluate_live_shadow(self, strategy_key: str, capital_cap_micro: int, duration_hours: int) -> StrategyMetrics: ...
            def promotion_decision(self, replay: StrategyMetrics, paper: StrategyMetrics, shadow: StrategyMetrics) -> PromotionVerdict: ...

    - path: src/strategy/data_lake.py
      surface: |
        # Historical archive accessor: Gamma metadata + CLOB books + trades + user fills + resolutions + fees + collateral events
        class DataLake:
            def fetch_replay_corpus(self, market_filter: MarketFilter, period: tuple[datetime, datetime]) -> ReplayCorpus: ...

    - path: src/strategy/candidates/__init__.py
      content: |
        # Strategy candidate stubs; each implements StrategyProtocol
        # (NEW interface; existing strategies in src/strategy/ to be migrated)
        from .weather_event_arbitrage import WeatherEventArbitrage  # NEW
        from .stale_quote_detector import StaleQuoteDetector  # NEW
        from .resolution_window_maker import ResolutionWindowMaker  # NEW
        from .neg_risk_basket import NegRiskBasket  # NEW
        from .cross_market_correlation_hedge import CrossMarketCorrelationHedge  # NEW
        from .liquidity_provision_with_heartbeat import LiquidityProvisionWithHeartbeat  # NEW
  new_tables:
    - sql: |
        CREATE TABLE IF NOT EXISTS strategy_benchmark_runs (
          run_id INTEGER PRIMARY KEY AUTOINCREMENT,
          strategy_key TEXT NOT NULL,
          environment TEXT NOT NULL CHECK (environment IN ('replay','paper','shadow','live')),
          window_start TEXT NOT NULL,
          window_end TEXT NOT NULL,
          metrics_json TEXT NOT NULL,
          promotion_verdict TEXT CHECK (promotion_verdict IN ('PROMOTE','BLOCK','NEEDS_REVIEW')),
          recorded_at TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP
        );
acceptance_tests:
  - tests/test_strategy_benchmark.py::test_benchmark_metrics_computed_for_replay
  - tests/test_strategy_benchmark.py::test_benchmark_metrics_computed_for_paper_against_fake_venue
  - tests/test_strategy_benchmark.py::test_benchmark_metrics_computed_for_live_shadow
  - tests/test_strategy_benchmark.py::test_promotion_blocked_unless_replay_paper_shadow_all_pass
  - tests/test_strategy_benchmark.py::test_pnl_split_into_alpha_spread_fees_slippage_failed_settlement_capital_lock
  - tests/test_strategy_benchmark.py::test_backtest_to_paper_to_live_semantic_drift_report_empty_or_explicitly_waived
  - tests/test_strategy_benchmark.py::test_calibration_error_vs_market_implied_p_computed
operator_decision_required: []
depends_on: [Z0..Z4, U1, U2, M1, M2, M3, M4, M5, R1, T1, F1]
estimated_h: 30
risk: high
critic_gate: critic-opus
links:
  r2_cards: []  # net new — R2 §4 Dominance Roadmap pulled in
  v2_1_phases: [A1]
new_invariants_or_NCs:
  - INV-NEW-Q: "No strategy promoted to live without StrategyBenchmarkSuite.promotion_decision() returning PROMOTE based on replay + paper + shadow runs."
notes:
  - This is the BENCHMARK layer. Without it, even after all execution-correctness work lands, Zeus has no machinery to prove a strategy has edge.
  - Strategy candidates are stubs — actual alpha development is post-A1.
  - Coordinate with F2: calibration retrains feed metrics; metric drift signals when retrain is needed.
