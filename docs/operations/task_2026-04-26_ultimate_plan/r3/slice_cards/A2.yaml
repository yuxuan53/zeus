id: A2
phase: A
title: RiskAllocator + PortfolioGovernor — caps, drawdown governor, kill switch
purpose: |
  Convert signals into bounded, capital-efficient live positions. Caps
  per-market / per-event / per-resolution-time. Drawdown governor.
  Kill switch on reconciliation diff count, heartbeat loss, WS gap, or
  unknown-side-effect count. Maker/taker switch based on book depth +
  heartbeat health + resolution deadline.
authority_basis:
  - V2.1 §A2
  - AGENTS.md risk-level grammar (GREEN/YELLOW/ORANGE/RED + DATA_DEGRADED)
  - INV-NEW-I (R3) — risk allocator separates OPTIMISTIC vs CONFIRMED exposure
preconditions:
  head: 874e00cc0244 + Z0..Z4 + U1 + U2 + M1..M5 + R1 + T1 + F1 + A1 land
deliverables:
  new_modules:
    - path: src/risk_allocator/governor.py
      surface: |
        @dataclass
        class CapPolicy:
            max_per_market_micro: int
            max_per_event_micro: int
            max_per_resolution_window_micro: dict[str, int]  # window_label → cap
            max_drawdown_pct: float
            max_correlated_exposure_micro: int

        @dataclass
        class GovernorState:
            current_drawdown_pct: float
            heartbeat_health: HeartbeatHealth
            ws_gap_active: bool
            unknown_side_effect_count: int
            reconcile_finding_count: int
            kill_switch_armed: bool

        class RiskAllocator:
            def can_allocate(self, intent: ExecutionIntent, governor_state: GovernorState) -> AllocationDecision: ...
            def maker_or_taker(self, snapshot: ExecutableMarketSnapshotV2, governor_state: GovernorState) -> Literal["MAKER","TAKER","NO_TRADE"]: ...
            def reduce_only_mode_active(self, governor_state: GovernorState) -> bool: ...

        class PortfolioGovernor:
            def update_state(self, ledger: CollateralLedger, heartbeat: HeartbeatStatus, ws_status: WSStatus, unknown_count: int, finding_count: int) -> GovernorState: ...
            def kill_switch(self, reason: str) -> None: ...

  extended_modules:
    - file: src/execution/executor.py
      change: pre-submit consult RiskAllocator.can_allocate(intent, governor_state); raises AllocationDenied with structured reason
    - file: src/engine/cycle_runner.py
      change: PortfolioGovernor.update_state() at cycle start; cycle_summary surfaces governor state
acceptance_tests:
  - tests/test_risk_allocator.py::test_per_market_cap_enforced
  - tests/test_risk_allocator.py::test_correlated_market_cap_via_multiple_outcome_tokens_enforced
  - tests/test_risk_allocator.py::test_unknown_side_effect_blocks_new_risk_in_same_market
  - tests/test_risk_allocator.py::test_heartbeat_degraded_switches_to_FOK_FAK_only
  - tests/test_risk_allocator.py::test_heartbeat_lost_switches_to_no_trade
  - tests/test_risk_allocator.py::test_drawdown_governor_blocks_new_risk_at_threshold
  - tests/test_risk_allocator.py::test_reduce_only_mode_when_risk_state_degraded
  - tests/test_risk_allocator.py::test_manual_operator_trade_appears_as_external_position_drift_reduces_capacity
  - tests/test_risk_allocator.py::test_kill_switch_blocks_all_submits
  - tests/test_risk_allocator.py::test_optimistic_vs_confirmed_split_in_capacity_check
    | NC-NEW-I — sizing function distinguishes OPTIMISTIC_EXPOSURE (counts against capacity but at lower weight) from CONFIRMED_EXPOSURE (full weight)
operator_decision_required:
  - gate_id: cap-policy-config
    blocking: no (engineering ships defaults; operator tunes)
    artifact: config/risk_caps.yaml (NEW)
    runtime_gate: read at startup; sane defaults if file absent
depends_on: [Z0..Z4, U1, U2, M1, M2, M3, M4, M5, R1, T1, F1, A1]
estimated_h: 22
risk: high
critic_gate: critic-opus
links:
  r2_cards: []  # net new — R2 §4 Dominance Roadmap pulled in
  v2_1_phases: [A2]
new_invariants_or_NCs:
  - INV-NEW-R: "Kill switch trips on (reconcile_finding_count > N) OR (heartbeat_lost) OR (ws_gap_seconds > M) OR (unknown_side_effect_count > K). Configurable thresholds."
  - NC-NEW-I preserved: "RiskAllocator.can_allocate() reads OPTIMISTIC vs CONFIRMED separately from position_lots."
notes:
  - This card converts strategy benchmarks (A1) into bounded live deployment.
  - Kill switch is the last-resort safety surface; operator can also manually arm.
