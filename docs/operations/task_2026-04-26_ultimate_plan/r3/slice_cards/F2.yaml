id: F2
phase: F
title: Calibration retrain loop wiring — operator-gated trigger + frozen-replay antibody
purpose: |
  Plumb the calibration retrain trigger so operator can flip a switch to
  re-fit Extended Platt parameters against a fresh corpus. Wired but
  not auto-fired. Frozen-replay harness antibody asserts P_raw → Size
  is bit-identical pre/post retrain on a fixed fixture portfolio
  (per up-08 from R2).
authority_basis:
  - 'User directive 2026-04-26: "训练（例如tigge数据）的时候需要我决定" (training requires operator decision)'
  - AGENTS.md "THE PROBABILITY CHAIN" — Extended Platt fits with A/B/C parameters
  - evidence/multi_review/trading_correctness_report.md PROBABILITY_CHAIN_RISKS (calibration drift antibody)
  - R2 up-08.yaml FROZEN_REPLAY_HARNESS (carries forward)
  - src/calibration/platt.py (existing module)
preconditions:
  head: 874e00cc0244 + Z0..Z4 + U1 + U2 + F1 land
  parallel_note: M-series may run in parallel (F2 only consumes confirmed trade facts via U2 tables)
deliverables:
  new_modules:
    - path: src/calibration/retrain_trigger.py
      summary: |
        Operator-gated entrypoint for re-fitting Platt parameters. Reads
        confirmed trade facts via U2; writes new params to versioned
        calibration_params table. Frozen-replay test asserts no silent
        drift on fixture portfolio.
      surface: |
        class RetrainStatus(str, Enum):
            DISABLED = "DISABLED"  # default; ZEUS_CALIBRATION_RETRAIN_ENABLED unset
            ARMED = "ARMED"  # operator artifact present + env flag set; not yet fired
            RUNNING = "RUNNING"
            COMPLETE_REPLAYED = "COMPLETE_REPLAYED"  # frozen-replay PASS
            COMPLETE_DRIFT_DETECTED = "COMPLETE_DRIFT_DETECTED"  # frozen-replay FAIL — operator review required

        def status() -> RetrainStatus: ...
        def arm(operator_token: str, evidence_path: str) -> None: ...
        def trigger_retrain(corpus_filter: CorpusFilter, *, run_frozen_replay: bool = True) -> RetrainResult: ...

    - path: tests/integration/test_frozen_replay_harness.py
      surface: |
        # See up-08 R2 yaml for full test list. Lift here, extend with F2 entrypoint:
        def test_calibration_retrain_does_not_break_p_posterior_bit_identicality() -> None: ...
        def test_calibration_retrain_disabled_by_default() -> None: ...
        def test_calibration_retrain_armed_requires_operator_token() -> None: ...
        def test_drift_detection_blocks_promotion_to_live() -> None: ...

    - path: tests/fixtures/frozen_portfolios/
      content: 3 captured snapshots (e.g., 2026-04-15 weather-Day0, 2026-04-20 settlement-day, 2026-04-25 mid-cycle-degraded)
  new_tables:
    - sql: |
        CREATE TABLE IF NOT EXISTS calibration_params_versions (
          version_id INTEGER PRIMARY KEY AUTOINCREMENT,
          fitted_at TEXT NOT NULL,
          corpus_filter_json TEXT NOT NULL,
          params_json TEXT NOT NULL,  -- {A: <float>, B: <float>, C: <float>, ...}
          fit_loss_metric REAL,
          confirmed_trade_count INTEGER NOT NULL,
          frozen_replay_status TEXT CHECK (frozen_replay_status IN ('PASS','FAIL','SKIPPED')),
          frozen_replay_evidence_hash TEXT,
          promoted_at TEXT,  -- when this version became "live"
          retired_at TEXT,
          operator_token_hash TEXT NOT NULL  -- proves operator-armed retrain
        );
  extended_modules:
    - file: src/calibration/platt.py
      change: |
        Refactor Platt fit function to accept a CorpusFilter (date range,
        strategy_key, source_id) instead of hard-coded inputs. Persist
        new params via calibration_params_versions table.
    - file: src/signal/ensemble_signal.py
      change: |
        Read latest "live" calibration_params_versions row at startup;
        cache for cycle. Promotion happens via operator-arm + frozen-replay PASS.
acceptance_tests:
  - tests/test_calibration_retrain.py::test_retrain_disabled_by_default
  - tests/test_calibration_retrain.py::test_arm_requires_operator_token_AND_evidence_path
  - |
    tests/test_calibration_retrain.py::test_arm_then_trigger_consumes_confirmed_trades_only
    NC-NEW-H — corpus filter MUST add `WHERE state='CONFIRMED'` to venue_trade_facts query
  - tests/test_calibration_retrain.py::test_frozen_replay_failure_blocks_promotion
  - tests/test_calibration_retrain.py::test_frozen_replay_pass_promotes_new_version
  - tests/test_calibration_retrain.py::test_promotion_atomic_no_mid_swap_visible
  - tests/test_calibration_retrain.py::test_retired_versions_retained_for_audit
  - tests/integration/test_frozen_replay_harness.py::test_p_posterior_bit_identical_pre_post_calibration_retrain
  - tests/integration/test_frozen_replay_harness.py::test_drift_detected_when_corpus_filter_changes_p_posterior_bytes
operator_decision_required:
  - gate_id: calibration-retrain
    blocking: yes (new params CANNOT promote to live without operator arm + frozen-replay PASS)
    artifact: docs/operations/.../evidence/calibration_retrain_decision_<date>.md
    runtime_gate: env var ZEUS_CALIBRATION_RETRAIN_ENABLED + operator-arm token verified
depends_on: [Z0..Z4, U1, U2, F1]
estimated_h: 14
risk: high
critic_gate: critic-opus
links:
  r2_cards: [up-08]
  v2_1_phases: []  # net new for R3
new_invariants_or_NCs:
  - INV-NEW-O: "Calibration retrain consumes ONLY venue_trade_facts WHERE state='CONFIRMED'. NC-NEW-H enforces."
  - INV-NEW-P: "Calibration param promotion to live REQUIRES frozen-replay PASS. Drift = operator review required, not auto-promote."
notes:
  - Wiring is in place; ingest of new corpus + retrain firing is operator-gated.
  - 'Coordinate with F1: when operator activates TIGGE source, the new corpus includes TIGGE forecasts; calibration retrain may produce different α-weights.'
  - The 3 frozen-portfolio fixtures are CAPTURED NOW (pre-Wave-A) so they survive any subsequent schema migrations.
