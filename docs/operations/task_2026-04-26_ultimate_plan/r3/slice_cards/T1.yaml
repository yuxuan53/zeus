notes:
  - This card is the immune-system slice for live-money safety. Without it, all the V2/Z3/Z4/M-series antibodies are isolated assertions; T1 lets us replay full P0 scenarios.
  - axis-31 paper/live parity closure depends on FakePolymarketVenue mirroring the LIVE adapter EXACTLY.
