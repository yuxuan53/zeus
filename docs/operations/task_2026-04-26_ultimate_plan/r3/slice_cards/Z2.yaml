id: Z2
phase: Z
title: V2 strict venue adapter + VenueSubmissionEnvelope
purpose: |
  Isolate SDK volatility behind a single adapter module. All live
  placement / cancel / query goes through this seam. VenueSubmissionEnvelope
  pins PROVENANCE, not SDK call shape (per V2.1 §31; supersedes R2 X1
  seam-pinning verdict).
authority_basis:
  - V2.1 §Z2
  - evidence/multi_review/V2_1_STRUCTURAL_DIFF.md §2.1 (envelope > seam)
  - INV-24 (place_limit_order gateway-only)
  - INV-25 (V2 preflight blocks placement)
  - INV-28 (every venue side effect preceded by venue_commands persist)
  - INV-30 (place_limit_order preceded by SUBMITTING state)
  - evidence/down/converged_R3L3.md §A4 (V2 SDK contract antibody)
  - evidence/down/q_new_1_polygon_rpc_eth_call_2026-04-26_R3L3.md (pUSD ERC-20)
preconditions:
  head: 874e00cc0244 + Z0 + Z1 land
  required_files:
    - src/data/polymarket_client.py (will be REPLACED by adapter; current module preserved as compatibility layer)
    - tests/test_neg_risk_passthrough.py (V1 antibody, mirror for V2)
deliverables:
  new_modules:
    - path: src/venue/__init__.py
      content: empty package init
    - path: src/venue/polymarket_v2_adapter.py
      summary: The ONLY live Polymarket placement / cancel / query surface.
      surface: |
        class PolymarketV2Adapter:
            def __init__(self, host: str, funder_address: str, signer_key: str, builder_code: Optional[str] = None) -> None: ...
            def preflight(self) -> PreflightResult: ...  # checks host reachable, version, funder allowance
            def get_clob_market_info(self, condition_id: str) -> ClobMarketInfo: ...
            def create_submission_envelope(
                self,
                intent: ExecutionIntent,
                snapshot: ExecutableMarketSnapshotV2,
                order_type: OrderType,  # GTC | GTD | FOK | FAK
                post_only: bool = False,
            ) -> VenueSubmissionEnvelope: ...
            def submit(self, envelope: VenueSubmissionEnvelope) -> SubmitResult: ...
            def cancel(self, order_id: str) -> CancelResult: ...
            def get_order(self, order_id: str) -> OrderState: ...
            def get_open_orders(self, filter: OpenOrdersFilter) -> list[OrderState]: ...
            def get_trades(self, since: Optional[str] = None) -> list[TradeFact]: ...
            def get_positions(self) -> list[PositionFact]: ...
            def post_heartbeat(self, heartbeat_id: str) -> HeartbeatAck: ...
    - path: src/contracts/venue_submission_envelope.py
      summary: Frozen dataclass capturing all provenance for a single submission.
      surface: |
        @dataclass(frozen=True)
        class VenueSubmissionEnvelope:
            sdk_package: str  # "py-clob-client-v2"
            sdk_version: str  # "1.0.0"
            host: str  # "https://clob-v2.polymarket.com"
            chain_id: int  # 137
            funder_address: str
            condition_id: str
            question_id: str
            yes_token_id: str
            no_token_id: str
            selected_outcome_token_id: str
            outcome_label: Literal["YES", "NO"]
            order_type: OrderType
            post_only: bool
            tick_size: Decimal
            min_order_size: Decimal
            neg_risk: bool
            fee_details: 'FeeDetails  # {bps, builder_fee_bps}'
            canonical_pre_sign_payload_hash: 'str  # SHA256 of canonical {token_id, side, price, size, expiry}'
            signed_order: Optional[bytes]  # if SDK exposes; else None
            signed_order_hash: Optional[str]  # SHA256 of signed_order if available
            raw_request_hash: str  # always present
            raw_response_json: Optional[str]  # populated post-submit
            order_id: Optional[str]  # populated post-ack
            trade_ids: list[str]  # populated as trades arrive
            transaction_hashes: list[str]  # populated post-mining
            error_code: Optional[str]
            error_message: Optional[str]
            captured_at: datetime  # UTC ISO
        SCHEMA_VERSION = 1
  extended_modules:
    - file: requirements.txt
      change: add `py-clob-client-v2>=1.0.0`; remove `py-clob-client` from live-mode deps (keep test-only)
    - file: src/data/polymarket_client.py
      function: place_limit_order, get_balance, redeem
      change: deprecate; redirect to PolymarketV2Adapter; emit DeprecationWarning
    - file: src/execution/executor.py
      function: execute_entry_order, execute_exit_order
      change: replace `polymarket_client.place_limit_order(...)` with `adapter.create_submission_envelope(...)` then `adapter.submit(envelope)`; envelope persisted via venue_command_repo (see U2)
acceptance_tests:
  - tests/test_v2_adapter.py::test_preflight_returns_failure_when_host_unreachable
  - tests/test_v2_adapter.py::test_create_submission_envelope_captures_all_provenance_fields
  - tests/test_v2_adapter.py::test_submit_envelope_with_signed_order_None_falls_back_to_raw_request_hash
  - |
    tests/test_v2_adapter.py::test_one_step_sdk_path_still_produces_envelope_with_provenance
    mock SDK to expose `create_and_post_order(args)` (one-step); adapter still produces envelope with raw_request_hash + raw_response_json; signed_order may be None but envelope is COMPLETE
  - |
    tests/test_v2_adapter.py::test_two_step_sdk_path_produces_envelope_with_signed_order_hash
    mock SDK to expose `create_order` + `post_order` (two-step); adapter populates signed_order + signed_order_hash
  - |
    tests/test_v2_adapter.py::test_envelope_schema_version_pinned
    SCHEMA_VERSION constant is 1; envelope serialization round-trips
  - |
    tests/test_v2_adapter.py::test_old_v1_sdk_import_fails_in_live_mode
    `from py_clob_client.client import ClobClient` in live-mode test path raises ImportError or DeprecationWarning
  - |
    tests/test_v2_adapter.py::test_explicit_order_type_required
    submit() without OrderType in envelope raises TypeError
  - |
    tests/test_v2_adapter.py::test_missing_order_id_does_not_produce_submit_acked
    submit response without order_id → envelope.error_code = "MISSING_ORDER_ID"; no SUBMIT_ACKED event
  - |
    tests/test_v2_adapter.py::test_typed_rejection_when_success_false_with_error_code
    response {"success": false, "errorCode": "INSUFFICIENT_BALANCE"} → envelope.error_code populated; not generic RuntimeError
  - |
    tests/test_v2_adapter.py::test_neg_risk_passthrough_v2
    mirror of tests/test_neg_risk_passthrough.py (V1 baseline) for V2 surface
  - |
    tests/test_v2_adapter.py::test_create_submission_envelope_consumes_executable_market_snapshot
    envelope construction REQUIRES a fresh ExecutableMarketSnapshotV2 (see U1); raises StaleMarketSnapshotError if snapshot older than freshness window
operator_decision_required:
  - gate_id: Q1-zeus-egress
    blocking: yes (Z2 preflight cannot pass without operator probe from daemon machine)
    artifact: docs/operations/task_2026-04-26_polymarket_clob_v2_migration/evidence/q1_zeus_egress_2026-04-26.txt
    runtime_gate: PolymarketV2Adapter.preflight() returns failure if host probe evidence absent
depends_on: [Z0, Z1]
estimated_h: 18
risk: high
critic_gate: critic-opus
links:
  r2_cards: [down-01, down-03, mid-02]
  v2_1_phases: [Z2]
new_invariants_or_NCs:
  - NC-NEW-G: "Provenance pinned at VenueSubmissionEnvelope contract layer, NOT specific SDK call shape. Antibody: tests/test_v2_adapter.py::test_one_step_sdk_path_still_produces_envelope_with_provenance + test_two_step_sdk_path_produces_envelope_with_signed_order_hash. semgrep rule `zeus-v2-placement-via-adapter-only` bans direct ClobClient import outside src/venue/."
  - INV-NEW-B: "Every submit() call produces a VenueSubmissionEnvelope persisted via venue_command_repo BEFORE side effect (extends INV-30 from row-state to envelope-state)."
notes:
  - This card SUPERSEDES R2 X1 verdict (seam-pinning). The triple-belt antibody at polymarket_client.py:194-197 is REPLACED by envelope-pinning antibodies above.
  - VenueSubmissionEnvelope is the CONTRACT for U2 raw provenance schema; U2 adds the matching DB columns.
  - Adapter is the ONLY surface that touches py-clob-client-v2; semgrep `zeus-v2-placement-via-adapter-only` is the boundary antibody.
  - For the SDK source-of-truth of method signatures, see reference_excerpts/py_clob_client_v2_surface.md (TBD — operator can capture).
