# entries from the Gate 0→1 per-day completeness check.
#
# Entry schema:
#   city: <cities.json name>
#   target_date: YYYY-MM-DD (local date)
#   hours_collected: <int, actual count>
#   missing_utc_hours: [<int>, ...]
#   sources_probed:
#     wu: <count>
#     ogimet: <count>
#     iem_asos: <count>
#   rationale: <one-line reason>

