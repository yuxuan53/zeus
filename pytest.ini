[pytest]
testpaths = tests
norecursedirs =
    docs/archives
    .claude
    .git
    .omc
    .omx
    .venv
# Default: deselect live_topology drift tests (16 tests that depend on live
# repo manifest state, not deterministic fixtures). Plain `pytest` intentionally
# excludes them; CI/nightly/topology-closeout automation must override this
# marker filter when full live coverage is required.
#
# To run them explicitly:
#   pytest -m live_topology              # only the drift suite
#   pytest -m ""                         # the full suite (no marker filter)
#   pytest --override-ini="addopts="    # disable this default
#
# CI nightly / topology closeout should run with `-m ""`.
addopts = -m "not live_topology"
markers =
    live_topology: depends on live repo state, not deterministic fixtures
